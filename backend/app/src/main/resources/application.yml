spring:
  application:
    name: identity-auth-fullstack
  datasource:
    url: jdbc:mysql://localhost:3306/identity?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  main:
    allow-bean-definition-overriding: true

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: input

jetcache:
  statIntervalMinutes: 0
  areaInCacheName: false
  local:
    default:
      type: caffeine
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 300000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson2
      valueEncoder: java
      valueDecoder: java
      expireAfterWriteInMillis: 300000
      uri: redis://localhost:6379

identity:
  jwt:
    store:
      secret: ${STORE_JWT_SECRET:store-dev-secret-key-32chars-min}
      access-ttl-seconds: 7200
      refresh-ttl-seconds: 2592000
    admin:
      secret: ${ADMIN_JWT_SECRET:admin-dev-secret-key-32chars-min}
      access-ttl-seconds: 28800
  oidc:
    mode: ${OIDC_MODE:stub}
  mail:
    mode: ${MAIL_MODE:stub}
    from: noreply@dreamy.com
  retention:
    cron: "0 0 3 * * *"

logging:
  level:
    com.dreamy.identity: INFO
    com.baomidou.mybatisplus: WARN

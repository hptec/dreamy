passed_checks:
  - "SEC-01: 全部 DB 访问经 MyBatis-Plus LambdaWrapper #{} 参数化 / @Select 占位符；无字符串拼接 SQL（含动态筛选 .like/.eq）"
  - "SEC-06: DTO 严格隔离（AdminDTO 隐藏 password_hash、IdentityDTO 隐藏 provider_uid、UserProfileDTO 无密码）；GlobalExceptionHandler 5xx 不泄漏堆栈/SQL（PATH-02/04）；OTP 仅存 BCrypt code_hash；日志 token [REDACTED]；注销 PII 不可逆匿名化（RetentionScheduler.anonymizeUser）"
  - "SEC-10: 外部入参普遍 Bean Validation + 业务规范化；OIDC provider 正则白名单 google|apple"
  - "归并防劫持：MergeService 仅在双方 email_verified=true 时自动并，未验证冲突抛 40902（DR-02），逻辑正确（依赖 FND-SEC-004 上游验签修复后才完整成立）"
  - "超管保护：AdminService 删自己 40307、超管降权/删除/禁用 40306；角色锁定 40308 均到位"
  - "归属校验下沉 Service：SessionService.revoke / IdentityService.unbindIdentity / UserOpsService.forceLogout 均校验资源 userId 归属，水平越权防护到位（40300/404）"

uncertainties:
  - "SEC-08 依赖 CVE：未读取 build.gradle 全部版本号，jjwt/lettuce/mybatis-plus 具体版本是否含已知高危需运行时 SCA（如 dependency-check）复核。"
  - "FND-SEC-002/003 残留窗口的业务可接受度：access 2h / admin 8h 的撤销延迟是否在产品风险容忍范围内，由 Coordinator 结合业务判定；但设计已明确要求即时失效（EDGE-023），实现未达成，故按 blocking 上报。"
  - "FND-SEC-004：当前沙箱默认 OIDC_MODE=stub 不触发；real 模式为生产部署路径，需确认生产是否启用 real 以确定实际暴露时点（代码路径漏洞客观存在）。"

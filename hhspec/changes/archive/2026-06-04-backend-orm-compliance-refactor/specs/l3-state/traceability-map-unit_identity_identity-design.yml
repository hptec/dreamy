constraints:
  # ===== A3: @Select JOIN → 分步查询 + 内存聚合（禁 JOIN）=====
  - constraint_id: "A3"
    status: implemented
    description: >
      删除 RolePermissionMapper.listKeysByRoleId 的 @Select(JOIN permission)，
      改为 RoleService.permissionKeysOfRole 分步查询：Step1 按 role_id 查 role_permission
      取 permission_id 列表；Step2 按 id IN 批量查 permission 内存提取 perm_code。
      含空列表保护（permIds 为空直接返回 List.of() 不再查询）。
    impl_location:
      - file: "backend/src/main/java/com/dreamy/identity/domain/role/repository/RolePermissionMapper.java"
        lines: "1-13"
        note: "移除 @Select/@Param/@Select 相关 import 及 listKeysByRoleId 方法，仅保留 BaseMapper 继承"
      - file: "backend/src/main/java/com/dreamy/identity/domain/role/service/RoleService.java"
        lines: "81-98"
        note: "permissionKeysOfRole 改为分步查询 + 内存聚合（Step1 role_permission，Step2 permission IN）"

  - constraint_id: "A3-callsite-datainit"
    status: implemented
    description: >
      DataInitializer.initSuperRole 原调用 rolePermissionMapper.listKeysByRoleId（已删除）。
      改为分步查询：按 role_id 查 role_permission 得已关联 permission_id 集合，按 id 判重幂等跳过。
    impl_location:
      - file: "backend/src/main/java/com/dreamy/identity/config/DataInitializer.java"
        lines: "139-156"
        note: "existingPermIds 集合替代 existingPerms 权限码列表，按 permission_id 判重"


changes_summary: |
  DEC-001（OTP 并发控制）：
    - 删除 OtpCodeMapper.lockPendingByEmail（@Select ... FOR UPDATE）
    - OtpService implements IdLockSupport，构造器注入 RedissonClient
    - verifyOtp/verifyCodeOnly 用 onIdLock("otp:verify", email) 包裹 consumeValidCode（STEP-01~03）
    - consumeValidCode 内部改用 selectLatestPending(LambdaQueryWrapper)，互斥由 onIdLock 保证
    - OtpCodeEntity 保留 @Version 乐观锁（incrementAttempt 已有）
    - OtpServiceTest 新增 RedissonClient/RLock mock，lockPendingByEmail 改 selectOne(any())

  DEC-002（流式导出改分页轮询）：
    - 删除 OperationLogMapper.streamByFilter（@Select(<script>) + ResultHandler）
    - AuditService.streamForExport 改为 while 循环 + fetchExportPage(lastId) 分页轮询（1000/页）
    - fetchExportPage 用 LambdaQueryWrapper（id < lastId + orderByDesc(id) + LIMIT 1000）
    - 删除 @Transactional(readOnly)（每页查询独立连接）
    - AuditServiceTest 完全重写：selectList stub 替代 ResultHandler stub，新增翻页测试

  约束覆盖率：2/2 = 100%
  单元测试覆盖：12 个用例（OTP 8 + Audit 4），全部通过


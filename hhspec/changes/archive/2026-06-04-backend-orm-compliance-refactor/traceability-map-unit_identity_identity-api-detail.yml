  - DEC-003/004/005（DBConst 迁移/native SQL 简化/全表扫描显式化）不在本单元范围，由其他 Implementer 负责
  - verifyOtp 事务范围保持完整方法覆盖（@Transactional），onIdLock 内部 try-finally 确保锁释放先于事务提交
  - selectLatestPending / updateStatus / sendOtp 的 expire 全部用 LambdaQueryWrapper/LambdaUpdateWrapper 方法引用（符合 DEC-003/B1 规范）；单元测试用 @BeforeAll TableInfoHelper.initTableInfo(OtpCodeEntity.class) 初始化 MyBatis-Plus lambda 缓存，解决无 Spring 上下文时 "can not find lambda cache" 问题（范本：IdentityServiceUnbindTest）。保留 .last("LIMIT 1") 匹配原 SQL 单条语义
  - fetchExportPage 按 id 倒序（等价 created_at DESC，id 自增与创建时序单调）；AuditService 由 Spring 启动并经集成测试初始化 lambda 缓存，单测对 selectList 走 mock 不触发真实 wrapper 解析

    # ---------- B 类 1：DBConst + CommonDBConst 范式沉淀 ----------
    - id: "FND-REUSE-001"
      severity: "info"
      classification: "B"
      category: "REUSE-07"
      check_item: "REUSE-07"
      title: "13 实体统一 {Entity}DBConst extends CommonDBConst 列名常量范式，建议沉淀为新实体标准范式"
      evidence:
        locations:
          - file: "backend/src/main/java/com/dreamy/identity/domain/consts/CommonDBConst.java"
            line: "8-18"
            code_snippet: "interface CommonDBConst { String ID=\"id\"; String CREATED_AT=\"created_at\"; String UPDATED_AT=\"updated_at\"; }"
            implementer: "unit_identity_identity-data-detail"
          - file: "backend/src/main/java/com/dreamy/identity/domain/user/consts/UserDBConst.java"
            line: "10-26"
            code_snippet: "interface UserDBConst extends CommonDBConst { String TABLE=\"user\"; String EMAIL=\"email\"; ... String VERSION=\"version\"; }"
            implementer: "unit_identity_identity-data-detail"
          - file: "backend/src/main/java/com/dreamy/identity/domain/role/consts/RoleDBConst.java"
            line: "10-16"
            code_snippet: "interface RoleDBConst extends CommonDBConst { String NAME=\"name\"; String TYPE=\"type\"; String IS_LOCKED=\"is_locked\"; String VERSION=\"version\"; }"
            implementer: "unit_identity_identity-design"
      counterpart:
        source: "hhspec/specs/design/code-patterns.md"
        location: "命名与结构 CP-001/CP-002（现状仅记字段命名规则，未记 DBConst 常量接口范式）"
        quote: "CP-001 JSON/DB 字段 snake_case；CP-002 主键字段统一 id"
      description: >-
        本次重构对 13 个领域实体统一采用「{Entity}DBConst interface extends CommonDBConst」常量范式：
        公共审计列（id/created_at/updated_at）单一来源于 domain/consts/CommonDBConst，各实体常量接口
        仅声明自身业务列 + TABLE 名，@Column(name)/@TableField/Wrapper 全部引用常量禁止硬编码列名。
        该范式跨全部 5 个实现单元一致出现（13 处），是后续新增实体的事实标准，但 code-patterns.md 现状
        仅记录字段命名约定（CP-001/002），未记录该常量接口范式。属可复用范式，宜沉淀供后续新实体直接套用。
      impact: >-
        非缺陷。沉淀后可让后续新实体作者直接遵循统一范式（避免列名硬编码、避免审计列重复声明），
        降低规范漂移。不阻塞当次交付。
      recommendation: >-
        将该范式按 CP-NNN 格式追加到 hhspec/specs/design/code-patterns.md「命名与结构」分类（见 pattern_spec）。
      affected_implementer: "unit_identity_identity-data-detail, unit_identity_identity-design（全 5 单元一致）"
      constraint_ids: ["DEC-003", "DBCONST-*"]
      pattern_spec:
        pattern_name: "实体列名常量接口范式（{Entity}DBConst extends CommonDBConst）"
        cp_number: "CP-015"
        type: "REUSABLE"
        scope: "全局（所有 huihao-mysql 领域实体）"
        description: >-
          公共审计列（id/created_at/updated_at）集中于 domain/consts/CommonDBConst；每实体定义
          {Entity}DBConst interface extends CommonDBConst，声明 TABLE 名 + 自身业务列 snake_case 常量；
          实体 @Column(name)/@TableField 与 Service 层 LambdaWrapper 列引用一律取 DBConst 常量，禁止硬编码列名字符串。
          常量接口置于 domain/{聚合根}/consts/ 包，单向依赖 domain/consts/CommonDBConst。
        problem_scenario: >-
          列名散落硬编码导致重命名时遗漏、审计列在每实体重复声明、常量接口曾误置于 repository/ 包成为 dead code。
        usage_example: >-
          UserDBConst/RoleDBConst/OtpCodeDBConst 等 13 个；新增实体时新建 {Entity}DBConst extends CommonDBConst 即可。
        notes: >-
          consts/ 包仅向 CommonDBConst 单向依赖，不得反向引用 entity/service；@Version 乐观锁列与 SQL 保留字列
          （如 group→@TableField("`group`")）仍需在实体侧补 @TableField，常量值存裸列名。

    # ---------- B 类 2：锁内独立事务写入范式沉淀 ----------
    - id: "FND-REUSE-002"
      severity: "info"
      classification: "B"
      category: "REUSE-07"
      check_item: "REUSE-07"
      title: "OtpStateWriter「锁内/事务内关键写入需独立提交以规避外层回滚」范式，建议沉淀为通用模式"
      evidence:
        locations:
          - file: "backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java"
            line: "34-49"
            code_snippet: "@Transactional(propagation = REQUIRES_NEW) public void updateStatus(...) { ... } // 独立 @Service Bean，跨 bean 代理调用"
            implementer: "unit_identity_identity-api-detail"
          - file: "backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java"
            line: "54-60"
            code_snippet: "@Transactional(propagation = REQUIRES_NEW) public void incrementAttempt(Long id) { ...setSql(\"attempts = attempts + 1\") }"
            implementer: "unit_identity_identity-api-detail"
      counterpart:
        source: "hhspec/specs/design/code-patterns.md"
        location: "数据访问 CP-011/CP-012（CP-012 FOR UPDATE 已被 DEC-001 Redis 锁取代，无独立提交范式记录）"
        quote: "CP-012 行锁串行化关键校验：SELECT ... FOR UPDATE（OTP 校验防并发绕过 attempts）"
      description: >-
        本次新增 OtpStateWriter 解决「频控写入（attempts++/locked/consumed）必须在外层 @Transactional
        因 BizException 回滚之前落库」的问题：抽独立 @Service Bean，写入方法标 REQUIRES_NEW，经跨 bean
        Spring 代理调用（规避 this 自调用陷阱）使子事务独立提交。该「锁内/校验失败回滚场景下的关键写入需独立
        提交」是通用横切关注点，未来其他频控/审计/计数类写入会再次遇到，宜沉淀为模式。同时 code-patterns.md
        的 CP-012（FOR UPDATE）已被 DEC-001 取代，应一并修订标注其演进。
      impact: >-
        非缺陷。沉淀后避免后续作者重蹈「写入随外层事务回滚丢失」与「self-invocation 导致 REQUIRES_NEW 失效」
        两类陷阱。不阻塞当次交付。
      recommendation: >-
        新增 CP-016 记录该范式；同时更新 CP-012 标注「OTP 校验已由 DEC-001 改 Redis 分布式锁 + 锁内 REQUIRES_NEW
        提交取代 FOR UPDATE」（见 pattern_spec）。
      affected_implementer: "unit_identity_identity-api-detail"
      constraint_ids: ["DEC-001", "V-001"]
      pattern_spec:
        pattern_name: "锁内/事务内关键写入独立提交范式（独立 Bean + REQUIRES_NEW）"
        cp_number: "CP-016"
        type: "REUSABLE"
        scope: "全局（频控、审计、计数等需在外层回滚前持久化的关键写入）"
        description: >-
          当某写入必须在外层 @Transactional 可能回滚（如校验失败抛 BizException）之前落库时：
          将该写入下沉到独立 @Service Bean，写入方法标 @Transactional(propagation=REQUIRES_NEW)，
          由外层服务经构造器注入后跨 bean 调用（非 this 自调用，否则 Spring 代理不生效 REQUIRES_NEW 失效）。
          子事务独立提交，外层回滚不影响该写入。计数类写入用 setSql 原子自增规避 stale version。
        problem_scenario: >-
          OTP attempts++/locked 原在外层事务内，校验失败抛 BizException 时随外层回滚丢失，max-attempts
          频控形同虚设（可无限重试绕过）。CP-012 的 FOR UPDATE 行锁亦已被 DEC-001 Redis 分布式锁取代。
        usage_example: >-
          OtpStateWriter.updateStatus/incrementAttempt（otp 聚合）；FND-CODE-004 指出 recordFailedLogin
          失败登录审计仍随外层回滚丢失，为本范式后续候选适用点。
        notes: >-
          必须为独立注入 Bean，禁止同类内 this 自调用；REQUIRES_NEW 在外层事务挂起期间额外占用一条 DB 连接，
          需关注连接池容量（参见 FND-SEC-005）；version 兜底需用 setSql version+1 构成真 CAS（参见 FND-SEC-004）。

    # ---------- B 类 3：游标分页轮询导出范式沉淀 ----------
    - id: "FND-REUSE-003"
      severity: "info"
      classification: "B"
      category: "REUSE-07"
      check_item: "REUSE-07"
      title: "AuditService id 游标递减分页轮询导出范式，建议沉淀为大数据集流式导出标准模式"
      evidence:
        locations:
          - file: "backend/src/main/java/com/dreamy/identity/domain/audit/service/AuditService.java"
            line: "68-115"
            code_snippet: "streamForExport: while(true){ page=fetchExportPage(...,lastId); if(empty)break; consumer.accept; if(size<PAGE)break; lastId=last.getId(); } // fetchExportPage: lt(getId,lastId).orderByDesc(getId).last(\"LIMIT \"+PAGE)"
            implementer: "unit_data_identity-retention-anonymization"
          - file: "backend/src/main/java/com/dreamy/identity/domain/audit/service/RetentionScheduler.java"
            line: "115-118"
            code_snippet: "qw.eq(getStatus,\"deleted\").lt(getDeletedAt,cutoff).last(\"LIMIT \"+BATCH) // 同类有界批量拉取（保留清理）"
            implementer: "unit_data_identity-retention-anonymization"
      counterpart:
        source: "hhspec/specs/design/code-patterns.md"
        location: "数据访问（无大数据集流式导出/批量轮询范式记录）"
        quote: "（现状无对应条目）"
      description: >-
        DEC-002 将 operation_log 导出由 native 游标流式（fetchSize=Integer.MIN_VALUE + ResultHandler）改为
        LambdaQueryWrapper + id 游标递减分页轮询（每页 EXPORT_PAGE_SIZE，lt(getId,lastId).orderByDesc(getId)
        .last("LIMIT N")，逐页 Consumer 回调写出、堆内常驻仅一页、强制时间窗上限保证轮询有界）。
        RetentionScheduler 的有界批量删除（LIMIT BATCH）与之同源思路。该「无 OFFSET 的 keyset 游标分页 +
        逐页回调 + 双终止条件（空页/不足一页）+ 强制窗口上界」是百万级数据集导出的通用 ORM 友好范式，
        宜沉淀供后续其他大表导出复用。本审查仅评估其 specs 沉淀价值，分页边界正确性已由 Code Reviewer 覆盖。
      impact: >-
        非缺陷。沉淀后让后续大表导出直接套用 keyset 游标避免 OFFSET 深分页与 OOM。不阻塞当次交付。
      recommendation: >-
        新增 CP-017 记录该 keyset 游标分页轮询导出范式（见 pattern_spec）。
      affected_implementer: "unit_data_identity-retention-anonymization"
      constraint_ids: ["DEC-002", "RM-102", "BLOCKER-5"]
      pattern_spec:
        pattern_name: "keyset 游标递减分页轮询导出范式（无 OFFSET 流式导出）"
        cp_number: "CP-017"
        type: "REUSABLE"
        scope: "全局（百万级大表的流式导出/批量处理）"
        description: >-
          while 循环每页用 LambdaQueryWrapper 按主键 id 游标递减拉取（lt(getId,lastId).orderByDesc(getId)
          .last("LIMIT N")），逐页经 Consumer<T> 回调写出后即丢弃，堆内常驻仅一页；双终止条件（空页 break /
          不足一页 break）；强制时间窗/范围上限保证轮询次数有界。每页查询独立从连接池借还，不持有长事务连接。
        problem_scenario: >-
          operation_log 百万行/月，原 selectList 全量进 List 必 OOM；OFFSET 深分页随页码线性劣化。
        usage_example: >-
          AuditService.streamForExport/fetchExportPage（operation_log 导出）；RetentionScheduler 有界批量
          删除（LIMIT BATCH）为同源思路。
        notes: >-
          依赖 id 自增与创建时序单调一致（若严格要求 created_at 顺序需加二级排序，参见 UNC-FUNC-001）；
          .last("LIMIT N") 的 N 必须为编译期常量（参见 FND-SEC-003，防注入）；数据量为页大小整倍数时末尾多一次
          空查询（无害，参见 FND-CODE-003）。


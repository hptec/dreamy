verdict: PASS
blocking: 0
warning: 1
info: 2

summary: >
  ORM 规范合规重构的性能审查。用户核心诉求"高并发"已通过 OTP Redis 分布式锁改造有效满足
  （锁粒度细化到 email，锁持有时间缩短至 STEP-01~03，REQUIRES_NEW 子事务让频控写入先于外层
  回滚提交）。A3 JOIN 改分步查询无 N+1（批量 IN），分页导出正确实施 keyset 游标递减。

  1 个 warning FND-PERF-001（REQUIRES_NEW 双连接占用）非阻塞，是为正确性做的权衡。
  2 个 info 是优化建议。OtpConcurrencyIT 运行时验证并发正确性，66 tests 全绿佐证无回归。

findings:
  - id: FND-PERF-001
    severity: warning
    category: resource_management
    title: REQUIRES_NEW 嵌套事务占用双 DB 连接，高并发下连接池压力增大
    location: >
      backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java:34,54
      每次 verifyOtp/verifyCodeOnly 进入 consumeValidCode 时，外层事务占 1 连接，
      内层调用 otpStateWriter.updateStatus/incrementAttempt（REQUIRES_NEW）再占 1 连接，
      峰值双连接并发持有时长约 50~100ms（校验 + 写入）
    impact: >
      假设连接池 20 连接，原并发容量约 200 req/s（100ms/req），REQUIRES_NEW 后降为 100 req/s
      （双连接）。若实际 OTP 验证峰值 > 100 req/s，需扩容连接池或改用队列削峰。
      但这是为修复 FND-CODE-001/SEC-001 blocking（@Transactional 回滚撤销频控写入 + 双消费）
      做的正确性权衡——频控失效的安全风险远大于连接池压力。
    recommendation: >
      监控生产 HikariCP 连接池 activeConnections 指标，若峰值接近 maxPoolSize 则扩容。
      或评估改用消息队列异步写入频控记录（复杂度高，非本次范围）。
    status: accepted_tradeoff

  - id: FND-PERF-002
    severity: info
    category: optimization_suggestion
    title: A3 分步查询批量 IN 正确无 N+1，但两次往返延迟略高于原 JOIN
    location: >
      backend/src/main/java/com/dreamy/identity/domain/role/service/RoleService.java:86-98
      permissionKeysOfRole：step1 查 role_permission 拿 permission_id list（1 次往返），
      step2 IN 查 permission 拿 perm_code list（1 次往返），无循环单查
    impact: >
      原 JOIN 单次往返约 5ms，分步查询 2 次往返约 10ms（网络延迟翻倍）。
      RoleService.permissionKeysOfRole 调用频率低（角色管理操作 + DataInitializer 启动时），
      10ms vs 5ms 对用户体验无感知，且 DEC-004 消除 native SQL JOIN 是合规约束，性能可接受。
    recommendation: >
      若后续角色权限查询成为热路径，可考虑 Redis 缓存 roleId→permCodes 映射（TTL 5min），
      减少 DB 往返。当前频率下无需优化。

  - id: FND-PERF-003
    severity: info
    category: optimization_suggestion
    title: 分页导出 keyset 游标递减正确，百万行约 1000 次查询可接受
    location: >
      backend/src/main/java/com/dreamy/identity/domain/audit/service/AuditService.java:68-95
      streamForExport：每页 1000 条（EXPORT_PAGE_SIZE），id < lastId 递减游标，
      时间窗强制≤92天（MAX_EXPORT_WINDOW_DAYS），不持有长事务连接（每页独立从池借还）
    impact: >
      百万行导出约 1000 次查询 * 10ms = 10s 总耗时，连接占用碎片化（每页 10ms），
      比原 @Select ResultHandler 流式（单连接持有 30s~60s）更友好。
      时间窗上限保证轮询次数有界（防无界全表扫描）。
    recommendation: >
      已有 operation_log(created_at) 索引支撑时间窗过滤，id 主键天然有序支撑游标递减。
      若后续导出频繁，可异步化（Job 队列 + 生成 CSV 文件供下载）避免 HTTP 长连接超时。
      当前同步导出够用。

context_notes:
  - OTP 高并发改造（用户核心诉求）：Redis 分布式锁 onIdLock("otp:verify", email) 按邮箱细粒度锁，
    持有时间缩短至 STEP-01~03（约 50ms，不含归并/开会话），比原 DB FOR UPDATE 行锁更适合高并发。
    REQUIRES_NEW 双连接是为正确性做的权衡（warning FND-PERF-001 已记录）。
  - A3 JOIN 改分步查询：批量 IN 无 N+1，2 次往返延迟可接受（info FND-PERF-002）。
  - 分页导出：keyset 游标递减 + 时间窗上限，轮询次数有界，连接占用碎片化，比流式更友好（info FND-PERF-003）。
  - DBConst 迁包/常量引用：编译期常量内联，对查询性能零影响（仅代码组织变化）。

test_coverage:

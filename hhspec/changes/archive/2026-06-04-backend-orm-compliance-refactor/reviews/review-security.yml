# ──────────────────────────────────────────────
# 不确定项
# ──────────────────────────────────────────────
uncertainties:
  - id: UNC-001
    description: |
      onIdLock 默认锁无 leaseTime，依赖 Redisson watchdog（默认 30s 续期）。JVM STW GC
      超续期间隔时锁可能提前释放，高负载下退化为无锁——此时 FND-SEC-004 表明 version 条件
      无法兜底，OTP 一次性语义将失守。需运行时核实 redisson.lockWatchdogTimeout 配置。
    requires_runtime_verification: true
  - id: UNC-003
    description: |
      FND-SEC-005：REQUIRES_NEW 嵌套事务峰值占用双连接，需运行时核实 HikariCP
      maximumPoolSize 相对 OTP 验证 QPS 是否留有余量，避免连接等待。
    requires_runtime_verification: true

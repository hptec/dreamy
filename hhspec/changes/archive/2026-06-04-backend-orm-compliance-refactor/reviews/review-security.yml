reviewer: l3_security_reviewer
reviewer_layer: craft
change_name: backend-orm-compliance-refactor
review_round: 2

# ──────────────────────────────────────────────
# 审查摘要
# ──────────────────────────────────────────────
summary: |
  第 2 轮复核聚焦上轮唯一 blocking（FND-SEC-001：onIdLock 锁释放先于 @Transactional
  提交，OTP consumed 状态窗口内可被并发重用）的修复闭环验证。

  修复核心：新增独立 @Service OtpStateWriter，updateStatus/incrementAttempt 标注
  @Transactional(REQUIRES_NEW)，使 consumed 状态在锁持有期间即独立提交（而非随外层
  事务）。复核确认：OtpStateWriter 为独立 bean 注入（非 self-invocation），REQUIRES_NEW
  代理生效；inner tx 在 consumeValidCode 返回前提交，锁在其后释放——consumed 状态在
  锁释放前已落盘。并发请求 B 取锁后 selectLatestPending 过滤 status='pending' 读不到
  该行 → 抛 OTP_EXPIRED。原竞态窗口已关闭。FND-SEC-001 标记 resolved。

  附带收益：incrementAttempt/locked 改 REQUIRES_NEW 后，频控写入不再随 BizException
  回滚而丢失（原 @Transactional 下 attempts++ 会被回滚，max-attempts 锁定形同虚设）。

  新增 2 条非阻塞发现：FND-SEC-004（warning）version 条件作为并发兜底实际无效（consumed
  update 不递增 version，真正防护全靠分布式锁+早提交，锁失效时无乐观锁兜底，与代码注释
  "@Version 乐观锁兜底"声明不符）；FND-SEC-005（info）REQUIRES_NEW 嵌套事务单次校验占用
  双连接，需关注连接池容量。保留 FND-SEC-002（warning）、FND-SEC-003（info）。

  无残留 blocking。

verdict: PASS

# ──────────────────────────────────────────────
# 上轮 blocking 修复验证（review_round > 1）
# ──────────────────────────────────────────────
fix_verification:
  - finding_id: FND-SEC-001
    status: FIXED
    verified_at:
      - file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java
        lines: 32~45
      - file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpService.java
        lines: 195~224
    analysis: |
      上轮根因：updateStatus("consumed") 在外层 @Transactional 内执行，COMMIT 发生在
      onIdLock 释放锁之后；READ COMMITTED 下并发请求 B 在锁释放后、外层提交前读到
      status=pending，导致同一 OTP 双消费。

      修复验证（逐项核实）：
      1. 提交时机 vs 锁释放时机【关键，已确认】：
         - OtpStateWriter 是独立 @Service（OtpService.java:54,64,73 构造注入），
           consumeValidCode 通过 otpStateWriter.updateStatus(...) 跨 bean 调用，
           Spring 事务代理生效（非 self-invocation，REQUIRES_NEW 不会失效）。
         - REQUIRES_NEW：挂起外层事务 → 开启新物理事务执行 consumed UPDATE → 内层
           事务在 updateStatus 方法返回前 COMMIT（落盘）。
         - onIdLock（IdLockSupport.java:27~37）finally 在 consumeValidCode 返回后才
           unlock。调用链：consumeValidCode → updateStatus(REQUIRES_NEW commit) → 返回
           → onIdLock finally unlock。
         - 结论：status=consumed 在锁释放之前已持久化到 DB。原"锁释放先于提交"窗口消除。

      2. 并发双消费场景推演【已确认安全】：
         - 请求 A 取锁 → consumeValidCode → updateStatus("consumed") 独立提交 → 返回
           → 释放锁。
         - 请求 B 此时才取到同一 email 锁 → selectLatestPending（OtpService.java:
           230~237）条件 status='pending'。A 已提交 consumed，B 在 READ COMMITTED 下
           读不到该行 → otp==null → 抛 OTP_EXPIRED（41001）。
         - consumedCount==1，与 OtpConcurrencyIT 断言一致。

      3. 频控写入回滚问题附带修复【确认改善】：
         - 原 incrementAttempt/locked 在外层 @Transactional 内，校验失败抛 BizException
           时外层回滚，attempts++ 丢失，max-attempts 锁定可被无限重试绕过。改 REQUIRES_NEW
           后频控写入独立提交，不受外层回滚影响（FND-CODE-001 同源修复，安全正向收益）。

      4. version 条件（OtpStateWriter.java:37~44）：
         consumed 路径传入 otp.getVersion() 作为 .eq(version, expectedVersion) 条件，
         返回 0 行抛 OTP_EXPIRED。锁正常工作时不会触发（B 读不到 pending 行）；真实价值
         仅在锁失效退化场景做最后兜底——但有局限，详见 FND-SEC-004。

      综合判定：FND-SEC-001 描述的竞态已彻底闭环（根本解法=方案 A，REQUIRES_NEW 早提交），
      非仅绕过或掩盖。标记 resolved。
    resolution: resolved

# ──────────────────────────────────────────────
# 发现列表
# ──────────────────────────────────────────────
findings:

  - id: FND-SEC-001
    severity: blocking
    category: OTP 并发安全 / 认证缺陷
    check_item: SEC-09
    root_cause: case_a_impl_bug
    status: resolved
    resolved_round: 2
    title: "onIdLock 锁释放先于 @Transactional 提交，OTP consumed 状态窗口内可被第二请求重用"
    resolution_note: |
      第 2 轮已闭环。修复采用上轮 remediation 方案 A：将 consumed/expired/locked/attempts++
      写入下沉到独立 @Service OtpStateWriter，标注 @Transactional(REQUIRES_NEW)，使状态在
      锁持有期间即独立提交。并发请求 B 取锁后 selectLatestPending 过滤 status='pending'
      读不到已 consumed 行，抛 OTP_EXPIRED。详见 fix_verification。
    # —— 以下为原始 blocking 记录（归档保留）——
    description: |
      [round 1] OtpService.verifyOtp / verifyCodeOnly 锁释放顺序先于事务提交存在竞态：
      onIdLock finally 在 consumeValidCode 返回后立即释放锁，此时外层 @Transactional 尚未
      COMMIT，DB 中 OTP 行 status 仍为 pending；第二并发请求取锁后 selectLatestPending
      读到同一 pending 行，将同一 OTP 消费第二次。updateStatus 当时无 version 条件，
      @Version 乐观锁仅覆盖 incrementAttempt，无法兜底。
    evidence:
      file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpService.java
      lines:
        - line: 146~170
        - line: 195~224
      attack_vector: |
        [round 1] 两并发请求竞争同一邮箱 OTP：A 置 consumed（事务未提交）→ 释放锁 →
        B 取锁读到 pending → 再次 consumed → 单枚 OTP 产出两个有效 session。
        [round 2 状态] 已修复：consumed 在锁内独立提交，B 读不到 pending 行。
    remediation: |
      [已实施，round 2] 方案 A：新增 OtpStateWriter（REQUIRES_NEW），consumeValidCode 全部
      状态写入改为跨 bean 调用，使 consumed 在锁释放前提交。consumed 路径附带 version 条件
      作退化兜底（局限见 FND-SEC-004）。

  - id: FND-SEC-004
    severity: warning
    category: OTP 并发安全 / 乐观锁兜底有效性
    check_item: SEC-09
    root_cause: case_a_impl_bug
    title: "consumed 路径的 version 条件无法作为真正的乐观锁兜底，与代码注释声明不符"
    description: |
      修复后真正消除并发双消费的是「分布式锁 + REQUIRES_NEW 早提交」，version 条件并非
      可靠兜底。两点局限：

      1. consumed 的 update 用 LambdaUpdateWrapper（update(null, wrapper)）显式 set
         status，并未 set version=version+1。MyBatis-Plus 的 OptimisticLockerInnerInterceptor
         仅在 updateById(entity) 路径自动追加 version+1 与 version 条件；对 update(null,
         wrapper) 形式，version 仅作为这里手写的 .eq 过滤条件存在，update 成功后 DB 中
         version 值不变。因此它不是一次"读-改-写"的乐观锁递增，而是"基于当前快照值的
         条件更新"。

      2. 退化场景兜底有限：若 Redis 锁失效（FND-SEC-002 故障 / UNC-001 watchdog 提前
         释放），A、B 可能并发进入 consumeValidCode 并读到同一 pending 行（同一 version）。
         二者 .eq(version, sameVersion) 条件都满足，updateStatus 不是原子 CAS 递增，
         数据库层面两条 UPDATE status='consumed' 均可成功（行已是 consumed，第二次仍
         affected rows=1），均不抛 OTP_EXPIRED → 双消费仍可能发生。version 条件只能挡住
         "B 在 A 之后读到的是 A 写入后的新 version"这一种情形，而 update 不递增 version，
         该情形不成立。

      影响范围：仅在分布式锁失效的退化路径下，且当前 fail-closed（Redis 不可用即抛异常，
      见 FND-SEC-002）已大幅压缩触发面，故定级 warning 而非 blocking。但 OtpStateWriter
      与 OtpService 注释均声称"version 条件保证并发双消费仅一次成功 / @Version 乐观锁兜底"，
      该声明在 update(null,wrapper) 不递增 version 的实现下不成立，存在误导后续维护者
      放松分布式锁防护的风险。
    evidence:
      file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java
      lines:
        - line: 32~45
      attack_vector: |
        前提：分布式锁失效（Redis 故障被容错降级，或 GC 暂停超 watchdog 致锁提前释放）。
        步骤：A、B 并发进入 consumeValidCode，selectLatestPending 各读到同一 pending 行
        （version=N）→ 各自 updateStatus("consumed", N)。因 update 不做 version+1 的 CAS，
        两条 UPDATE 在 DB 均 affected rows≥0/1，均不满足 rows==0 条件，均不抛 OTP_EXPIRED
        → 同一 OTP 被双消费。注：正常锁工作时此路径不可达。
    remediation: |
      二选一，使 version 兜底名实相符或移除误导：
      A（推荐，真正乐观锁）：consumed 改用 updateById(entity) 或在 wrapper 中显式
        .setSql("version = version + 1") 并保留 .eq(version, expectedVersion)，使其成为
        原子 CAS：仅一条并发 UPDATE 能命中旧 version 并成功递增，另一条 affected rows=0
        抛 OTP_EXPIRED，从而在锁失效时仍兜底单次消费。
      B（最小改动）：修正 OtpStateWriter / OtpService 注释，明确"并发双消费防护完全依赖
        分布式锁 + 锁内提交，version 条件仅为防御性快照校验，不构成锁失效场景的兜底"，
        避免后续维护者据错误注释放松锁防护。

  - id: FND-SEC-005
    severity: info
    category: OTP 并发安全 / 事务连接占用
    check_item: SEC-09
    title: "REQUIRES_NEW 嵌套事务单次校验占用双数据库连接，需关注连接池容量"
    description: |
      consumeValidCode 在外层 @Transactional 内调用 otpStateWriter 的 REQUIRES_NEW 方法时，
      外层事务被挂起但其数据库连接不归还连接池（Spring 持有以便恢复），内层 REQUIRES_NEW
      另取一条连接。即单次 OTP 校验在置 consumed/locked 期间峰值占用 2 条连接。

      不构成安全漏洞，亦无死锁风险（内层提交后立即释放，无交叉资源等待；锁顺序为
      Redis 锁→DB 连接单向获取）。仅在高并发 OTP 验证场景下对连接池容量提出更高要求：
      若 HikariCP maximumPoolSize 偏小，可能出现连接等待，间接影响可用性（DoS 放大面）。
    evidence:
      file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpStateWriter.java
      lines:
        - line: 32~56
      attack_vector: "不适用（非漏洞）。间接：高并发下连接池耗尽可放大可用性压力。"
    remediation: |
      无需代码修改。建议运行时核实 HikariCP maximumPoolSize 相对 OTP 验证 QPS 留有余量，
      避免嵌套事务双连接占用在峰值期触发连接等待。可纳入 UNC 由运行时验证。

  - id: FND-SEC-002
    severity: warning
    category: OTP 并发安全 / Redis 不可用降级
    check_item: SEC-09
    root_cause: case_b_design_gap
    status: open
    title: "Redis 不可用时 onIdLock 抛出未捕获异常，降级行为未文档化"
    description: |
      [保留自 round 1] onIdLock 调用 lock.lock()（无超时），Redis 不可用时 Redisson 抛
      RedisConnectionException，沿栈传播致 @Transactional 回滚，OTP 验证失败（fail-closed，
      安全侧）。但降级行为无显式文档；若未来有人"容错"该异常降级为无锁执行，将退化为
      FND-SEC-001 描述的并发绕过风险。round 2 复核：本轮修复未触及此项，依据 FND-SEC-004
      version 兜底局限，锁失效场景下 OTP 一次性语义无可靠兜底，本项重要性较 round 1 略升，
      但仍为 fail-closed，维持 warning。
    evidence:
      file: /System/Volumes/Data/Volumes/MAC/workspace/hitales-commons/huihao-redis/src/main/java/huihao/redis/IdLockSupport.java
      lines:
        - line: 27~37
      attack_vector: |
        不构成直接攻击向量。间接：Redis 故障时若被降级为无锁 OTP 验证，叠加 FND-SEC-004
        version 兜底失效，可允许并发重用攻击。
    remediation: |
      在 OtpService 注释或 error-strategy 中明确 Redis 不可用为 fail-closed。如需有限降级，
      捕获 RedisConnectionException 记 ALERT 日志并抛 503，禁止降级为无锁执行。

  - id: FND-SEC-003
    severity: info
    category: 输入验证
    check_item: SEC-01
    status: open
    title: ".last(\"LIMIT 1\") 字符串字面量——无注入风险，建议注释说明"
    description: |
      [保留自 round 1] selectLatestPending 与 AuditService.fetchExportPage 用
      .last("LIMIT " + 编译期常量)。拼接值均为 private static final 或字面量，无用户可控
      输入，无注入。标记 info 提示后续维护者勿替换为运行时变量。
    evidence:
      file: backend/src/main/java/com/dreamy/identity/domain/otp/service/OtpService.java
      lines:
        - line: 230~237
      attack_vector: "不适用（无用户可控输入，非漏洞）"
    remediation: |
      无需修改。建议在 last() 处注释注明参数为编译期常量。


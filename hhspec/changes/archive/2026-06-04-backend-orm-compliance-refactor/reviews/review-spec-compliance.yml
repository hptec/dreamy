  # 发现列表（按严重度排序）
  findings:
    - id: "FND-SPEC-001"
      severity: "warning"
      category: "code_patterns"
      check_item: "SPEC-01"
      title: "13 个 Mapper 继承 BaseMapper 而非规范要求的 GenericMapper"
      evidence:
        file: "backend/src/main/java/com/dreamy/identity/domain/user/repository/UserMapper.java"
        line: "12"
        code_snippet: "public interface UserMapper extends BaseMapper<UserEntity> {"
      counterpart:
        source: "lib/tech/java/orm/mybatis-plus-mysql/02-repository-design.md"
        location: "§一 Mapper 接口定义 / 04-best-practices.md §八 检查清单"
        quote: "继承 GenericMapper<T> 而非 BaseMapper<T>；GenericMapper 提供了分区表支持和批量操作增强；必须实现 getType() 方法返回实体类型"
      description: >
        全部 13 个 Mapper（UserMapper、UserIdentityMapper、OtpCodeMapper、UserSessionMapper、
        AdminSessionMapper、AdminUserMapper、RoleMapper、PermissionMapper、RolePermissionMapper、
        OperationLogMapper、LoginHistoryMapper、AuthConfigMapper、EmailTemplateMapper）均直接继承
        MyBatis-Plus 原生 BaseMapper，未继承 huihao-mysql 的 GenericMapper，也未实现 getType()。
        规范 02-repository-design §一为示例性"说明"语气（非 MUST/SHALL），且本变更聚焦
        LambdaQueryWrapper/native SQL/DBConst 四项核心 ORM 合规，Mapper 基类选型不在 decision.md
        变更范围内。按严重度映射（无 MUST 关键字）判定为 warning，不阻断本次合规判定。
      impact: >
        当前实体均未使用 @Partition 分区，未走 PartitionedRepository，BaseMapper 功能上可满足
        现有查询；但若后续引入分区表或框架级批量增强，需补继承 GenericMapper。属技术债，非功能缺陷。
      recommendation: >
        后续统一重构时将 13 个 Mapper 改继承 huihao.mysql.mapper.GenericMapper<T> 并实现
        default Class<T> getType()，或在 specs 中显式记录"本项目不使用分区、Mapper 沿用 BaseMapper"的例外决策。
      affected_implementer: "unit_identity_identity-data-detail"
      constraint_ids: ["RM-001", "RM-020", "RM-100"]

    - id: "FND-SPEC-002"
      severity: "info"
      category: "code_patterns"
      check_item: "SPEC-01"
      title: "普通字段省略 @TableField 注解，依赖驼峰→下划线自动映射"
      evidence:
        file: "backend/src/main/java/com/dreamy/identity/domain/user/entity/UserEntity.java"
        line: "28-61"
        code_snippet: "@Column(name = UserDBConst.EMAIL, definition = \"...\")\\n    private String email;  // 无 @TableField"
      counterpart:
        source: "lib/tech/java/orm/mybatis-plus-mysql/01-entity-design.md"
        location: "§三 @Column 注解 / 注解搭配规则"
        quote: "普通字段: @Column + @TableField 双注解共存"
      description: >
        规范 01-entity-design §三示例普通字段使用 @Column + @TableField 双注解。实际实现中普通字段
        仅保留 @Column（提供建表 DDL），列名映射依赖 MyBatis-Plus 默认 map-underscore-to-camel-case
        自动转换；仅对 SQL 保留字（group → @TableField("`group`")）和 @Version 字段（显式声明）补 @TableField。
        该写法语义正确（@Column.name 已引用 DBConst 常量，驼峰字段名与下划线列名严格对应），且 66 tests
        全绿证明映射正确。规范该条为示例性描述非 MUST，判定为 info。
      impact: >
        无功能影响。字段重命名时 @Column.name 仍由 DBConst 常量集中管理，自动映射与显式映射结果一致。
      recommendation: >
        如需与规范示例完全对齐，可对普通字段补 @TableField(常量) 双注解；当前自动映射方案可接受，建议在
        团队内统一约定后保持一致即可。
      affected_implementer: "unit_identity_identity-data-detail"
      constraint_ids: ["MAP-001"]

  # 不确定性
  uncertainties:
    - id: "UNC-SPEC-001"
      question: >
        DBConst 常量值（如 user_session 表 access_expires_at、operation_log 表 changes 等）是否与真实
        MySQL 物理表的列名逐一一致，无法仅凭代码静态确认（数据库在 docker pd-mysql 容器内）。
      impact: >
        若 DBConst 常量值与物理列名不符，建表 DDL（@Column.definition）与 DML 仍以实体注解为准会一致，
        但风险极低——@Column.name 与 DBConst 同源，且 66 tests（含集成测试）全绿已间接验证读写映射正确。
      suggestion: >
        如需 100% 确认，可在 pd-mysql 容器执行 SHOW COLUMNS FROM <table> 与 13 个 DBConst 逐表比对；
        当前证据（测试全绿 + 注解同源）已足以支撑 PASS 判定。


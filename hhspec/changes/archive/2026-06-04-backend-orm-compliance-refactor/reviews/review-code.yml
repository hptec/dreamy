fix_verification:
  - finding_id: FND-CODE-001
    status: FIXED
    verified_at_location: OtpStateWriter.java:32-56 / OtpService.java:54,64,73,204,212,216,223
    evidence: |
      OtpStateWriter 为独立 @Service Bean，经构造器注入 OtpService（line 54/64/73），
      调用形式 otpStateWriter.updateStatus(...) / otpStateWriter.incrementAttempt(...)，
      走 Spring 代理而非 this 自调用 → REQUIRES_NEW 真实生效（避开自调用陷阱）。
      两写入方法均标 @Transactional(propagation = REQUIRES_NEW)，挂起外层 verifyOtp 事务并独立提交，
      随后 consumeValidCode 抛 BizException 仅回滚外层事务，attempts++/locked 已先行落库。
      V-001 防暴力破解恢复：attempts 持续递增，达 maxAttempts 置 locked 持久生效。
  - finding_id: FND-CODE-002
    status: FIXED
    verified_at_location: OtpStateWriter.java:50-56
    evidence: |
      incrementAttempt 改为 update(null, lambdaUpdate().eq(id).setSql("attempts = attempts + 1"))，
      单条原子 UPDATE，无 select-then-update、无 @Version 读取依赖；
      叠加 REQUIRES_NEW 子事务独立连接，MyBatis 一级缓存 stale version 路径被彻底规避。
      原 select-then-update 私有方法已删除（OtpService 中无残留）。


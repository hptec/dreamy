    note: >-
      REQUIRES_NEW 会在外层事务持有连接期间额外占用一个连接（子事务独立连接）。
      单次 verifyOtp 仅嵌套一层，连接占用 +1，常规连接池（HikariCP 默认 10）下无压力；
      极端高并发同邮箱因 Redis 锁串行，不会放大连接占用。运行时连接池配置未读，标记为低风险不确定项。


        L1 契约 PageParam 定义 page 从 1 开始(min=1/default=1)，且 Paginated.page_number 示例为 1；
        API 详设 §1.2/§2.2 写 page≥0 默认 0(Spring Pageable 0-based 习惯)。两者起始基数不一致，
        若 L3 直接按详设以 0 为首页会与契约/前端页码(1-based)产生 off-by-one。非阻塞(可在 L3 用 PageRequest.of(page-1) 适配)，但建议统一。
      recommendation: |
        统一为契约的 1-based：API 详设 §1.2/§2.2 改为 page(≥1,默认1)，L3 内部转 Spring Pageable 时减 1；
        或在 shared-contracts.yml 显式声明"对外 1-based，内部 0-based 适配"约定，前后端共识。

      check_item: "CMP-04 / IMP-09"
      severity: "MUST_FIX"
      title: "external_gateway_config 缺少 consecutive_failures 字段与降级状态机"
      evidence:
        source: "specs/design/i18n-backend-data-detail.md"
        location: "§1.1 external_gateway_config DDL"
        quote: "DDL 字段无 consecutive_failures 列（grep 结果为空）"
      counterpart:
        source: "specs/architecture/error-strategy.md"
        location: "§L2设计要求 第2点 + EDGE-014 降级矩阵 line 145"
        quote: "给出 ExternalGatewayConfig 实体的 consecutive_failures 字段（INT DEFAULT 0）与定时任务降级逻辑的状态机定义 / 连续失败≥3次降级 manual + enabled→false + 告警"
      description: |
        L1 error-strategy 明确要求 L2 给出 consecutive_failures 字段与"定时刷新连续失败3次自动降级"状态机（决策5 / EDGE-014 / TC-RESILIENCE-0006）。
        数据层 DDL 未定义该列，TC-RESILIENCE-0006（连续3次失败降级）与 gateway_degradation.model_sync_failure（retry_count:3, fallback_strategy:manual）无字段支撑，无法实现计数与降级判定。
      recommendation: |
        在 external_gateway_config DDL 增加 consecutive_failures INT NOT NULL DEFAULT 0 COMMENT '模型同步连续失败次数'；
        在数据/错误详设补降级状态机：成功清零→失败+1→>=3 时 model_refresh_strategy=1(manual) 且 enabled=0 并触发告警。
      assigned_to: "Designer-Data"
      remediation:
        steps:
          - "DDL 增 consecutive_failures 列"
          - "补降级状态机定义（计数/阈值/清零/告警动作）"
        template: "consecutive_failures INT NOT NULL DEFAULT 0"
        affected_section: "i18n-backend-data-detail.md:§1.1 + i18n-backend-error-mapping.yml:§5 model_sync_failure"


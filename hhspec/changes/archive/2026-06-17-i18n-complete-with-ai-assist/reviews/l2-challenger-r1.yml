    - id: "ISS-L2C-008"
      dimension: "consistency"
      check_item: "CST-01"
      severity: "MUST_FIX"
      title: "网关创建端点入参验证误用实体列名 api_key_encrypted 替代契约请求字段 api_key"
      evidence:
        source: "specs/design/i18n-backend-api-detail.md"
        location: "§1.1 入参验证"
        quote: "api_key_encrypted(必填,≥10)"
      counterpart:
        source: "specs/architecture/api-contracts/gateway-api.openapi.yml"
        location: "lines 384-390 GatewayConfigUpsert"
        quote: "api_key: type: string minLength:1 maxLength:512 ... 明文输入，后端 AES 加密存储"
      description: |
        请求体契约字段为 api_key（明文，1~512），api_key_encrypted 是数据库密文列名（data-detail §1.1）。
        入参验证将请求字段写成 api_key_encrypted 且约束(≥10)与契约(minLength:1,maxLength:512)不符，

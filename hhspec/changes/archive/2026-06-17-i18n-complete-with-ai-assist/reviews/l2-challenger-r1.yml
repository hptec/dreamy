      dimension: "consistency"
      check_item: "CST-12 / IMP-06"
      severity: "MUST_FIX"
      title: "ai_translation_log.status 枚举值在数据层与错误/测试层不一致"
      evidence:
        source: "specs/design/i18n-backend-data-detail.md"
        location: "§1.2 ai_translation_log DDL line 52"
        quote: "status TINYINT NOT NULL COMMENT 'success(1)/failed(2)'"
      counterpart:
        source: "specs/architecture/error-strategy.md"
        location: "§L2设计要求 第3点"
        quote: "给出 ai_translation_log.status 枚举映射（success=1 / failed=2 / timeout=3 / empty_result=4 / rate_limited=5）"
      description: |
        L1 要求 status 含 5 个枚举值；数据层只定义 2 个（success/failed）。
        测试骨架 TC-UNIT-0015 / TC-RESILIENCE-0001~0003 与 error-mapping 矩阵分别用到 status=empty_result/timeout/rate_limited/gateway_error，
        与 DDL 注释的 2 值定义冲突，L3 实现枚举映射会缺值，状态判定与日志统计失真。
      recommendation: |
        统一 status 枚举为 success=1/failed=2/timeout=3/empty_result=4/rate_limited=5（与 error-strategy 一致），
        在数据详设 DDL 注释与 §7 数据校验同步更新，error-mapping 矩阵中 gateway_error 归并到 failed=2 或单列说明。
      assigned_to: "Designer-Data"
      remediation:
        steps:
          - "DDL status 注释扩展为 5 值"
          - "与 test-skeleton/error-mapping 的 status 文案逐一对齐（消除 gateway_error 等未编号态）"
        template: "status TINYINT 'success(1)/failed(2)/timeout(3)/empty_result(4)/rate_limited(5)'"
        affected_section: "i18n-backend-data-detail.md:§1.2 + §7"

    - id: "ISS-L2C-006"
      dimension: "implementability"
      check_item: "IMP-12 / 安全"
      severity: "MUST_FIX"
      title: "API Key AES-256-GCM 密钥来源与轮转方案未定义"
      evidence:
        source: "specs/design/i18n-backend-api-detail.md"
        location: "§6.1 API Key加密/解密/掩码模式"
        quote: "cipher = AES-256-GCM(plainText, secretKey, iv) —— secretKey 来源未说明"
      counterpart:
        source: "specs/architecture/error-strategy.md"
        location: "§L2设计要求 第5点"
        quote: "明确 API Key AES-256-GCM 加密的密钥管理方案（存环境变量 GATEWAY_ENCRYPTION_KEY / Spring Cloud Config / Vault，密钥轮转策略）"
      description: |
        伪代码使用 secretKey 但未定义其来源、长度（256bit）、配置项名、轮转与历史密钥兼容策略。
        这是 FUNC-007（密文存储）安全核心，密钥硬编码或缺失会导致解密失败（422202）或密钥泄露风险，L3 无法安全落地。
      recommendation: |
        在 §6.1 补：密钥从环境变量 GATEWAY_ENCRYPTION_KEY 读取（Base64 32字节），启动时校验长度；
        定义轮转策略（密文前缀标记 key 版本，解密时按版本选 key，旧密文渐进重加密）；
        密钥缺失/非法时启动失败 fail-fast，禁止默认硬编码 key。
      assigned_to: "Designer-API"
      remediation:
        steps:
          - "补密钥来源(env GATEWAY_ENCRYPTION_KEY)、长度校验、fail-fast"
          - "补密钥版本前缀与轮转兼容方案"
        template: "encrypted = base64(keyVersion || iv || cipher)；解密按 keyVersion 选 key"
        affected_section: "i18n-backend-api-detail.md:§6.1"


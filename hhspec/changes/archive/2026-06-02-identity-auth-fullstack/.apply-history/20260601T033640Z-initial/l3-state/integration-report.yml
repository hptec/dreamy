findings:
  - id: B-01
    severity: blocking
    dimension: ICK-03-D
    title: "store 认证配置公开端点：控制器实路径与过滤器白名单不一致，登录页读取配置被 401 阻断"
    affected_units: [unit_backend, unit_portal_store]
    target_implementer: unit_backend
    side_a:
      desc: "后端控制器实际暴露路径 + 前端调用路径（二者一致）"
      backend_evidence: "backend/store/.../StoreAuthController.java:31 @RequestMapping(\"/api/store/auth\") + :99 @GetMapping(\"/config\") ⇒ 实路径 GET /api/store/auth/config"
      frontend_evidence: "frontend/portal-store/lib/api/auth-api.ts:49 request('/api/store/auth/config', {method:'GET'})（getStoreAuthConfig，无 auth:true，公开调用）"
    side_b:
      desc: "后端过滤器公开白名单 + OpenAPI 契约（二者一致，但与 side_a 路径不同）"
      filter_evidence: "backend/store/.../StoreJwtFilter.java:94 isPublic() 仅放行 path.equals(\"/api/store/config/auth\")"
      contract_evidence: "api-contracts/identity-api.openapi.yml:173 /api/store/config/auth (operationId getStoreAuthConfig, security: [])"
    impact: >
      StoreJwtFilter.shouldNotFilter 仅在非 /api/store/ 前缀时跳过（:39-42），故 /api/store/auth/config 会进入 doFilterInternal；
      isPublic() 不匹配实路径 → 落入 :64-68 header==null 分支 → writeUnauthorized 返回 {code:40100} 401。
      登录页在用户尚无 token 时读取登录方式开关（FUNC-006/FUNC-003），将稳定收到 401，
      OAuth 按钮显隐与 OTP 策略无法加载（authConfigStore 降级仅 email，oauth-buttons 永久隐藏），属功能阻断。
    upstream_ref: "L1 OpenAPI（authoritative）定义路径为 /api/store/config/auth；portal-store trace-map:244 记录 FE 按后端控制器实路径 /api/store/auth/config 适配（E-01 证据优先）。"
    route_level: Level_1
    route_basis: >
      Level 1：L1 OpenAPI 对该端点有明确定义（/api/store/config/auth），为唯一权威标准。
      当前后端内部即自相矛盾（控制器走 /api/store/auth/config，过滤器白名单走 /api/store/config/auth），
      无论选哪条路径，过滤器白名单与控制器路径必须收敛一致，否则公开端点必 401。
    resolution:
      summary: "由 unit_backend 统一 store 认证配置端点路径，使 控制器 / 过滤器白名单 / OpenAPI / 前端 四处一致。"
      option_A_align_to_contract:
        desc: "回归 L1 权威路径（推荐符合 Level 1）"
        changes:
          - "StoreAuthController.java:99 @GetMapping(\"/config\") → 移出 /api/store/auth 组，改映射 /api/store/config/auth（控制器需调整 @RequestMapping 或用绝对路径）"
          - "frontend/portal-store/lib/api/auth-api.ts:49 路径改回 '/api/store/config/auth'"
          - "StoreJwtFilter 白名单已是 /api/store/config/auth，无需改"
      option_B_align_to_impl:
        desc: "承认 FE+BE 已收敛的实路径，最小改动修复阻断（需同步契约）"
        changes:
          - "StoreJwtFilter.java:94 白名单 '/api/store/config/auth' → '/api/store/auth/config'（与控制器实路径一致，解除 401）"
          - "同步修订 api-contracts/identity-api.openapi.yml:173 路径为 /api/store/auth/config，消除契约漂移"
      recommended: option_B_align_to_impl
      recommended_reason: >
        FE 与 BE 控制器已就 /api/store/auth/config 收敛并在 trace-map 记录为有据适配（E-01）；
        option_B 仅 1 行后端过滤器修正即可解除阻断，附带同步 OpenAPI 消除漂移，回归风险最低。
        option_A 需同时改控制器+前端两处且重新验证 build，回归面更大。最终路径选择由 L3 Coordinator 裁定。


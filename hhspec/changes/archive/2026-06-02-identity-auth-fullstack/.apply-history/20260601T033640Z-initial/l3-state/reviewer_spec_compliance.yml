findings:
  # ─── SPEC-09: 原生 SQL 禁用 ───────────────────────────────────────────────
  - level: blocking
    description: >
      OtpService.java:177 使用 UpdateWrapper 时以硬编码字符串列名调用
      `.eq("id", id).set("status", status)`，违反 SPEC-09 要求的
      "所有 QueryWrapper/UpdateWrapper 列名必须使用 Lambda 引用（方法引用）而非字符串字面量"。
      同文件其余 LambdaUpdateWrapper 用法（第 80-83 行）均已正确使用 Lambda 引用，
      唯独 updateStatus() 私有方法降级为普通 UpdateWrapper + 字符串列名。
    location: "backend/common/src/main/java/com/dreamy/identity/common/domain/service/OtpService.java:174-178"
    affected_units: [unit_backend]

  # ─── SPEC-01: @Select 原生 SQL 使用 ─────────────────────────────────────
  - level: warning
    description: >
      UserMapper.java 和 OtpCodeMapper.java 使用 @Select 注解编写原生 SQL，
      RolePermissionMapper.java 同样使用 @Select。
      code-patterns.md CP-012 要求行锁串行化使用 SELECT ... FOR UPDATE，
      MyBatis-Plus 的 LambdaQueryWrapper 不支持 FOR UPDATE 语法，
      因此 OtpCodeMapper.lockPendingByEmail 使用 @Select 是有充分技术理由的（TX-001 约束）。
      UserMapper 的两个 @Select 查询（findByEmailActive / findDeletedBefore）
      同样因 MyBatis-Plus 无法表达 status <> 'anonymized' 和 LIMIT 组合而使用原生 SQL，
      属于合理例外。RolePermissionMapper.listKeysByRoleId 仅查单列，
      QueryWrapper selectMaps 可替代但差异极小。
      整体评估：@Select 使用均有技术必要性，无 JOIN，无聚合查询，不构成 blocking 违规；
      标记 warning 供人工确认是否需要补充注释说明例外理由。
    location: >
      backend/common/src/main/java/com/dreamy/identity/common/repository/mapper/OtpCodeMapper.java:16,
      backend/common/src/main/java/com/dreamy/identity/common/repository/mapper/UserMapper.java:19,23,
      backend/common/src/main/java/com/dreamy/identity/common/repository/mapper/RolePermissionMapper.java:18
    affected_units: [unit_backend]

  # ─── SPEC-01: DBConst 缺失 ───────────────────────────────────────────────
  - level: warning
    description: >
      code-patterns.md 未明确要求 DBConst 常量文件（该要求来自
      lib/tech/java/orm/mybatis-plus-mysql/04-best-practices.md 第九章，
      不在本次 specs_files 范围内）。
      但 OtpService.java:177 的字符串列名 "id"/"status" 是可观测的硬编码风险点，
      建议将 updateStatus() 改为 LambdaUpdateWrapper 以消除该风险，
      无需引入独立 DBConst 文件。
    location: "backend/common/src/main/java/com/dreamy/identity/common/domain/service/OtpService.java:174-178"
    affected_units: [unit_backend]


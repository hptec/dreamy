openapi: 3.0.3
info:
  title: Fabric Care Module API
  version: 0.1.0-draft
  description: |
    API 契约草案 - 基于 domain-data-model 和 operation-paths 推断
    变更名称：fabric-care-module
    生成时间：2026-06-14T08:00:00Z
    置信度：medium（基于原型推断，需业务方确认）

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境

tags:
  - name: customer
    description: 客户管理
  - name: admin
    description: 管理员管理
  - name: auth
    description: 认证授权
  - name: role
    description: 角色权限
  - name: navigation
    description: 导航配置
  - name: log
    description: 操作日志

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: 管理员登录
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@dreamy.com
                password:
                  type: string
                  format: password
                  example: "******"
                remember:
                  type: boolean
                  default: false
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token
                  admin:
                    $ref: '#/components/schemas/AdminProfile'
        '401':
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /customers:
    get:
      tags: [customer]
      summary: 客户列表查询
      operationId: listCustomers
      parameters:
        - name: tier
          in: query
          schema:
            type: string
            enum: [all, VIP, 常规]
            default: all
          description: 客户等级筛选
        - name: search
          in: query
          schema:
            type: string
          description: 搜索姓名或邮箱
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 客户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /customers/{id}:
    get:
      tags: [customer]
      summary: 客户详情
      operationId: getCustomerDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 客户详细信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetail'
        '404':
          description: 客户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /customers/{id}/force-offline:
    post:
      tags: [customer]
      summary: 强制客户下线
      operationId: forceCustomerOffline
      description: 对应 OP-004
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 操作成功
        '400':
          description: 操作失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admins:
    get:
      tags: [admin]
      summary: 管理员列表
      operationId: listAdmins
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 管理员列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [admin]
      summary: 新增管理员
      operationId: createAdmin
      description: 对应 OP-001（弹窗新增）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                role_ids:
                  type: array
                  items:
                    type: integer
                  description: 角色ID列表
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListItem'
        '400':
          description: 邮箱已存在或参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /roles:
    get:
      tags: [role]
      summary: 角色列表
      operationId: listRoles
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'

    post:
      tags: [role]
      summary: 新增角色
      operationId: createRole
      description: 对应 OP-006
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 50
                permissions:
                  type: array
                  items:
                    type: string
                  description: 权限点标识列表
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /navigation:
    get:
      tags: [navigation]
      summary: 导航配置列表
      operationId: listNavigationItems
      responses:
        '200':
          description: 导航项列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationItem'

  /auth-settings:
    put:
      tags: [auth]
      summary: 保存认证配置
      operationId: updateAuthSettings
      description: 对应 OP-002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                google_enabled:
                  type: boolean
                apple_enabled:
                  type: boolean
                session_timeout:
                  type: integer
                  description: 会话超时时间（分钟）
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 操作成功
        '400':
          description: 操作失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /operation-logs:
    get:
      tags: [log]
      summary: 操作日志列表
      operationId: listOperationLogs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 日志列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationLog'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /operation-logs/export:
    get:
      tags: [log]
      summary: 导出操作日志
      operationId: exportOperationLogs
      description: 对应 OP-005
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv]
            default: csv
      responses:
        '200':
          description: CSV 文件流
          content:
            text/csv:
              schema:
                type: string
                format: binary

components:
  schemas:
    CustomerListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        tier:
          type: string
          enum: [VIP, 常规]
        registration_date:
          type: string
          format: date-time
        order_count:
          type: integer
        total_spent:
          type: number
          format: decimal
        status:
          type: string
          enum: [active, inactive, blocked]

    CustomerDetail:
      allOf:
        - $ref: '#/components/schemas/CustomerListItem'
        - type: object
          properties:
            google_linked:
              type: boolean
            apple_linked:
              type: boolean
            last_login:
              type: string
              format: date-time

    AdminListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    AdminProfile:
      allOf:
        - $ref: '#/components/schemas/AdminListItem'
        - type: object
          properties:
            permissions:
              type: array
              items:
                type: string

    Role:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        permissions:
          type: array
          items:
            type: string

    NavigationItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        href:
          type: string
        order:
          type: integer

    OperationLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        operator:
          type: string
        action:
          type: string
        target:
          type: string
        ip:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

boundaries:
  in_scope:
    - 商品编辑页（ProductEdit.vue）的面料护理信息编辑
    - 面料成分多层次编辑（Shell/Lining/Overlay/Trim）
    - ISO 3758护理标签选择器
    - 后端结构化存储（3张表）
    - 消费端PDP展示组件（待实现）

  out_of_scope:
    - 现有商品的批量数据迁移工具
    - 消费端PDP展示组件的实现（本期不涉及store门户）
    - 面料护理信息的搜索和筛选功能
    - 护理符号的自定义上传功能
    - 多语言版本（仅支持中英文）

dependencies:
  external_libraries:
    frontend:
      - name: "@headlessui/vue"
        version: "^1.7.0"
        usage: Tab、Disclosure组件

      - name: "vue"
        version: "^3.3.0"
        usage: 组件框架

    backend:
      - name: "mybatis-plus"
        version: "3.5.x"
        usage: 数据访问层

      - name: "spring-boot"
        version: "3.x"
        usage: 后端框架

  internal_modules:
    - module: product
      reason: 面料护理信息属于商品领域的扩展

    - module: api
      reason: 新增REST API端点

estimated_impact:
  lines_of_code:
    frontend_new: ~1200
    backend_new: ~800
    tests_new: ~600
    total: ~2600

  file_count:
    frontend_new: 6
    backend_new: 12
    database_new: 1
    assets_new: 38
    tests_new: 4
    total: 61

  complexity:
    frontend: medium
    backend: low
    database: low
    overall: medium

risks:
  - risk: ISO 3758符号SVG资源获取
    mitigation: 使用免费图标库或Unicode字符替代

  - risk: 百分比校验复杂度
    mitigation: 前后端双重校验，前端实时反馈

  - risk: 现有商品数据向后兼容
    mitigation: 允许面料信息为空，不强制填写

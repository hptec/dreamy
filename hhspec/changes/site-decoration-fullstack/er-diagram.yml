  notes: |
    字段类型用 Java 类型（Long/String/Boolean/Integer/LocalDateTime/JSON/enum）。
    新建实体 meta.source=new；引用已有实体 meta.source=baseline。
    增量对齐型变更：基线已有 Banner/BannerTranslation/RealWedding/CacheInvalidationLog/NewsletterSubscriber 等；
    本变更新增首页区块/导航/页脚/公告/订阅者域实体，并复用 Banner position=HERO 作为 Hero 区块数据源（KD-2）。
    跨 domain 引用通过 Service 接口调用，不跨表查询（KD-BE-5）。
    第 2 轮 grounding 复核修正：Taxonomy 引用基线实体（GRD-002）；Subscriber 简化为单态订阅（KD-12/GRD-001）；
    NewsletterSource 扩展 IntEnum HOME_BLOCK(4)（KD-13/GRD-009）；Banner 新增 cta_text_secondary/cta_link_secondary（KD-14/GRD-010）；
    MarketingCacheService.Family 新增 3 个族（GRD-004）；Publisher 新增 3 个 TYPE_* 常量 + 代码分支（GRD-005）；
    MarketingExceptionHandler assignableTypes 登记 3 个新 Controller（GRD-006）；DataInitializer 新增 /site/announcement 权限种子（GRD-007）；
    CacheInvalidationLog 基线字段全面修正（GRD-W06）；新实体统一 extends LongAuditableEntity + 物理删除（GRD-W07）；
    event_type 命名统一 _changed 后缀（GRD-005）。
    第 3 轮 grounding 复核修正（KD-16 落地）：GRD2-001 移除 5 个翻译表实体（HomeSectionTranslation/NavigationTranslation/FooterColumnTranslation/FooterLinkTranslation/AnnouncementTranslation），
    HomePageSection/NavigationItem/FooterColumn/FooterLink/Announcement 5 个主实体新增 i18n_json JSON 列（JacksonTypeHandler + autoResultMap=true，对齐 Category.attrOverrides 模式）；
    GRD2-002 修正 HomePageSection.data_json 描述（Newsletter 文案存 i18n_json，Hero/Announcement 数据从其他域派生）；
    GRD2-003 方案 A：NewsletterSubscriber 唯一约束从 uk_newsletter_email(email) 迁移到 uk_newsletter_email_source(email, source) 复合唯一，保证 KD-13 source 数据完整性。
    KD-16 决策覆盖 KD-3 和 GRD-W08：不建独立 *_translations 表，GRD-W08 推荐的 FooterColumnTranslation/FooterLinkTranslation 不采纳。


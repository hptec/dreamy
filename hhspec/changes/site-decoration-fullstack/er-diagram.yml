constraints:
  - id: CONSTRAINT-001
    type: assignable_types_registration
    desc: 'GRD-006 MUST_FIX：新增 AdminHomeSectionController/AdminNavigationController/AdminAnnouncementController 三个 Controller 必须登记到 MarketingExceptionHandler @RestControllerAdvice(assignableTypes={...}) 注解列表（详见 modified_entities.MarketingExceptionHandler.changed_assignable_types）'
    rationale: '基线 MarketingExceptionHandler 用 assignableTypes 显式枚举 10 个 marketing 域 Controller（不依赖 basePackages 包扫描），新 Controller 不登记则 MarketingException 穿透到 identity GlobalExceptionHandler，返回的错误结构与 marketing 域契约不符（如 422704 字段级结构、409703 内容状态码等）'
    enforcement: '代码审查 + 启动期校验（建议补 ApplicationContextInitializedEvent 监听器扫描 marketing 域 Controller 是否全部在 assignableTypes 列表内）'

  - id: CONSTRAINT-002
    type: enum_naming_convention
    desc: 'GRD-005：所有缓存失效 event_type 命名统一 _changed 后缀（home_section_changed/navigation_changed/announcement_changed），对齐基线 banner_changed/blog_changed 等命名；er-diagram 与 state-machine 中不允许出现 _saved 后缀'
    rationale: '基线 logInvalidation(type,...) 的 type 参数与 MQ 事件 type 同字符串，基线 publisher 6 个 TYPE_* 常量均为 _changed 后缀，命名一致性保证日志检索与 MQ 路由正确'
    enforcement: '代码审查 + 单元测试断言 event_type 集合 ⊆ {banner_changed, blog_changed, wedding_changed, lookbook_changed, guide_changed, flash_sale_changed, home_section_changed, navigation_changed, announcement_changed}'

  - id: CONSTRAINT-003
    type: in_process_cache_invalidation
    desc: 'GRD-W01：HomeBuilder/NavigationConfig/Announcement 保存后的缓存失效走 in-process cache.invalidateFamily + publisher.publish，不允许 HTTP 自调 POST /api/admin/cache/invalidate'
    rationale: '基线 Banner 失效链是 in-process 调用（MarketingAfterCommitRunner 事务提交后触发 publisher.publish → cacheService.logInvalidation + cdnService.invalidatePaths），HTTP 自调引入额外网络开销且破坏事务一致性'
    enforcement: '代码审查 + 集成测试断言 AdminHomeSectionService.save 后无 HTTP 调用 /api/admin/cache/invalidate（MockMvc 断言）'

  - id: CONSTRAINT-004
    type: physical_delete
    desc: 'GRD-W07：新建实体（HomePageSection/NavigationItem/FooterColumn/FooterLink/Announcement/Subscriber）统一 extends LongAuditableEntity + 物理删除（无 deleted_at 字段）。GRD2-001/KD-16：不建独立 *_translations 表，多语言文案存主表 i18n_json JSON 列'
    rationale: '配置类实体误删可重建（管理端有保存按钮）；与基线 Category（软删除）/Banner（软删除）不同，本变更新实体是站点装修配置，不需要软删除回收站。i18n_json JSON 列模式减少表数量，简化 DDL 和 Repository（KD-16 决策）'
    enforcement: 'DDL 审查 + 实体类审查（所有新实体 extends LongAuditableEntity，无 @TableField deleted_at 字段；i18n_json 字段使用 @TableField(typeHandler = JacksonTypeHandler.class) + @TableName(autoResultMap = true)）'

  - id: CONSTRAINT-005
    type: int_enum_consistency
    desc: 'GRD-009：NewsletterSource 是 IntEnum（非字符串枚举），er-diagram Subscriber.source / NewsletterSubscriber.source 字段类型必须声明为 IntEnum<NewsletterSource>，vals 声明为 [FOOTER(1), MODAL(2), EXIT_INTENT(3), HOME_BLOCK(4)]'
    rationale: '基线 NewsletterSource（NewsletterSource.java:13-16）实现 IntEnum 接口，数据库存储 tinyint（1/2/3/4）；er-diagram 若描述为字符串枚举则 acceptance 测试与基线 DDL 不一致'
    enforcement: 'er-diagram 审查 + 代码审查（Subscriber.source / NewsletterSubscriber.source 字段类型为 NewsletterSource）'

open_questions:
  - id: OQ-1
    topic: Taxonomy 实体物理实现（GRD-002 修正后）
    question: GRD-002 修正后 Taxonomy 是 Category（type=category）+ Collection（type=theme，collectionGroupId 指向"主题" CollectionGroup）的多态逻辑视图，基线无独立 Taxonomy 表。NavigationItem.taxonomy_id 和 HomePageSection.ThemeCards 应如何物理实现跨域引用？
    options:
      - '方案 A：保持多态引用（taxonomy_id + taxonomy_type 双字段），运行时 TaxonomyService 路由到 Category/Collection 表查询（推荐，对齐原型 taxonomies 数组的合并视图语义）'
      - '方案 B：拆分为 category_id + collection_id 两个可空外键字段（语义清晰但表结构冗余）'
      - '方案 C：新建独立 Taxonomy 表作为统一抽象层（不推荐，破坏 baseline）'
    impact: '影响 NavigationItem 表结构、TaxonomyService 接口设计、ThemeCards 数据查询逻辑'
    recommendation: '方案 A（保持多态引用，对齐原型 taxonomies 数组的合并视图语义；TaxonomyService 内部按 taxonomy_type 路由到 CategoryService/CollectionService）'

  - id: OQ-2
    topic: Subscriber vs NewsletterSubscriber 实体身份（KD-12 修正后）
    question: KD-11 说"复用 EmailMarketing 模块订阅者存储"，本变更 er-diagram 保留 Subscriber 逻辑视图实体。基线已有 NewsletterSubscriber。物理实现应合并到 NewsletterSubscriber 表（仅扩展 source=HOME_BLOCK(4)）还是新建独立 subscribers 表？
    options:
      - '方案 A：合并到基线 NewsletterSubscriber 表，扩展 source=HOME_BLOCK(4)（推荐，KD-11 明确复用 + KD-12 不扩展状态机）'
      - '方案 B：新建独立 subscribers 表（与基线 NewsletterSubscriber 解耦，但违反 KD-11 复用原则）'
      - '方案 C：Subscriber 作为逻辑视图实体，物理仍是 NewsletterSubscriber（er-diagram 保留 Subscriber 逻辑建模，DDL 不新建表）'
    impact: '影响 DDL 脚本、订阅 API 实现、消费端查询逻辑'
    recommendation: '方案 A（合并到 NewsletterSubscriber + 扩展 source=HOME_BLOCK(4)；er-diagram 中 Subscriber 是逻辑视图，物理落 NewsletterSubscriber 表）'

  - id: OQ-3
    topic: FooterColumn/FooterLink i18n 策略（KD-16 已采纳 i18n_json 方案，覆盖 GRD-W08）
    question: 'KD-16 决定合并翻译表到主表 i18n_json JSON 列（不建独立 *_translations 表），覆盖原 GRD-W08 双表方案。本 OQ 仅作记录，无需进一步决策。'
    options:
      - '方案 A：本期仅 EN 基准（与原型一致），后续 change 补 footer_column_translations/footer_link_translations 表（已废弃）'
      - '方案 B：本期补齐 FooterColumnTranslation/FooterLinkTranslation 双表（对齐其他实体 i18n 模式）（GRD-W08 采纳后又被 KD-16 覆盖，已废弃）'
      - '方案 C：FooterColumn/FooterLink 文案内嵌 i18n JSON 字段（KD-16 采纳此方案变体：所有新实体统一 i18n_json JSON 列）'
    impact: '影响表结构、API 契约、消费端 layout.tsx 渲染逻辑'
    recommendation: '方案 C（KD-16 已采纳；er-diagram 已移除 FooterColumnTranslation/FooterLinkTranslation 实体，FooterColumn/FooterLink 新增 i18n_json JSON 列）'

  - id: OQ-4
    topic: NavigationItem.taxonomy_type 派生字段存储
    question: NavigationItem.taxonomy_type 是从 Taxonomy 派生的字段（标识引用品类还是主题）。是否需要在 NavigationItem 表中冗余存储此字段？
    options:
      - '方案 A：冗余存储 taxonomy_type（查询性能优，但需在 Taxonomy 变更时同步更新）'
      - '方案 B：不存储，运行时通过 TaxonomyService 查询派生（无冗余但多一次服务调用）'
      - '方案 C：仅存 taxonomy_id + taxonomy_type 复合唯一约束（强制类型一致性）'
    impact: '影响 NavigationItem 表结构、TaxonomyService 接口、管理端表单校验'
    recommendation: '方案 A（冗余存储，对齐原型 taxonomies 数组的 type 字段）'

  - id: OQ-5
    topic: Mega Menu 列 i18n 策略（KD-16 修正后）
    question: 'KD-6 决定 Mega Menu 列存 JSON 字段（mega_menu_json）。列标题（title）的 i18n 如何处理？KD-16 修正后：列标题 i18n 存主表 NavigationItem.i18n_json JSON 列（结构 {en:{label, mega_menu_titles:{col_idx:title}}, es:{...}, fr:{...}}），与主表 mega_menu_json 列顺序对齐。是否合理？'
    options:
      - '方案 A：i18n_json.mega_menu_titles 映射（KD-16 修正方案，简单但依赖列顺序稳定）'
      - '方案 B：mega_menu_json 内嵌多语言对象（{title: {en, es, fr}, ...}）'
      - '方案 C：本期仅 EN 基准，mega_menu_json.title 存 EN，后续 change 扩展 i18n'
    impact: '影响 NavigationItem 表结构、管理端表单交互、消费端渲染逻辑'
    recommendation: '方案 A（KD-16 修正后；mega_menu_titles 作为 i18n_json JSON 列的子字段，与主表 mega_menu_json 列顺序对齐）'

  - id: OQ-6
    topic: HomePageSection.Announcement 区块与 Announcement 域的关系
    question: KD-7 决定 Announcement 独立域，但 HomePageSection.section_type 仍包含 Announcement 类型。此类型的 HomePageSection 行只存 enabled/sort_order（data_json 为空），实际公告内容从 Announcement 域派生。这种"占位区块"模式是否需要单独建模？
    options:
      - '方案 A：保持现状（HomePageSection.Announcement 行仅占位，消费端按 sort_order 渲染 Announcement 域所有 enabled 公告）'
      - '方案 B：移除 section_type=Announcement，消费端固定渲染 Announcement 域（位置不可配置）'
      - '方案 C：HomePageSection.Announcement 的 data_json 存 announcement_ids 数组（人工精选哪些公告上首页）'
    impact: '影响 HomePageSection 表结构、消费端渲染逻辑、管理端编辑表单'
    recommendation: '方案 A（保持现状，对齐 Hero 区块同样不存数据的模式）'

  - id: OQ-7
    topic: TOPBAR Banner 公告数据迁移策略（GRD-008）
    question: '基线消费端公告条通过 fetchStoreBanners(BannerPosition.TOPBAR) 取数据（frontend/portal-store/app/[locale]/layout.tsx:53-54 + site-header.tsx:24-31）。KD-7 决定新建独立 Announcement 域，但未说明：(1) 现有 TOPBAR Banner 公告数据是否迁移到 announcements 表；(2) BannerPosition.TOPBAR 是否废弃或保留；(3) layout.tsx 改调新 API 后 TOPBAR Banner 去留。'
    options:
      - '方案 A：本期双写兼容——新 Announcement 域为权威源，BannerPosition.TOPBAR 保留但停止管理端入口（只读降级），消费端优先读 Announcement 域，空时回退 TOPBAR Banner（平滑迁移）'
      - '方案 B：本期一次性迁移——删除 BannerPosition.TOPBAR 枚举值，现有 TOPBAR Banner 数据脚本迁移到 announcements 表，消费端只读 Announcement 域（干净但风险高）'
      - '方案 C：本期不迁移——Announcement 域仅服务首页区块，TOPBAR Banner 继续服务全局公告条（两套并存，语义重叠）'
      - '方案 D：BannerPosition.TOPBAR 标记 @Deprecated 但保留枚举值，管理端 Banners 页隐藏 TOPBAR 选项，存量 TOPBAR Banner 公告数据脚本迁入 announcements 表，消费端 layout.tsx 改调 StoreAnnouncement API（过渡期保留 TOPBAR 给非公告用途）'
    impact: '影响 BannerPosition 枚举、DataMigration 脚本、消费端 layout.tsx 渲染逻辑、管理端 Banners 页面'
    recommendation: '方案 D（@Deprecated + 数据迁移 + 消费端切流，既保留枚举兼容性又完成语义迁移；过渡期内非公告用途的 TOPBAR Banner 仍可使用，公告用途强制走 Announcement 域）'

  - id: OQ-8
    topic: Hero 区块 2 个 CTA 的数据源（GRD-010/KD-14 已采纳方案 A）
    question: 'GRD-010/KD-14 已采纳方案 A（Banner 实体新增 cta_text_secondary + cta_link_secondary 字段）。本 OQ 仅作记录，无需进一步决策。'
    options:
      - '方案 A：Banner 实体新增 cta_text_secondary + cta_link_secondary 字段（DDL 改动基线表，需 modified_entities 声明）（GRD-010/KD-14 采纳）'
      - '方案 B：er-diagram 放宽 Hero data_json 约束，允许存 cta2_label + cta2_href（Hero 区块不再"数据为空"，违反 KD-2 纯派生原则）（已废弃）'
      - '方案 C：第二个 CTA 走导航配置派生（cta2 固定指向"Explore Outdoor"导航项，从 NavigationConfig 读取，不存 Banner）（已废弃）'
      - '方案 D：本期仅渲染 1 个 CTA（对齐基线 Banner 单 cta_text），原型 cta2 降级为后续 change（已废弃）'
    impact: '影响 Banner 实体表结构、Hero 区块消费端渲染逻辑、管理端 Banner 编辑表单、原型还原度'
    recommendation: '方案 A（GRD-010/KD-14 已采纳；er-diagram modified_entities.Banner/BannerTranslation 已声明 added_fields）'

  - id: OQ-9
    topic: 消费端首页现有 4 类区块未在 section_type 枚举内（GRD-W05）
    question: '消费端首页现有 FlashSaleRail/Lookbook Editorial/ColorPalette Moodboard/ValueProps 四类区块，但 HomePageSection.section_type 枚举仅 7 种（Hero/Announcement/ShopByColor/ThemeCards/ProductRail/EditorialFeature/Newsletter），未覆盖此 4 类。迁移时如何处理？'
    options:
      - '方案 A：本期不迁移此 4 类区块，消费端保留硬编码渲染（与 HomeBuilder 动态渲染并存，后续 change 统一）'
      - '方案 B：扩展 section_type 枚举新增 FlashSale/Lookbook/ColorPalette/ValueProps 四值，补全 er-diagram 建模（范围扩大）'
      - '方案 C：本期将此 4 类区块映射到现有枚举（Lookbook→EditorialFeature, ColorPalette→ShopByColor, ValueProps→自定义 data_json, FlashSale→ProductRail source=flash_sale）'
    impact: '影响 HomePageSection 表结构、消费端首页渲染逻辑、管理端 HomeBuilder 编辑表单、原型还原度'
    recommendation: '方案 A（本期不迁移，聚焦原型 7 种区块；现有 4 类区块保留硬编码，后续 change 统一迁移，避免范围蔓延）'

  - id: OQ-10
    topic: 新实体基类与软删除策略（GRD-W07 已采纳方案 C 变体）
    question: 'GRD-W07 修正已采纳：新建实体统一 extends LongAuditableEntity + 物理删除（无 deleted_at 字段）。本 OQ 仅作记录，无需进一步决策。'
    options:
      - '方案 A：全部 extends LongAuditableEntity + 软删除（对齐基线 Category/Collection 模式）（已废弃）'
      - '方案 B：配置类实体（HomePageSection/NavigationItem/FooterColumn/Announcement）软删除，翻译表硬删除（避免翻译残留）（已废弃；KD-16 修正后不建翻译表）'
      - '方案 C：全部 extends LongAuditableEntity + 物理删除（配置类误删可重建，不需要软删除）（GRD-W07 采纳）'
    impact: '影响 DDL 脚本、Repository 查询逻辑、审计日志完整性'
    recommendation: '方案 C（GRD-W07 已采纳；所有新实体 extends LongAuditableEntity + 物理删除，详见 CONSTRAINT-004）'

  - id: OQ-11
    topic: KD-1 措辞修正（GRD-W04）
    question: 'GRD-W04 修正：KD-1 原描述"SSG 发布中心"与实际架构不符（portal-store 首页为 force-dynamic 无 SSG）。KD-1 决策已修正为"不引入 SSG，保持 force-dynamic + 缓存失效"。本 OQ 仅作记录，无需进一步决策。'
    options:
      - '方案 A：KD-1 措辞修正为"不引入 SSG，保持 force-dynamic + JetCache 两级缓存 + in-process 失效链"（GRD-W04 采纳）'
      - '方案 B：保留原"SSG 发布中心"措辞（已废弃，与实际架构不符）'
    impact: '影响 Publish.vue 范围、KD-1 决策记录、acceptance 测试断言'
    recommendation: '方案 A（GRD-W04 已采纳；KD-1 decision/rationale/impact 已在 pd-explore.local.md 中修正）'

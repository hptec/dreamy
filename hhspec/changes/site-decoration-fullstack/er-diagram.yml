        before: 'uk_newsletter_email(email) — 单字段 email 唯一（NewsletterSubscriber.java:23）'
        after: 'uk_newsletter_email_source(email, source) — 复合唯一（GRD2-003 方案 A：同邮箱同来源幂等短路，不同来源新增记录）'
        rationale: |
          GRD2-003 修正：KD-13 新增 source=HOME_BLOCK(4) 用于区分订阅入口（首页/页脚/弹窗/退出意图）。
          若保留 email 单字段唯一，同邮箱先从 FOOTER 订阅后再从 HOME_BLOCK 订阅会被短路，HOME_BLOCK 订阅"丢失"但响应 {subscribed:true}，
          source 数据失真，无法分析订阅入口转化率（电商 Newsletter 核心运营能力）。
          方案 A 复合唯一保证 source 数据完整性；NewsletterService.insertIgnoreDuplicate 语义变为"同邮箱同来源重复订阅幂等短路，不同来源新增记录"。
        ddl: 'ALTER TABLE newsletter_subscriber DROP INDEX uk_newsletter_email, ADD UNIQUE KEY uk_newsletter_email_source (email, source);'
        acceptance_impact: 'acceptance.yml s-336 等订阅场景需校验同邮箱不同来源可创建多条记录（GRD2-003 方案 A）'
    notes: |

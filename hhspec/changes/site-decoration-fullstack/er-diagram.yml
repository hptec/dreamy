modified_entities:
  - id: NewsletterSubscriber
    meta: {source: modified, baseline_ref: 'backend/src/main/java/com/dreamy/domain/subscriber/entity/NewsletterSubscriber.java:26-39'}
    added_enum_values:
      - field: source
        added_vals: [HOME_BLOCK(4)]

## UI 验收报告

L4 UI Verifier 产出 YAML 报告，包含：
- 视觉还原（pixelmatch 对比基线，5% 容差）
- 字段内容（所有 data-testid 元素的期望值校验）
- 交互路径（每个 path_id 全步骤通过）
- 状态流转（每个 state_machine 转换通过）
- 可访问性（axe-core 0 violations）
- 性能（Core Web Vitals 达标）
- 跨浏览器（3 个浏览器均通过）

**判定**: 全部 PASS → UI 验收通过；任一 FAIL → MUST_FIX 回退 L3 修复。

### Publish 交互路径

```yaml
path_id: PUB-FULL
steps:
  - action: navigate
    target: /admin/publish
    expect: 发布中心显示
  - action: click
    target: "[data-testid=\"invalidate-button\"]"
    expect: 确认弹窗显示
  - action: click
    target: "[data-testid=\"confirm-invalidate\"]"
    expect: 失效开始，显示进度
  - action: wait
    expect: 失效完成，日志显示失效的 cache keys
  - action: assert_visible
    target: "[data-testid=\"invalidate-log\"]"
    expect: 日志非空
```

## 状态流转断言

### home_page_section 状态流转

```yaml
state_machine: home_page_section_status
states: [enabled, disabled]
transitions:
  - from: disabled
    to: enabled
    trigger: "[data-testid=\"section-toggle\"] click"
    expect: toggle 开关变为 on
  - from: enabled
    to: disabled
    trigger: "[data-testid=\"section-toggle\"] click"
    expect: toggle 开关变为 off
```

### navigation_item 状态流转（同上）

### announcement 状态流转（同上）

### banner 状态流转（baseline 既有，本变更不改造）

```yaml
state_machine: banner_status
states: [draft, published, archived]
transitions:
  - from: draft
    to: published
    guard: guard_satisfied
    expect: 成功，status=published
  - from: draft
    to: published
    guard: guard_failed
    expect: 失败，status=draft, error_code=CONTENT_STATE_INVALID, http_status=409
  - from: published
    to: archived
    expect: 成功，status=archived
```

## 可访问性（a11y）

| 页面 | WCAG 级别 | 关键检查 |
|------|----------|---------|
| HomeBuilder | AA | 所有按钮有 aria-label；颜色对比度 >= 4.5:1；键盘可达 |
| NavigationConfig | AA | Tab 顺序正确；taxonomy 选择器有 aria-haspopup；mega menu 编辑器可键盘操作 |
| Banners | AA | 表单 label 关联正确；错误提示有 aria-live |
| Publish | AA | 按钮有明确文字；进度提示有 aria-live="polite" |

**axe-core 规则集**: wcag2aa


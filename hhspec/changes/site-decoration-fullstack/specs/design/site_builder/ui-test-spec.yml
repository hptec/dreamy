## 交互路径

### HomeBuilder 完整交互路径

```yaml
path_id: HB-FULL
steps:
  - action: navigate
    target: /admin/site/home-builder
    expect: 页面加载，显示 7 个区块
  - action: click
    target: "[data-testid=\"section-edit\"][data-section-id=\"1\"]"
    expect: 编辑表单显示
  - action: fill
    target: "[data-testid=\"i18n-tabs\"] [role=\"tab\"][name=\"ES\"] [data-field=\"title\"]"
    value: "Carrusel Hero"
    expect: ES 标题填入
  - action: click
    target: "[data-testid=\"save-button\"]"
    expect: 保存成功，toast 显示 "Saved"
  - action: click
    target: "[data-testid=\"section-toggle\"][data-section-id=\"2\"]"
    expect: 开关切换，状态变更
  - action: click
    target: "[data-testid=\"sort-up\"][data-section-id=\"3\"]"
    expect: 区块 3 上移到位置 2
```

### NavigationConfig 完整交互路径

```yaml
path_id: NAV-FULL
steps:
  - action: navigate
    target: /admin/site/navigation-config
    expect: 默认 Tab=导航
  - action: click
    target: "[data-testid=\"nav-item-edit\"][data-item-id=\"1\"]"
    expect: 编辑表单显示
  - action: select
    target: "[data-testid=\"link-type-select\"]"
    value: taxonomy
    expect: 显示 taxonomy 选择器
  - action: click
    target: "[data-testid=\"taxonomy-picker\"]"
    expect: 弹出分类选择器
  - action: click
    target: "[data-testid=\"taxonomy-option\"][value=\"1\"]"
    expect: 选中分类 id=1
  - action: click
    target: "[data-testid=\"mega-menu-editor\"]"
    expect: mega menu 编辑器展开
  - action: fill
    target: "[data-testid=\"mega-menu-column-title\"][0]"
    value: "Shop by Category"
    expect: 第一列标题填入
  - action: click
    target: "[data-testid=\"save-button\"]"
    expect: 保存成功
  - action: click
    target: "[role=\"tab\"][name=\"Announcement\"]"
    expect: 切换到公告 Tab
  - action: click
    target: "[data-testid=\"announcement-create\"]"
    expect: 显示新建公告表单
```


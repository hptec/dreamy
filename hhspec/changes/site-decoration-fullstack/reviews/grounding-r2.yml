must_fix_issues:
  - id: GRD2-001
    title: "er-diagram.yml 翻译表模式与 KD-16 决策直接矛盾（保留 5 个 *_translations 实体 vs KD-16 合并到 i18n_json JSON 列）"
    code_ref: "hhspec/changes/site-decoration-fullstack/er-diagram.yml:54-71 (HomeSectionTranslation) + :98-112 (NavigationTranslation) + :147-160 (FooterColumnTranslation) + :162-175 (FooterLinkTranslation) + :192-205 (AnnouncementTranslation) + :13 (review_fixes 列出 GRD-W08) + decision.md:85-92 (KD-16) + backend/src/main/java/com/dreamy/domain/category/entity/Category.java:43-45 (JacksonTypeHandler JSON 模式参考)"
    requirement_gap: |
      KD-16（L1 决策，覆盖 KD-3 和 GRD-W08）明确决定："合并翻译表到主表 JSON 列（i18n_json），不建独立 *_translations 表"，
      "home_sections / navigation_items / footer_columns / footer_links / announcements 表均增加 i18n_json JSON 列"，
      "不建 *_translations 表（包括 GRD-W08 推荐的 FooterColumnTranslation/FooterLinkTranslation）"。
      但 er-diagram.yml 仍然保留了 5 个独立翻译表实体（HomeSectionTranslation/NavigationTranslation/FooterColumnTranslation/FooterLinkTranslation/AnnouncementTranslation），
      且 entities 段所有新实体的 relations 都引用了这些翻译表。
      er-diagram.yml:13 的 review_fixes 列出 GRD-W08（采纳双表），直接与 KD-16"GRD-W08 不采纳"矛盾。
      这是 r1 之后的 L1 决策（KD-16）修正了 r1 的 GRD-W08，但 er-diagram.yml 未同步更新到 KD-16 的 JSON 列方案。
      代码接地：基线有现成 JSON TypeHandler 模式（Category.java:43-45 attrOverrides 用 JacksonTypeHandler + autoResultMap=true），KD-16 的 i18n_json 方案技术上可行。
    suggestion: |
      全局修正 er-diagram.yml：
      1. 移除 HomeSectionTranslation/NavigationTranslation/FooterColumnTranslation/FooterLinkTranslation/AnnouncementTranslation 5 个实体
      2. HomePageSection/NavigationItem/FooterColumn/FooterLink/Announcement 实体新增 i18n_json JSON 字段（type: JSON, nullable: true）
      3. 各实体 relations 移除对 Translation 实体的引用
      4. review_fixes 移除 GRD-W08，新增 KD-16
      5. CONSTRAINT-004 物理删除约束保留，新增 i18n_json TypeHandler 约束（@TableField(typeHandler = JacksonTypeHandler.class) + @TableName(autoResultMap = true)）
      6. scope-manifest.yml database.new_tables 移除 5 个 *_translations 表（若已声明）

  - id: GRD2-002
    title: "er-diagram.yml HomePageSection.data_json 描述与 KD-11 Newsletter 决策矛盾（Newsletter 文案存储位置不明）"
    code_ref: "hhspec/changes/site-decoration-fullstack/er-diagram.yml:37 (data_json 描述 'Newsletter 类型 data_json 为空') + decision.md:61-63 (KD-11 'Newsletter 区块存储 title + 副文案 + CTA 文案') + frontend/portal-admin/src/views/HomeBuilder.vue:110 (Newsletter 区块渲染 b.data.title) + :142 (属性编辑允许编辑 title) + er-diagram.yml:64 (HomeSectionTranslation.cta_text 字段)"
    requirement_gap: |
      er-diagram.yml:37 HomePageSection.data_json 描述："Hero/Announcement/Newsletter 类型 data_json 为空（数据从其他域派生，KD-14 第二 CTA 也从 Banner 派生）"。
      但 KD-11 决定："Newsletter 区块存储 title + 副文案 + CTA 文案；消费端渲染邮箱输入 + 提交按钮"。
      原型 HomeBuilder.vue:110 Newsletter 区块从 b.data.title 读取标题，第 142 行属性编辑允许编辑 title。
      Newsletter 的文案既不从 Banner 派生（KD-2 只覆盖 Hero），也不从 Announcement 域派生（KD-7 只覆盖 Announcement 区块）。
      如果 data_json 为空，Newsletter 的 title/subtitle/cta_text 无处存储。
      er-diagram.yml:54-71 HomeSectionTranslation 实体有 title/subtitle/cta_text 字段，但 KD-16 决定不建双表（见 GRD2-001），改用 i18n_json JSON 列。
      er-diagram 既保留双表又声明 data_json 为空，Newsletter 文案存储位置矛盾。
    suggestion: |
      修正 er-diagram.yml:37 HomePageSection.data_json 描述：
      - Hero/Announcement 类型 data_json 为空（数据从 Banner/Announcement 域派生）
      - Newsletter 类型 data_json 为空，文案（title/subtitle/cta_text）存 i18n_json JSON 列（KD-11 + KD-16）
      - ShopByColor/ThemeCards/ProductRail/EditorialFeature 类型 data_json 存区块配置（count/source/limit/product_ids/wedding_ids）
      同步修正 HomeSectionTranslation 实体移除（GRD2-001），Newsletter 文案迁移到 i18n_json。

  - id: GRD2-003
    title: "er-diagram.yml Subscriber 唯一约束与 modified_entities.NewsletterSubscriber.notes 矛盾（email 单字段唯一 vs (email, source) 复合唯一）"
    code_ref: "hhspec/changes/site-decoration-fullstack/er-diagram.yml:220 (Subscriber.constraints (email, source) 复合唯一 + '需迁移到 uk(email, source)，详见 modified_entities.NewsletterSubscriber.changed_constraints') + :386-392 (modified_entities.NewsletterSubscriber.notes '不修改 unique 约束，基线 uk_newsletter_email(email) 保留') + backend/src/main/java/com/dreamy/domain/subscriber/entity/NewsletterSubscriber.java:23 (uk_newsletter_email email 单字段唯一) + backend/src/main/java/com/dreamy/domain/subscriber/service/NewsletterService.java:53-59 (insertIgnoreDuplicate 依赖 email 唯一短路) + state-machine.yml:200 (subscribe guard '(email, source) 唯一性校验')"
    requirement_gap: |
      er-diagram.yml 内部直接矛盾：
      (1) entities.Subscriber.constraints:220 声明 (email, source) 复合唯一，描述说"合并方案下需迁移到 uk(email, source)，详见 modified_entities.NewsletterSubscriber.changed_constraints"
      (2) modified_entities.NewsletterSubscriber.notes:390 明确说"不修改 unique 约束（基线 uk_newsletter_email(email) 保留，KD-12 单态订阅无需 email+source 复合唯一）"，且没有 changed_constraints 字段
      基线代码 NewsletterSubscriber.java:23 是 uk_newsletter_email(email) 单字段唯一。
      基线 NewsletterService.subscribe:53-59 依赖 email 唯一约束 + INSERT ON DUPLICATE KEY UPDATE id=id 实现幂等。
      如果保留 email 单字段唯一（modified_entities 声明），KD-13 新增 source=HOME_BLOCK(4) 的语义失效：
      同邮箱先从 FOOTER 订阅（source=1），后从首页 HOME_BLOCK 订阅（source=4），第二条被 email 唯一约束短路，
      HOME_BLOCK 订阅"丢失"但响应 {subscribed:true}（用户无感，但 source 数据失真，无法区分订阅入口）。
      state-machine.yml:200 subscriber_status.subscribe guard 写"(email, source) 唯一性校验通过"，也与此矛盾。
    suggestion: |
      二选一明确决策：
      方案 A（推荐）：modified_entities.NewsletterSubscriber 新增 changed_constraints 段，声明 uk_newsletter_email(email) → uk_newsletter_email_source(email, source) 复合唯一迁移；
      entities.Subscriber.constraints 保留 (email, source)；state-machine.yml guard 保留；
      NewsletterService.subscribe 的 insertIgnoreDuplicate 语义变为"同邮箱同来源重复订阅幂等短路，不同来源新增记录"。
      方案 B：entities.Subscriber.constraints 改为 (email) 单字段唯一（对齐基线）；state-machine.yml guard 改为 email 唯一性校验；
      明确声明 KD-13 source=HOME_BLOCK(4) 仅用于响应埋点，不保证 source 数据完整性（同邮箱多入口订阅只保留首写 source）。

  - id: GRD2-004
    title: "scope-manifest.yml 遗漏消费端 header/footer/导航静态数据源文件（KD-5 全量改造无法落地）"
    code_ref: "hhspec/changes/site-decoration-fullstack/scope-manifest.yml:43-52 (store.modify 仅列 page.tsx/layout.tsx/marketing-server.ts) + frontend/portal-store/components/layout/site-header.tsx:14 (import { mainNav, announcements } from '@/data/navigation') + :95 ({mainNav.map(item => ...)} 渲染主导航) + :187 (const item = mainNav.find(...) 渲染 Mega Menu) + frontend/portal-store/components/layout/site-footer.tsx:10 (import { footerNav } from '@/data/navigation') + :86 ({footerNav.map(col => ...)} 渲染页脚导航) + frontend/portal-store/data/navigation.ts:22-157 (mainNav + footerNav + announcements 静态数据源) + decision.md:31-33 (KD-5 'header/footer/公告条 全量改造')"
    requirement_gap: |
      KD-5 决定"首页动态渲染 + header/footer/公告条 全量改造"，decision.md:33 impact 明确
      "消费端改造点：(1)portal-store/app/[locale]/page.tsx 动态渲染区块；(2)portal-store/app/[locale]/layout.tsx 读取导航配置渲染 header/footer；(3)顶部公告条组件动态渲染"。
      但 scope-manifest.yml store.modify 仅列出 3 个文件（page.tsx/layout.tsx/marketing-server.ts），遗漏了实际渲染 header/footer 的组件文件和静态数据源文件：
      - site-header.tsx 第 14 行 import mainNav + announcements，第 95 行用 mainNav 渲染主导航，第 187 行用 mainNav 渲染 Mega Menu。KD-5 要求 header 从 API 读取导航配置，必须修改此文件。
      - site-footer.tsx 第 10 行 import footerNav，第 86 行用 footerNav 渲染页脚导航。KD-5 要求 footer 从 API 读取导航配置，必须修改此文件。
      - data/navigation.ts 第 22-157 行是 mainNav + footerNav + announcements 静态数据源。KD-5 要求改为 API 调用，必须修改或废弃此文件。
      不修改这些文件，KD-5"header/footer 全量改造"无法落地——主导航和页脚仍渲染硬编码静态数据。
    suggestion: |
      scope-manifest.yml store.modify 新增：
      - path: components/layout/site-header.tsx, role: 消费端 header（mainNav 改为从 fetchStoreNavigation API 读取，announcements 改为从 fetchStoreAnnouncements API 读取）
      - path: components/layout/site-footer.tsx, role: 消费端 footer（footerNav 改为从 fetchStoreNavigation API 读取）
      - path: data/navigation.ts, role: 静态导航数据源（mainNav/footerNav/announcements 改为 API 调用兜底回退，或移除静态数据）

  - id: GRD2-005
    title: "scope-manifest.yml 遗漏消费端 store-types.ts 类型扩展（KD-13/KD-14/KD-17 前端类型无法落地）"
    code_ref: "hhspec/changes/site-decoration-fullstack/scope-manifest.yml:43-52 (store.modify 未列 store-types.ts) + frontend/portal-store/lib/api/store-types.ts:42 (NewsletterSource = { FOOTER: 1, MODAL: 2, EXIT_INTENT: 3 }，缺 HOME_BLOCK: 4) + :36 (BannerPosition = { HERO: 1, FEATURED: 2, TOPBAR: 3 }，TOPBAR 未标记 @Deprecated) + :426-435 (StoreBanner 接口仅 ctaText，缺 ctaTextSecondary/ctaLinkSecondary) + decision.md:73 (KD-13) + :76-78 (KD-14) + :94-100 (KD-17)"
    requirement_gap: |
      KD-13/KD-14/KD-17 三个决策都要求消费端前端类型同步扩展，但 scope-manifest.yml 完全没列出 store-types.ts 的修改：
      (1) KD-13 新增 NewsletterSource HOME_BLOCK(4)：store-types.ts:42 的 NewsletterSource 仅 3 值，需扩展为 { FOOTER: 1, MODAL: 2, EXIT_INTENT: 3, HOME_BLOCK: 4 }。
      首页 Newsletter 区块组件需调用 subscribeNewsletter(email, NewsletterSource.HOME_BLOCK, locale)，不扩展则无法传 source=4。
      (2) KD-14 新增 Banner cta_text_secondary + cta_link_secondary：store-types.ts:426-435 的 StoreBanner 接口仅 ctaText，需扩展 ctaTextSecondary? + ctaLinkSecondary?。
      page.tsx:57 第二个 CTA "Explore Outdoor" 需从 hero?.ctaTextSecondary 派生，不扩展则类型不匹配。
      (3) KD-17 TOPBAR 标记 @Deprecated：store-types.ts:36 的 BannerPosition.TOPBAR 需同步标记 @Deprecated（JSDoc 注释），不扩展则前端无 deprecation 提示。
    suggestion: |
      scope-manifest.yml store.modify 新增：
      - path: lib/api/store-types.ts, role: 消费端类型扩展（NewsletterSource 新增 HOME_BLOCK(4)；StoreBanner 新增 ctaTextSecondary/ctaLinkSecondary；BannerPosition.TOPBAR 标记 @Deprecated）


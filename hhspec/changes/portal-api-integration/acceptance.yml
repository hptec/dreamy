    - 定制行不扣库存
    - totalAmount=subtotal+shippingFee+giftWrapFee-优惠减免
    - Order.exchangeRate 锁汇且 Stripe 按订单币种收款
    - webhook 按 event_id 幂等
    - 支付成功事件发布到 RabbitMQ

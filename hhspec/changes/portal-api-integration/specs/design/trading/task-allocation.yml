# ===== 域内专家分配（产物 → 覆盖面）=====
allocations:
  api_designer:
    artifact: trading-api-detail.md
    scope: "37 operations 四部分方法论（V-TRD-001~061 / STEP-TRD 端点内编号 / 出参 / 错误码映射）"
    operations_count: 37
    depends_on: []
  data_designer:
    artifact: trading-data-detail.md
    scope: "12 表 DDL + RM/MAP/IDX/TX/CV/EVT/SCHED/CACHE-TRD（事务边界为本域核心：TX-TRD-001~012 含隔离级别与回滚点）"
    entities: [cart_item, cart_merge_record, address, orders, order_line, payment, refund, wishlist_item, browse_history, exchange_rate, checkout_config, processed_event]
    depends_on: []
  frontend_designer:
    artifact: trading-frontend-detail.md
    scope: "portal-admin（Orders/OrderDetail/Refunds/Settings 增量 tab）+ portal-store（cart/checkout 四步/order-success/订单中心/Wishlist/浏览历史/地址簿 + Stripe Payment Element）diff 级设计"
    depends_on: [api_designer]
  test_designer:
    artifact: trading-test-detail.md
    scope: "TC-TRD-001~105 八层骨架（幂等/并发 CAS/webhook 重放/超时取消回补/迟到支付补偿/退款原子回滚 关键场景全覆盖）"
    depends_on: [api_designer, data_designer]
  ui_test_designer:
    artifact: trading-ui-test-spec.yml
    scope: "11 页 Playwright 期望（store 7 + admin 4；只看原型；carrier 文案以 API 为准）"
    depends_on: []

dependency_order:
  wave_1: [api_designer, data_designer, ui_test_designer]
  wave_2: [frontend_designer, test_designer]
cycle_check: pass        # api→{}; data→{}; frontend→{api}; test→{api,data}; ui_test→{}; 无环
no_overlap_check: pass   # 每端点/实体/事务/用例仅一个主负责产物
no_gap_check: pass       # 37 操作 + 12 表 + 3 状态机 + 5 业务流 task 全映射；Wishlist/BrowseHistory/ExchangeRate/CheckoutConfig/processed_event 增量挂靠宿主 task

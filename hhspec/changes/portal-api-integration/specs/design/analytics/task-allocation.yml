# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 只读模型与聚合（依赖 trading/review/catalog 表已建——各域 wave_1 数据底座先行）
    - TASK-009
    - ANA-IMPL-SEED-COORD
  wave_2:   # 端点与缓存
    - ANA-IMPL-API
  wave_3:   # GA4 防腐层（stub 先行可与 wave_2 并测，real 凭证仅 staging+）
    - ANA-IMPL-GA4
    - TASK-058
  wave_4:   # 前端接入（依赖后端可联调 + trading 种子订单产生看板数值）
    - ANA-IMPL-ADMIN-FE

cycle_check: pass        # 对 trading/review/catalog 仅只读 SELECT 依赖（决策 3 例外，单向）；无域依赖本域
no_overlap_check: pass   # 每 task/实现单元唯一归属；gtag 埋点与权限/索引归属以 shared_with 显式声明边界
no_gap_check: pass       # 本域 task-manifest 条目（009/058）全覆盖；3 端点/3 错误码/5 缓存 key/GA4 降级链/两页前端/虚拟实体处置均有承载单元；本域无状态机（state-machine.yml 无 analytics 条目，显式声明）

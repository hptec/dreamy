# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 数据底座（无依赖，可并行）
    - TASK-002   # attribute_def
    - TASK-003   # attribute_set
    - TASK-005   # tag_dimension
  wave_2:   # 依赖 wave_1 的实体
    - TASK-004   # attribute_set_item（依赖 002/003）
    - TASK-001   # category（依赖 003 绑定属性集）
    - TASK-006   # tag + product_tag（依赖 005）
    - TASK-026   # CustomTag 合并核验（依赖 005/006）
  wave_3:   # 商品聚合
    - TASK-010   # product（依赖 001 category / 006 tag）
    - TASK-011   # product_image
    - TASK-012   # sku
    - TASK-013   # size_chart_row
  wave_4:   # 行为与状态机（依赖实体就绪）
    - CAT-IMPL-API      # 35 端点（含 TASK-034/035/036/037/040 状态机 guard 内嵌实现）
    - TASK-034
    - TASK-035
    - TASK-036
    - TASK-037
    - TASK-040
    - CAT-IMPL-FILTER   # 公开白名单（store 端点联调前置）
    - CAT-IMPL-UPLOAD
  wave_5:   # 失效链与回写（依赖端点 + MQ 基建 + trading/review 事件就绪）
    - TASK-056
    - CAT-IMPL-MQ
  wave_6:   # 前端接入与种子（依赖后端可联调）
    - CAT-IMPL-SEED
    - CAT-IMPL-ADMIN-FE
    - CAT-IMPL-STORE-FE

cycle_check: pass        # wave 内无互依赖；跨 wave 单向
no_overlap_check: pass   # 每 task/实现单元唯一归属；TASK-056 跨域部分以 shared_with 显式声明边界
no_gap_check: pass       # 本域 task-manifest 条目（001~006/010~013/026/034~037/040/056-本域侧）全覆盖；35 端点/16 表/17 错误码/5 状态机均有承载单元

# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 数据底座（无依赖，可并行；nm 表依赖 catalog product 表已在 catalog wave_3 就绪）
    - TASK-007   # banner
    - TASK-008   # blog_post
    - TASK-021   # coupon
    - TASK-022   # flash_sale（+flash_sale_product）
    - TASK-023   # lookbook（+lookbook_product）
    - TASK-024   # guide
    - TASK-025   # real_wedding（+real_wedding_product）
    - MKT-IMPL-ENTITY-EXTRA
  wave_2:   # 行为与状态机（依赖实体就绪）
    - MKT-IMPL-API       # 46 端点（含状态机 guard 内嵌实现）
    - TASK-032
    - TASK-033
    - TASK-042
    - TASK-043
    - TASK-044
    - TASK-045
    - TASK-046
    - MKT-IMPL-FILTER    # 公开白名单（store 端点联调前置）
  wave_3:   # 跨域服务与定时（依赖端点 + trading 下单流就绪做联测）
    - TASK-059           # 券核销接口（trading 消费）
    - TASK-060           # 闪购自动下线
    - MKT-IMPL-SCHED
  wave_4:   # 失效链（依赖 MQ 基建 + Next 内部 revalidate 端点 + 决策 22 standalone 改造）
    - TASK-056
    - MKT-IMPL-MQ
  wave_5:   # 前端接入与种子（依赖后端可联调）
    - MKT-IMPL-SEED
    - MKT-IMPL-ADMIN-FE
    - MKT-IMPL-STORE-FE

cycle_check: pass        # wave 内无互依赖；跨 wave 单向；与 catalog 的依赖（product 表/catalogQueryPort/presign）单向指向 catalog
no_overlap_check: pass   # 每 task/实现单元唯一归属；TASK-056/059 跨域部分以 shared_with 显式声明边界；TASK-055 归 review 域显式排除
no_gap_check: pass       # 本域 task-manifest 条目（007/008/021~025/032/033/042~046/056-消费者侧/059/060）全覆盖；46 端点/19 表/10 错误码/7 状态机/Newsletter+Contact 增量实体均有承载单元

# Dreamy 原型 — 双向同步状态
# 双门户（有意技术割裂）：
#   - portal-store（消费端）：Next.js 15 App Router + TS + Tailwind（根目录 app/）
#   - portal-admin（管理后台）：pnpm + Vue3 + Vite + Tailwind + Headless UI（portal-admin/）
# 用户 2026-05-29 明确要求割裂：消费端 next.js，管理后台 vue3。

tech_stack: nextjs15-app-router-ts-tailwind   # 指消费端 portal-store
prototype_mode: standard
portal_mode: multi
last_prototype_update: 2026-06-10T12:00:00+08:00
design_style: editorial-luxe-coastal
dev_command: pnpm dev   # 消费端 http://localhost:5173
build_command: pnpm build
status: ok

portals:
  - id: portal-store
    name: Dreamy 消费者商城
    tech_stack: nextjs15-app-router-ts-tailwind
    dir: .                 # 根目录即消费端工程
    dev_command: pnpm dev  # http://localhost:5173
  - id: portal-admin
    name: Dreamy 运营管理后台
    tech_stack: pnpm-vue3-headless
    dir: portal-admin
    dev_command: pnpm -C portal-admin dev  # http://localhost:5174
    pages_count: 26
    design_doc: portal-admin/PROTOTYPE-README.md
    note: 迭代3新增身份与认证(AM12)。迭代4(2026-06-10)新增AM13评价与Q&A审核(/reviews)：状态流转/带图审核/官方回复/Q&A管理，menuPermissionKeys 22→23，操作日志扩审核动作；账户合并改为系统自动（已验证邮箱一致即归并），下线后台人工合并页面与开关

design_tokens:
  fonts: { display: Cormorant Garamond, sans: Jost }
  colors: { canvas: '#FAF7F2', ink: '#2B2925', gold: '#C19A6B', sage: '#8B9D83', blush: '#D8A7A0' }
  note: 后台与前台同源 token，品牌视觉一致


# Dreamy 原型 — 双向同步状态
# 注意：本原型采用 Next.js (App Router) + TypeScript + Tailwind + shadcn 风格，
# 非 pd:prototype 默认的 pnpm-vue 工程（用户明确要求 React/Next.js）。

tech_stack: nextjs15-app-router-ts-tailwind
prototype_mode: standard
portal_mode: single
last_prototype_update: 2026-05-29T12:30:00+08:00
design_style: editorial-luxe-coastal
dev_command: pnpm dev   # http://localhost:5173
build_command: pnpm build
status: ok

design_tokens:
  fonts: { display: Cormorant Garamond, sans: Jost }
  colors: { canvas: '#FAF7F2', ink: '#2B2925', gold: '#C19A6B', sage: '#8B9D83', blush: '#D8A7A0' }

# 注：原计划的 portal-admin（后台）已按用户 2026-05-29 要求移除，本次仅消费者前台。

pages:
  - { name: 首页, file: app/page.tsx, route: /, type: home, features: [F-001,F-002,F-003,F-004,F-005,F-006,F-007,F-008], drift: prototype_ahead }
  - { name: 婚纱列表, file: app/wedding-dresses/page.tsx, route: /wedding-dresses, type: list, features: [F-009,F-012,F-013,F-014,F-015,F-016,F-017], drift: prototype_ahead }
  - { name: 小礼服列表, file: app/special-occasion/page.tsx, route: /special-occasion, type: list, features: [F-010,F-012,F-013,F-014,F-015,F-016,F-017], drift: prototype_ahead }
  - { name: 配饰列表, file: app/accessories/page.tsx, route: /accessories, type: list, features: [F-011,F-012,F-013,F-014,F-015,F-016,F-017], drift: prototype_ahead }
  - { name: Outdoor主题, file: app/outdoor-weddings/page.tsx, route: /outdoor-weddings, type: list, features: [F-018,F-019], drift: prototype_ahead }
  - { name: 商品详情PDP, file: app/product/[slug]/page.tsx, route: /product/:slug, type: detail, features: [F-021,F-022,F-023,F-024,F-025,F-026,F-027,F-028,F-029,F-030,F-031], drift: prototype_ahead }
  - { name: 搜索结果, file: app/search/page.tsx, route: /search, type: list, features: [F-020,F-057], drift: prototype_ahead }
  - { name: 购物车, file: app/cart/page.tsx, route: /cart, type: list, features: [F-033,F-034], drift: prototype_ahead }
  - { name: 结算, file: app/checkout/page.tsx, route: /checkout, type: form, features: [F-035,F-036,F-037,F-038,F-040], drift: prototype_ahead }
  - { name: 下单成功, file: app/order-success/page.tsx, route: /order-success, type: detail, features: [F-039], drift: prototype_ahead }
  - { name: 登录注册, file: app/account/login/page.tsx, route: /account/login, type: form, features: [F-041], drift: prototype_ahead }
  - { name: 账户总览, file: app/account/page.tsx, route: /account, type: dashboard, features: [F-042], drift: prototype_ahead }
  - { name: 订单列表, file: app/account/orders/page.tsx, route: /account/orders, type: list, features: [F-043], drift: prototype_ahead }
  - { name: 订单详情, file: app/account/orders/[id]/page.tsx, route: /account/orders/:id, type: detail, features: [F-044,F-045], drift: prototype_ahead }
  - { name: 地址簿, file: app/account/addresses/page.tsx, route: /account/addresses, type: list, features: [F-046], drift: prototype_ahead }
  - { name: 收藏夹, file: app/account/wishlist/page.tsx, route: /account/wishlist, type: list, features: [F-047,F-048], drift: prototype_ahead }
  - { name: 账户设置, file: app/account/settings/page.tsx, route: /account/settings, type: settings, features: [F-049], drift: prototype_ahead }
  - { name: 灵感馆, file: app/inspiration/page.tsx, route: /inspiration, type: list, features: [F-050], drift: prototype_ahead }
  - { name: RealWeddings列表, file: app/real-weddings/page.tsx, route: /real-weddings, type: list, features: [F-051], drift: prototype_ahead }
  - { name: RealWedding详情, file: app/real-weddings/[slug]/page.tsx, route: /real-weddings/:slug, type: detail, features: [F-052], drift: prototype_ahead }
  - { name: Blog列表, file: app/blog/page.tsx, route: /blog, type: list, features: [F-053], drift: prototype_ahead }
  - { name: Blog详情, file: app/blog/[slug]/page.tsx, route: /blog/:slug, type: detail, features: [F-054], drift: prototype_ahead }
  - { name: 婚礼指南, file: app/wedding-guides/page.tsx, route: /wedding-guides, type: list, features: [F-055], drift: prototype_ahead }
  - { name: 关于, file: app/about/page.tsx, route: /about, type: content, features: [F-058], drift: prototype_ahead }
  - { name: 联系, file: app/contact/page.tsx, route: /contact, type: content, features: [F-058], drift: prototype_ahead }
  - { name: FAQ, file: app/faq/page.tsx, route: /faq, type: content, features: [F-058], drift: prototype_ahead }
  - { name: 404, file: app/not-found.tsx, route: /:404, type: content, features: [F-058], drift: prototype_ahead }

global_components:
  - components/layout/site-header.tsx   # NavBar + MegaMenu + 搜索抽屉 + 币种/语言 (F-001~F-003, F-040, F-057)
  - components/layout/site-footer.tsx   # Footer + Newsletter (F-008)
  - components/cart/cart-drawer.tsx     # 加购抽屉 (F-032)
  - components/marketing/newsletter-modal.tsx  # 首访弹窗 (F-056)
  - components/marketing/cookie-notice.tsx     # Cookie 通知 (F-057)
  - components/product/quick-view-modal.tsx    # 快速预览 (F-015)
  - components/product/size-guide-modal.tsx    # 尺码表 (F-026)
  - components/product/collection-view.tsx     # 共享列表页（Filter+排序+网格）
  - components/store-provider.tsx              # 全局状态（购物车/收藏/币种/浏览历史）

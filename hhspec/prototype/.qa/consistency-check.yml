project: Dreamy 婚纱礼服跨境电商原型
date: 2026-05-29
tech_stack: nextjs-app-router-ts-tailwind-shadcn
portal: single (portal-store only; admin removed per user request)

dom_audit:
  status: pass
  note: 所有页面使用语义化标签、cursor-pointer、aria-label、label[for]、object-cover；图片均带 alt；图标用 lucide-react SVG（无 emoji 图标）

build:
  command: pnpm build
  result: success
  routes_compiled: 28
  static_prerendered:
    - product/[slug]: 16
    - blog/[slug]: 3
    - real-weddings/[slug]: 3
    - account/orders/[id]: 3
  typescript_errors: 0

playwright_visual:
  status: pass
  viewports: [desktop-1440, mobile-390]
  pages_tested: 28
  http_200: 27
  http_404: 1   # /not-found 页面，预期 404
  js_console_errors: 0   # 唯一报错是 not-found 页的预期 404 资源状态

requirement_coverage:
  must_have:
    商品域三大品类: covered   # wedding-dresses / special-occasion / accessories
    Outdoor主题页含子主题: covered   # outdoor-weddings + Beach/Garden/Boho/Forest/Vineyard
    PDP图廊+zoom+视频+lifestyle: covered
    SKU颜色尺码选择+尺码表: covered   # US/UK/AU 三套对照
    完整电商交易: covered   # cart drawer + cart + 4步checkout + 6种支付
    多币种切换: covered   # USD/CAD/AUD/GBP
    多语言切换器: covered   # EN/ES
    账户中心: covered   # dashboard/orders/order-detail+tracking/addresses/wishlist+recent/settings+reviews
    转化辅助: covered   # reviews/Q&A/wishlist/recently-viewed/related/complete-the-look/color-palette
    内容栏目: covered   # inspiration/real-weddings/blog/wedding-guides
    营销触达: covered   # newsletter modal/cookie notice/cart drawer/footer subscribe
  removed_by_user:
    portal-admin: 已按用户要求移除（本次只做消费者网站）
  anti_goals_respected:
    - 社交登录: 未做（仅邮箱+密码）
    - Gift Card / Wedding Registry / AR交互 / Referral / Live Shopping / Bridesmaid Group / Loyalty: 未做
    - 退换货独立模块 / Live Chat: 未做

style_consistency:
  design_system: editorial-luxe-coastal
  fonts: Cormorant Garamond (display) + Jost (sans)
  colors: canvas/gold/sage/blush/ink — 全站统一 Tailwind token
  components_shared: NavBar(MegaMenu)/Footer/CartDrawer/NewsletterModal/CookieNotice/ProductCard/CollectionView/QuickView/SizeGuide
  icons: lucide-react (无 emoji)
  check: pass

fixes_applied:
  - 移除 next/font/google（沙箱无网络），改用 <link> 加载 Google Fonts，保留 CSS 变量
  - 替换 3 张含竞品文字水印的 banner 图（lifestyle-banner-*）为干净人像图，避免版权文字与品牌冲突
  - 首页 Hero 改为编辑式左右分栏（文字+干净人像），避免文字叠文字

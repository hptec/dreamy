# ===== 端点/前端/基建补充单元（task-manifest 未单列、由本域设计衍生的实现单元）=====
supplementary_units:
  - id: REV-IMPL-API
    summary: "15 端点 Controller+Service+DTO（com.dreamy.review 包；含 Paginated 子类 StoreReviewListDTO/AdminReviewListDTO）"
    design_sections: [review-api-detail.md E-REV-01~15 全部, review-data-detail.md MAP-REV-006/007]
    constraint_ids: [V-REV-001~037, TX-REV-001~010]
    tests: [TC-REV-029, TC-REV-030, TC-REV-031, TC-REV-033~042]
  - id: REV-IMPL-FILTER
    summary: "StoreJwtFilter 公开白名单 method-aware 升级（METHOD:pattern 条目形式，向后兼容）+ review 登记 2 条（GET:/api/store/reviews、GET:/api/store/questions）"
    design_sections: [review-api-detail.md §0.1]
    tests: [TC-REV-039, TC-REV-054]
    shared_with: [catalog(白名单机制首定义方，3 条 pattern), trading(2 条), showroom/marketing(后续登记)]
  - id: REV-IMPL-PORT
    summary: "跨域端口：消费 TradingPurchaseQueryPort(403801)/CatalogSnapshotPort/IdentityQueryPort/StoragePresignPort；提供 ReviewQueryPort.approvedRatingSummary（catalog EVT-CAT-002 消费）"
    design_sections: [review-api-detail.md §0 跨域端口, review-data-detail.md §8.2/§8.3]
    tests: [TC-REV-009, TC-REV-019, TC-REV-023]
    notes: "TradingPurchaseQueryPort 接口声明归本域 port 包，实现归 trading 域（completed 订单 EXISTS 查询）"
  - id: REV-IMPL-MQ
    summary: "review.moderated + content.invalidated(review_changed/question_changed) 事件发布器（事务提交后发布，EC-REV-002 降级）"
    design_sections: [review-data-detail.md §8.1(EVT-REV-001/002)]
    tests: [TC-REV-019, TC-REV-020, TC-REV-050]
  - id: REV-IMPL-PRESIGN
    summary: "买家秀预签名端点（scope=review 固定、MIME 仅图片三类，复用 catalog 代管 StoragePresignPort）"
    design_sections: [review-api-detail.md E-REV-05]
    tests: [TC-REV-007, TC-REV-041, TC-REV-049]
  - id: REV-IMPL-ADMIN-FE
    summary: "portal-admin Reviews.vue copy-adapt 新建（双 tab+抽屉+Lightbox）+ 路由/权限点 /reviews + src/api/reviews.ts + 2 个 Pinia store"
    design_sections: [review-frontend-detail.md §A 全部]
    tests: [TC-REV-043, TC-REV-044, TC-REV-045, UIS-REV-A01, UIS-REV-A02]
  - id: REV-IMPL-STORE-FE
    summary: "portal-store product-reviews.tsx data-swap + WriteReviewModal/AskQuestionModal/ReviewImageStrip 新增 + lib/api/review-api.ts + PDP RSC 首屏接入"
    design_sections: [review-frontend-detail.md §B 全部]
    tests: [TC-REV-046, TC-REV-047, TC-REV-048, UIS-REV-S01~S03]
  - id: REV-IMPL-SEED
    summary: "本域种子数据（mock.js reviews/productQuestions → 3 表种子行，三态/精选/带图/带回复/已答未答变体；dev/staging 限定，决策 21）"
    design_sections: [review-data-detail.md §9 备注②]

# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 数据底座（依赖 catalog product / identity user / trading orders 表已存在）
    - TASK-027   # review
    - TASK-028   # review_image
    - TASK-029   # product_question
  wave_2:   # 跨域端口与过滤器（端点联调前置）
    - REV-IMPL-PORT      # 含 trading 侧 hasCompletedOrderContaining 实现协同
    - REV-IMPL-FILTER    # method-aware 白名单升级（与 catalog/trading 共用机制协同）
  wave_3:   # 行为与状态机（依赖实体+端口就绪）
    - REV-IMPL-API       # 15 端点（含 TASK-047/048/049 状态机 guard 内嵌实现）
    - TASK-047
    - TASK-048
    - TASK-049
    - REV-IMPL-PRESIGN
  wave_4:   # 失效链与事件（依赖端点 + MQ 基建 + catalog q.catalog.rating 消费者就绪）
    - TASK-055
    - TASK-056
    - REV-IMPL-MQ
  wave_5:   # 前端接入与种子（依赖后端可联调）
    - REV-IMPL-SEED
    - REV-IMPL-ADMIN-FE
    - REV-IMPL-STORE-FE

cycle_check: pass        # wave 内无互依赖；跨 wave 单向；跨域协同点（trading 端口实现/catalog 消费者）以 shared_with/notes 显式声明
no_overlap_check: pass   # 每 task/实现单元唯一归属；TASK-056 仅承载本域生产者侧、rating 回写消费归 catalog（TASK-055 notes 边界声明）
no_gap_check: pass       # 本域 task-manifest 条目（027/028/029/047/048/049/055/056-本域侧）全覆盖；15 端点/3 表/10 错误码/3 状态机均有承载单元

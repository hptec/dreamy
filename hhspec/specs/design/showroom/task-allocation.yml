    summary: "本域种子数据（prototype data/showrooms.ts → 5 表种子行：成员四态/款式/投票/留言变体；invite_token 重新生成；dev/staging 限定——协作 UGC 类口径，决策 21）"
    design_sections: [showroom-data-detail.md §9 备注②]
    tests: []
    notes: "依赖 identity/catalog 种子先行（owner_id/product_id 关联）"

# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 数据底座（依赖 catalog product / identity user 表已存在）
    - SHR-IMPL-ENTITY
  wave_2:   # 鉴权基建与跨域端口（端点联调前置；与 review REV-IMPL-FILTER 协同同一次过滤器升级）
    - SHR-IMPL-FILTER-GUEST
    - SHR-IMPL-PORT
  wave_3:   # 端点行为与状态机（依赖实体+过滤器+端口就绪）
    - SHR-IMPL-API
  wave_4:   # MQ 双向（依赖端点 + MQ 基建 + trading order.paid 生产者就绪）
    - SHR-IMPL-MQ-PUBLISHER
    - SHR-IMPL-MQ-CONSUMER
  wave_5:   # 前端接入与种子（依赖后端可联调）
    - SHR-IMPL-SEED
    - SHR-IMPL-STORE-FE

cycle_check: pass        # wave 内无互依赖；跨 wave 单向；跨域协同点（identity 过滤器宿主/review 白名单机制/trading 事件与端口/catalog 端口扩展）以 shared_with 显式声明
no_overlap_check: pass   # 不占用 task-manifest TASK-001~060 任何编号；q.mail 消费者归 trading/基建（本域仅发布）、DyeLotPort 接口声明归 trading（本域实现）边界显式
no_gap_check: pass       # 13 端点/5 表/11 错误码/1 状态机（6 转换）/2 发布事件+1 消费/dye lot/guest 旁路/前端双页+弹窗 均有唯一承载单元；本域无 task-manifest 直属 task 已声明设计来源

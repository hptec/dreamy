# ===== 1. 异常分类体系 =====
exception_hierarchy:
  base: DomainException  # 所有业务异常基类，携带code+message+details
  categories:
    validation:  # 422系列
      base: FieldValidationException
      http: 422
      handler: MethodArgumentNotValidException → GlobalExceptionHandler
    not_found:  # 404系列
      base: ResourceNotFoundException
      http: 404
    conflict:  # 409系列
      base: ConflictException
      http: 409
      subtypes: [NameExistsException, ResourceInUseException, ConcurrentModificationException]
    bad_request:  # 400系列
      base: BadRequestException
      http: 400
      subtypes: [NoEnabledGatewayException, InvalidModelException, NonAiGatewayException]
    gateway_integration:  # 502/504系列
      base: GatewayException
      http: 502/504
      subtypes: [GatewayCallFailedException, GatewayTimeoutException, GatewayUnavailableException, GatewayAuthFailedException]


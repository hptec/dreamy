# ===== 5. 外部网关降级矩阵 =====
gateway_degradation:
  translation_failure:
    decision: 决策10
    behavior: |
      翻译失败时：
      1. 记录ai_translation_log status=failed + error_message
      2. 返回502/504错误码给前端
      3. 前端toast提示但允许继续编辑保存
    no_retry: true  # 翻译不自动重试，由用户手动触发

  model_sync_failure:
    decision: 决策5
    behavior: |
      模型同步失败（依赖 external_gateway_config.consecutive_failures 计数字段，见 data-detail §8 状态机）：
      1. 单次失败：consecutive_failures += 1，记WARN日志，models_synced_at不更新，保留旧model_list
      2. 同步成功：consecutive_failures 清零
      3. 连续失败3次(consecutive_failures>=3)：降级model_refresh_strategy为manual(1)，enabled→0，发告警通知
    retry_count: 3
    fallback_strategy: manual
    state_field: consecutive_failures  # INT DEFAULT 0, data-detail §1.1 + §8 状态机
    test: TC-RESILIENCE-I18N-0006
    note: |
      enabled→false 自动禁用影响面较大(UNC-L2C-002待确认)，L3 可配置开关控制是否自动禁用。

  email_template_fallback:
    decision: 决策13
    behavior: |
      邮件模板语言缺失：
      1. 按user.locale_pref → orders.locale_snapshot → 'en'优先级
      2. 目标语言模板不存在 → 回退EN模板
      3. 记WARN日志
    fallback_locale: en

# ===== 6. 日志规范 =====
logging_rules:
  api_key_masking: 所有日志中API Key必须掩码(sk-****1234)，禁止明文
  translation_log: 每次翻译(成功/失败)记录ai_translation_log
  sensitive_fields: [api_key_encrypted, api_key]  # 脱敏字段
  log_levels:
    gateway_call_failed: WARN
    model_sync_failed: WARN
    api_key_decryption_failed: ERROR  # 告警
    translation_success: INFO

# ===== 7. 国际化（错误消息）=====
i18n_rules:
  admin_messages: 中文(决策8后台不翻译)
  store_messages: 不涉及(后台错误码不出三语)
  note: i18n变更仅后台管理，所有错误message为admin端中文


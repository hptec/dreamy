        - POST /api/admin/gateway/configs/{id}/sync-models
        - POST /api/admin/gateway/configs/{id}/test (测试连接, ISS-001)
        - POST /api/admin/ai/translate
        - PUT /api/admin/catalog/products/{id} (增量：designer_note字段)
        - PUT /api/consumer/auth/profile (增量：locale_pref字段, StoreBearerAuth, ISS-003)
      entities:
        - ExternalGatewayConfig (新增)
        - ProductTranslation (修改：+designer_note列)
        - User (修改：+locale_pref列)
        - Order (修改：+locale_snapshot列)
      error_codes: [当前活跃错误码以 GatewayErrorCode 与 active OpenAPI 为准]
    inputs:
      - source: specs/architecture/api-contracts/gateway-api.openapi.yml
        sections: [paths, components.schemas, info.error_codes]
      - source: specs/architecture/api-contracts/ai-translation-api.openapi.yml
        sections: [paths, components.schemas, info.error_codes]
      - source: specs/architecture/api-contracts/catalog-api-incremental.md
        sections: [designer_note字段增量]
      - source: specs/architecture/api-contracts/identity-api-incremental.md
        sections: [locale_pref字段增量]
      - source: specs/architecture/api-contracts/trading-api-incremental.md
        sections: [locale_snapshot字段增量]
      - source: er-diagram.yml
        sections: [entities, modified_entities]
      - source: data-flow.md
        sections: [FLOW-I01~I09]
      - source: error-strategy.md
        sections: [24 EDGE场景矩阵]
      - source: decision.md
        sections: [决策1~14]
    output_files:

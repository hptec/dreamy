# ===== 端点/前端/基建补充单元（task-manifest 未单列、由本域设计衍生的实现单元）=====
supplementary_units:
  - id: SHP-IMPL-API
    summary: "9 端点 Controller+Service+DTO（com.dreamy.shipping 包；RBAC /shipping + 审计 7 action）"
    design_sections: [shipping-api-detail.md E-SHP-01~09 全部 + §11 总表]
    constraint_ids: [V-SHP-001~011, TX-SHP-001~007]
    tests: [TC-SHP-021~030]
  - id: SHP-IMPL-QUOTE-PORT
    summary: "ShippingQuotePort + ShippingQuoteService + GeoZoneResolver（提供侧权威；trading FLOW-P05 直调消费）"
    design_sections: [shipping-api-detail.md §10, shipping-data-detail.md §6/§7]
    constraint_ids: [MAP-SHP-003, CACHE-SHP-001, CACHE-SHP-002]
    tests: [TC-SHP-001~010, TC-SHP-031, TC-SHP-032, TC-SHP-033, TC-SHP-040, TC-SHP-041]
    shared_with: [trading(消费方：trading-api-detail §0 ShippingQuotePort / quoteCheckout.STEP-TRD-03~04——签名以本域 §10.1 为权威，已逐字对齐)]
  - id: SHP-IMPL-ADMIN-FE
    summary: "portal-admin Shipping.vue 接入（data-swap + CRUD 行为补齐 + 双 FormDrawer）+ src/api/shipping.ts + useShippingStore"
    design_sections: [shipping-frontend-detail.md §1~§7 全部]
    constraint_ids: [PAGE-SHP-01, STORE-SHP-01, COMP-SHP-01~05, FORM-SHP-01~04]
    tests: [TC-SHP-034~039, UIS-SHP-A01]
  - id: SHP-IMPL-SEED
    summary: "本域种子（4 承运商 + 10 规则行 + /shipping 权限字典幂等补登，决策 21）"
    design_sections: [shipping-data-detail.md §8.2/§8.3]
    tests: [TC-SHP-020]

# ===== 建议实现顺序（依赖拓扑，DFS 无环）=====
implementation_order:
  wave_1:   # 数据底座（无外域依赖）
    - TASK-030   # carrier
    - TASK-031   # shipping_rate
    - SHP-IMPL-SEED
  wave_2:   # 行为与状态机
    - SHP-IMPL-API
    - TASK-050
  wave_3:   # 跨域报价端口（trading FLOW-P05 联测前置）
    - SHP-IMPL-QUOTE-PORT
  wave_4:   # 前端接入（依赖后端可联调）
    - SHP-IMPL-ADMIN-FE

cycle_check: pass        # wave 内无互依赖；跨 wave 单向；对 trading 仅被消费（trading→shipping 单向依赖端口包）
no_overlap_check: pass   # 每 task/实现单元唯一归属；ShippingQuotePort 提供/消费边界以 shared_with 显式声明（消费侧组装与币种换算归 trading）
no_gap_check: pass       # 本域 task-manifest 条目（030/031/050）全覆盖；9 端点/2 表/5 错误码/1 状态机/报价领域服务/种子均有承载单元

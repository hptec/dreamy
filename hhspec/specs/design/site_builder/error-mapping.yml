# L2 错误处理详设 - site_builder 域

> 来源：error-strategy.md（L1.3 产出）+ api-detail.md
> 覆盖：23 个错误码的异常分类 + 传播路径 + 韧性策略

## 异常分类（EX-*）

| 异常类 | 父类 | HTTP | 触发场景 | 对应错误码 |
|--------|------|------|----------|-----------|
| SiteBuilderException | RuntimeException | — | site_builder 域基类 | — |
| HomeSectionNotFoundException | SiteBuilderException | 404 | 首页区块不存在 | 404801 |
| NavigationNotFoundException | SiteBuilderException | 404 | 导航配置不存在 | 404802 |
| FooterNotFoundException | SiteBuilderException | 404 | 页脚配置不存在 | 404803 |
| AnnouncementNotFoundException | SiteBuilderException | 404 | 公告不存在 | 404804 |
| TaxonomyNotFoundException | SiteBuilderException | 404 | 导航引用分类不存在 | 404805 |
| HomeSectionSortConflictException | SiteBuilderException | 409 | 首页区块乐观锁冲突 | 409801 |
| NavigationItemCycleException | SiteBuilderException | 409 | 导航循环依赖 | 409802 |
| FooterColumnSortConflictException | SiteBuilderException | 409 | 页脚乐观锁冲突 | 409803 |
| AnnouncementTimeWindowConflictException | SiteBuilderException | 409 | 公告时间窗冲突 | 409804 |
| NavigationVersionConflictException | SiteBuilderException | 409 | 导航整体保存并发冲突 | 409805 |
| HomeSectionDataJsonInvalidException | SiteBuilderException | 422 | data_json 结构非法 | 422801 |
| HomeSectionTypeInvalidException | SiteBuilderException | 422 | section_type 非法 | 422802 |
| FooterColumnRefInvalidException | SiteBuilderException | 422 | column_id 引用缺失 | 422803 |
| FooterLinkUrlInvalidException | SiteBuilderException | 422 | URL 格式非法 | 422804 |
| AnnouncementTimeWindowInvalidException | SiteBuilderException | 422 | start_at >= end_at | 422805 |
| MegaMenuConfigInvalidException | SiteBuilderException | 422 | mega_menu_json 非法 | 422806 |
| I18nJsonLocaleInvalidException | SiteBuilderException | 422 | locale 键非 en/es/fr | 422807 |
| I18nJsonStructureInvalidException | SiteBuilderException | 422 | i18n_json 结构非法 | 422807 |
| SectionTypeDataMismatchException | SiteBuilderException | 422 | js_guard 校验失败 | 422808 |
| FieldValidationFailedException | SiteBuilderException | 422 | 其他字段校验失败 | 422808 |
| SiteBuilderInternalException | SiteBuilderException | 500 | 内部错误 | 500801 |
| CacheInvalidationFailedException | SiteBuilderException | — | 缓存失效失败（不抛给用户） | 500802 |
| BannerServiceUnavailableException | SiteBuilderException | 502 | Banner 跨域调用失败 | 502801 |
| TaxonomyServiceUnavailableException | SiteBuilderException | 502 | Taxonomy 跨域调用失败 | 502802 |
| WeddingServiceUnavailableException | SiteBuilderException | 502 | Wedding 跨域调用失败 | 502803 |
| ProductServiceUnavailableException | SiteBuilderException | 502 | Product 跨域调用失败 | 502804 |

**复用基线异常**:
- `AccessDeniedException` → 403（@RequirePermission 校验失败，由 baseline AdminJwtFilter 抛出，错误码 40300）
- `MethodArgumentNotValidException` → 422（@Valid 校验失败，由 baseline GlobalExceptionHandler 处理，错误码 422808）
- `DuplicateKeyException` → 409（由 baseline 处理，映射到对应 409xx）
- `DataIntegrityViolationException` → 422（由 baseline 处理，映射到 422808）
- marketing 域 `NewsletterEmailExistsException` → 409704（newsletter 订阅重复，幂等成功）

## 传播路径（PATH-NN）

| ID | 路径 | 说明 |
|----|------|------|
| PATH-01 | Controller → MarketingExceptionHandler → R.fail(code, message, data) | site_builder 域所有 Controller 的异常统一由 MarketingExceptionHandler 处理（KD-15 assignableTypes） |
| PATH-02 | Service → Service → 抛 SiteBuilderException 子类 | 领域异常向上传播到 Controller |
| PATH-03 | Repository → DataAccessException → GlobalExceptionHandler | DB 异常由 baseline 兜底，映射到 50001/500801 |
| PATH-04 | 跨域 Service 调用 → 超时/网络异常 → 包装为 XxxServiceUnavailableException | BannerSvc/TaxonomySvc/WeddingSvc/ProductSvc 调用失败 |
| PATH-05 | cache.invalidateFamily → CacheException → 包装为 CacheInvalidationFailedException | 不抛给用户，仅记录 ERROR 日志 |
| PATH-06 | publisher.publish → PubSubException → 包装为 CacheInvalidationFailedException | 不抛给用户，仅记录 ERROR 日志 |
| PATH-07 | @Valid → MethodArgumentNotValidException → MarketingExceptionHandler → 422808 | 入参校验 |
| PATH-08 | @RequirePermission → AccessDeniedException → AdminJwtFilter → 40300 | 权限校验 |

**MarketingExceptionHandler assignableTypes 配置**（KD-15）:
```java
@RestControllerAdvice(
    basePackages = "com.dreamy",
    assignableTypes = {
        // baseline marketing 域既有
        AdminBannerController.class,
        // site_builder 域新增（本变更）
        AdminHomePageSectionController.class,
        AdminNavigationController.class,
        AdminFooterController.class,
        AdminAnnouncementController.class,
        StoreContentController.class
    }
)
public class MarketingExceptionHandler { ... }
```

## 韧性策略（RT/CB/DG-NNN）

### 重试（RT）

| ID | 策略 | 应用场景 | 配置 |
|----|------|---------|------|
| RT-01 | 缓存失效重试 | cache.invalidateFamily 失败时重试 1 次 | maxAttempts=2, backoff=100ms |
| RT-02 | 跨域调用重试 | BannerSvc/TaxonomySvc/WeddingSvc/ProductSvc 调用失败时重试 2 次 | maxAttempts=3, backoff=200ms |

### 熔断（CB）

| ID | 策略 | 应用场景 | 配置 |
|----|------|---------|------|
| CB-01 | 跨域调用熔断 | 跨域服务连续失败 5 次 → 熔断 30s | failureThreshold=5, openDuration=30s |

### 降级（DG）

| ID | 策略 | 应用场景 | 降级返回 |
|----|------|---------|---------|
| DG-01 | Banner 降级 | FLOW-SB05 Hero 跨域调用失败 | 省略 Hero 区块 + WARN 日志 |
| DG-02 | Taxonomy 降级 | FLOW-SB05 ThemeCards 跨域调用失败 | 空 themes 数组 + WARN 日志 |
| DG-03 | Product 降级 | FLOW-SB05 ProductRail 跨域调用失败 | 空 products 数组 + WARN 日志 |
| DG-04 | Wedding 降级 | FLOW-SB05 EditorialFeature 跨域调用失败 | 空 weddings 数组 + WARN 日志 |
| DG-05 | 缓存降级 | cache 读取异常 | 降级直读 DB + WARN 日志 |
| DG-06 | 缓存失效降级 | publisher.publish 失败 | 记录 ERROR，不阻断主流程（最终一致） |
| DG-07 | Newsletter 幂等 | 重复订阅 | 返回成功（不泄露订阅状态，EDGE-024） |

### 超时（TO）

| ID | 策略 | 应用场景 | 配置 |
|----|------|---------|------|
| TO-01 | 跨域调用超时 | BannerSvc/TaxonomySvc/WeddingSvc/ProductSvc | 3s |
| TO-02 | 缓存操作超时 | cache.get/set/invalidate | 500ms |
| TO-03 | DB 查询超时 | Repository 查询 | 5s（baseline 既有） |


| 409801 | HomeSectionSortConflictException | 409 | 首页区块版本冲突 | HomePageSectionService.update（乐观锁） |
| 409802 | NavigationItemCycleException | 409 | 导航项循环引用 | NavigationService.save（CV-001） |
| 409803 | FooterColumnSortConflictException | 409 | 页脚栏目版本冲突 | FooterService.save（乐观锁） |
| 409804 | AnnouncementTimeWindowConflictException | 409 | 公告同优先级时间窗重叠 | AnnouncementService.create/update（CV-002） |
| 409805 | NavigationVersionConflictException | 409 | 导航配置版本冲突 | NavigationService.save（整体 version 乐观锁） |
| 422801 | HomeSectionDataJsonInvalidException | 422 | 首页区块 data_json 结构不合法 | HomePageSectionService.create/update（V-004） |
| 422802 | HomeSectionTypeInvalidException | 422 | 首页区块类型非法 | HomePageSectionService.create/update（V-001） |
| 422803 | FooterColumnRefInvalidException | 422 | 页脚链接引用栏目不存在 | FooterService.save（CV-003） |
| 422804 | FooterLinkUrlInvalidException | 422 | 页脚链接 URL 格式非法 | FooterService.save（V-022） |
| 422805 | AnnouncementTimeWindowInvalidException | 422 | 公告时间窗非法 | AnnouncementService.create/update（CV-008） |
| 422806 | MegaMenuConfigInvalidException | 422 | mega_menu_json 配置非法 | NavigationService.save（V-016） |
| 422807 | I18nJsonLocaleInvalidException / I18nJsonStructureInvalidException | 422 | i18n_json 结构或 locale 键非法 | 各 Service 入参校验（CV-005） |
| 422808 | SectionTypeDataMismatchException / FieldValidationFailedException | 422 | section_type 与 data_json/i18n_json 组合不满足 js_guard 或其他字段校验失败 | HomePageSectionService.create/update（CV-004） |
| 500801 | SiteBuilderInternalException | 500 | 站点装修内部错误 | 未捕获异常兜底 |
| 500802 | CacheInvalidationFailedException | — | 缓存失效失败（不返回用户，仅日志） | cache.invalidateFamily / publisher.publish |
| 502801 | BannerServiceUnavailableException | 502 | Banner 服务不可用 | StoreContentService.getHome Hero 派生 |
| 502802 | TaxonomyServiceUnavailableException | 502 | Taxonomy 服务不可用 | StoreContentService.getHome ThemeCards 派生 |
| 502803 | WeddingServiceUnavailableException | 502 | Wedding 服务不可用 | StoreContentService.getHome EditorialFeature 派生 |
| 502804 | ProductServiceUnavailableException | 502 | Product 服务不可用 | StoreContentService.getHome ProductRail 派生 |

**复用基线码**:
- 40100 → AdminJwtFilter / StoreJwtFilter（未认证）
- 40300 → @RequirePermission（无权限）
- 40400 → 通用 404
- 50000 → 通用 500
- 50001 → DB 异常
- 409704 / 422704 / 500705 → marketing 域 newsletter 错误码（KD-13 扩展基线）


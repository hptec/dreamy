| code | 异常类 | HTTP | message_zh | 触发位置 |
|------|--------|------|-----------|---------|
| 404801 | HomeSectionNotFoundException | 404 | 首页区块不存在 | HomePageSectionService.findById/update/delete |
| 404802 | NavigationNotFoundException | 404 | 导航配置不存在 | NavigationService.get（首次访问自动初始化空配置） |
| 404803 | FooterNotFoundException | 404 | 页脚配置不存在 | FooterService.get |
| 404804 | AnnouncementNotFoundException | 404 | 公告不存在 | AnnouncementService.findById/update/delete |

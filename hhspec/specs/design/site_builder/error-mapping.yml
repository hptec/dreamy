meta:
  version: "1.0"
  layer: L2
  domain: site_builder
  source: [error-strategy.md, api-detail.md]

error_code_mapping:
  - {code: 404801, identifier: HOME_SECTION_NOT_FOUND, http: 404, message_zh: 首页区块不存在}
  - {code: 404802, identifier: NAVIGATION_NOT_FOUND, http: 404, message_zh: 导航配置不存在}
  - {code: 404803, identifier: FOOTER_NOT_FOUND, http: 404, message_zh: 页脚配置不存在}
  - {code: 404804, identifier: ANNOUNCEMENT_NOT_FOUND, http: 404, message_zh: 公告不存在}
  - {code: 404805, identifier: TAXONOMY_NOT_FOUND, http: 404, message_zh: 导航引用的分类不存在}
  - {code: 409801, identifier: HOME_SECTION_SORT_CONFLICT, http: 409, message_zh: 首页区块版本冲突}
  - {code: 409802, identifier: NAVIGATION_ITEM_CYCLE, http: 409, message_zh: 导航项循环引用}
  - {code: 409803, identifier: FOOTER_COLUMN_SORT_CONFLICT, http: 409, message_zh: 页脚栏目版本冲突}
  - {code: 409804, identifier: ANNOUNCEMENT_TIME_WINDOW_CONFLICT, http: 409, message_zh: 公告同优先级时间窗重叠}
  - {code: 409805, identifier: NAVIGATION_VERSION_CONFLICT, http: 409, message_zh: 导航配置版本冲突}
  - {code: 422801, identifier: HOME_SECTION_DATA_JSON_INVALID, http: 422, message_zh: 首页区块 data_json 结构不合法}
  - {code: 422802, identifier: HOME_SECTION_TYPE_INVALID, http: 422, message_zh: 首页区块类型非法}
  - {code: 422803, identifier: FOOTER_COLUMN_REF_INVALID, http: 422, message_zh: 页脚链接引用栏目不存在}
  - {code: 422804, identifier: FOOTER_LINK_URL_INVALID, http: 422, message_zh: 页脚链接 URL 格式非法}
  - {code: 422805, identifier: ANNOUNCEMENT_TIME_WINDOW_INVALID, http: 422, message_zh: 公告时间窗非法}
  - {code: 422806, identifier: MEGA_MENU_CONFIG_INVALID, http: 422, message_zh: mega_menu_json 配置非法}
  - {code: 422807, identifier: I18N_JSON_INVALID, http: 422, message_zh: i18n_json 结构或 locale 非法}
  - {code: 422808, identifier: SECTION_TYPE_DATA_MISMATCH, http: 422, message_zh: 区块类型与数据不匹配}
  - {code: 500801, identifier: SITE_BUILDER_INTERNAL, http: 500, message_zh: 站点装修内部错误}
  - {code: 500802, identifier: CACHE_INVALIDATION_FAILED, http: null, message_zh: 缓存失效失败，仅记录日志}
  - {code: 502801, identifier: BANNER_SERVICE_UNAVAILABLE, http: 502, message_zh: Banner 服务不可用}
  - {code: 502802, identifier: TAXONOMY_SERVICE_UNAVAILABLE, http: 502, message_zh: Taxonomy 服务不可用}
  - {code: 502803, identifier: WEDDING_SERVICE_UNAVAILABLE, http: 502, message_zh: Wedding 服务不可用}
  - {code: 502804, identifier: PRODUCT_SERVICE_UNAVAILABLE, http: 502, message_zh: Product 服务不可用}

propagation_paths:
  - {id: PATH-01, from: Controller, to: MarketingExceptionHandler, result: R.fail}
  - {id: PATH-02, from: Service, to: Controller, result: SiteBuilderException}
  - {id: PATH-03, from: Repository, to: GlobalExceptionHandler, result: DB error envelope}
  - {id: PATH-04, from: CrossDomainService, to: StoreContentService, result: per-section degradation}
  - {id: PATH-05, from: CacheInvalidation, to: log, result: ERROR without rolling back committed write}

degradation:
  - {id: DG-01, source: StoreBannerService, result: 省略整个 Hero 区块}
  - {id: DG-02, source: TaxonomyService, result: 空 themes 数组}
  - {id: DG-03, source: ProductService, result: 空 products 数组}
  - {id: DG-04, source: WeddingService, result: 空 weddings 数组}
  - {id: DG-05, source: cache_read, result: 降级直读数据库}

edge_cases:
  - {id: EDGE-016, scenario: 所有 section disabled, result: 返回空数组}
  - {id: EDGE-017, scenario: 无有效 HERO Banner, result: 正常省略 Hero 区块且不返回已归档内容}
  - {id: EDGE-018, scenario: i18n locale 缺失, result: 按请求语言到 EN 回退}
  - {id: EDGE-019, scenario: 跨域调用失败, result: 各区块独立降级}
  - {id: EDGE-020, scenario: 缓存击穿, result: singleflight}
  - {id: EDGE-021, scenario: 所有导航 disabled, result: 返回空树}
  - {id: EDGE-022, scenario: footer 为空, result: 返回空 columns}
  - {id: EDGE-023, scenario: 无有效公告, result: 返回空数组}
  - {id: EDGE-024, scenario: 重复 Newsletter 订阅, result: 幂等成功}
  - {id: EDGE-025, scenario: 并发创建第二条 Hero section, result: 应用层分布式写锁串行化后返回 422801}

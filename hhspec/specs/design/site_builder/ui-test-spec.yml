version: "1.0"
layer: L2
role: l2_ui_test_designer
change_name: site-decoration-fullstack
domain_code: site_builder

linked_prototype_snapshots:
  - page_id: HomeBuilder
    file: prototype/portal-admin/src/views/HomeBuilder.vue
  - page_id: NavigationConfig
    file: prototype/portal-admin/src/views/NavigationConfig.vue
  - page_id: Banners
    file: prototype/portal-admin/src/views/Banners.vue
  - page_id: Publish
    file: prototype/portal-admin/src/views/Publish.vue

global:
  visual_tolerance_percent: 5
  viewport: 1440x900
  accessibility:
    standard: WCAG-2.1-AA
    rules: [label-for-input, focus-visible, keyboard-nav, color-contrast-4.5]
  performance_budget:
    lcp_ms: 2500
    fid_ms: 100
    cls: 0.1
    tti_ms: 3500

pages:
  - id: UIS-SB-A01
    page: /site/home
    prototype: portal-admin/src/views/HomeBuilder.vue
    visual_baseline: [home-builder-desktop]
    interactions:
      - path: 首页区块列表加载
        assert: [所有区块按 sortOrder/id 顺序渲染, 启停状态与 API 一致, Hero 区块全表最多一条]
      - path: 编辑区块并保存
        assert: [编辑表单展示当前数据, 保存成功后版本递增, toast 显示成功]
      - path: 启停和排序
        assert: [操作成功后列表即时刷新, 失败时回滚并提示]
      - path: Hero 数据来源
        assert: [Hero 编辑区不保存 Banner 单项数据, 消费端由全部有效 HERO Banner 派生轮播]
    field_assertions: [sectionType, label, enabled, sortOrder, version]
    state_transitions: [enabled<->disabled, 非Hero类型可互换, Hero保持全表单例]
    accessibility: [按钮可键盘操作, 启停开关有可读标签, 编辑抽屉 focus-trap]

  - id: UIS-SB-A02
    page: /site/navigation
    prototype: portal-admin/src/views/NavigationConfig.vue
    visual_baseline: [navigation-config-desktop]
    interactions:
      - path: 导航/页脚/公告 Tab 切换
        assert: [选中态与面板一致, 切换不丢失已加载数据]
      - path: 保存导航配置
        assert: [taxonomy/custom 链接表单按类型显示, 保存成功后版本递增]
      - path: 保存页脚与公告
        assert: [字段校验错误行内展示, 成功后消费端缓存失效]
    field_assertions: [linkType, taxonomyId, customHref, megaMenuJson, locale]
    accessibility: [tablist 语义正确, 表单 label 关联, 错误提示 aria-live]

  - id: UIS-SB-A03
    page: /banners
    prototype: portal-admin/src/views/Banners.vue
    visual_baseline: [banners-desktop]
    interactions:
      - path: HERO Banner 多项发布
        assert: [允许同时发布多条 HERO Banner, 排序和投放窗口字段可编辑]
      - path: 关闭全部 HERO Banner
        assert: [管理端状态立即更新, 消费端省略整个 Hero section]
      - path: 二级 CTA 编辑
        assert: [ctaTextSecondary 与 ctaLinkSecondary 可编辑并保存]
    field_assertions: [imageUrl, position, status, sort, startTime, endTime]
    state_transitions: [draft->published->archived->published, 任意态删除->gone]
    accessibility: [缩略图 alt, Toggle aria-checked, 编辑抽屉 focus-trap]

  - id: UIS-SB-A04
    page: /publish
    prototype: portal-admin/src/views/Publish.vue
    visual_baseline: [publish-desktop]
    interactions:
      - path: 手动失效缓存
        assert: [确认后触发失效, 成功与失败均有明确反馈]
      - path: 发布中心加载
        assert: [无已退役翻译日志入口, 页面无失效 Glossary 路由]
    accessibility: [按钮有明确文字, 进度和结果使用 aria-live]

consumer_hero:
  id: UIS-SB-S01
  page: / 与 /es /fr
  viewports: [desktop, mobile]
  interactions:
    - path: 两个有效 HERO Banner
      assert: [只渲染一个 Hero region, 轮播含两张 slide, 自动轮播和前后按钮可用]
    - path: 用户暂停与临时暂停
      assert: [用户暂停状态不被 hover/focus/touch 结束覆盖, 暂停按钮状态可读]
    - path: 键盘与触摸
      assert: [左右方向键切换, focus 不丢失, touch cancel 后恢复临时状态]
    - path: 仅一个有效 Banner
      assert: [Hero 显示单张内容, 不显示无意义轮播控制]
    - path: 无有效 Banner
      assert: [整个 Hero section 不渲染, 已归档内容不残留]
  accessibility: [region 有 aria-label, 当前 slide 状态可读, prefers-reduced-motion 禁止自动轮播]

browsers:
  chromium: all
  firefox: [UIS-SB-A01, UIS-SB-A02, UIS-SB-S01]
  webkit: [UIS-SB-A03, UIS-SB-A04, UIS-SB-S01]

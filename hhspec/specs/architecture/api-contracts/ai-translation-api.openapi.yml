openapi: 3.0.3
info:
  title: AI Translation API
  version: 2.0.0
  description: |
    后台 AI 翻译的当前有效契约。前端通过后端代理调用已启用的外部 AI 网关，API Key 不暴露给浏览器。

    2026-06-17 精简后只保留 `POST /api/admin/ai/translate`。`ai_translation_log`、
    `GET /api/admin/ai/translation-logs`、`ai_translation_glossary` 及术语注入均已退役并由
    `V20260617_drop_ai_translation_modules.sql` 删除。翻译 prompt 仅包含婚纱电商固定前缀、
    用户自定义要求和源/目标语言。

    实际线上响应使用 huihao R 包络；下方 response schema 仅描述 `data` 载荷。JSON 边界使用
    snake_case，portal-admin client 自动转换为 camelCase。
  contact:
    name: ai translation team

servers:
  - url: http://localhost:8080
    description: 本地 backend

tags:
  - name: admin-ai-translation
    description: 登录后台用户可用的即时 AI 翻译代理

paths:
  /api/admin/ai/translate:
    post:
      summary: 翻译文本
      description: |
        读取最新启用的 AI 网关配置，校验可选模型，调用 OpenAI-compatible chat completions，
        返回译文。请求和结果不写翻译日志，也不注入术语表。失败不会阻止前端继续手工编辑和保存。
      operationId: translateText
      tags: [admin-ai-translation]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateRequest'
      responses:
        '200':
          description: 翻译成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateResult'
        '400':
          description: 指定模型不在网关可用模型列表（400302）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 未配置可用 AI 网关（403202）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 请求字段校验失败（422201，details.fields 提供字段原因）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 上游限流（429301）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: 上游调用失败或返回空译文（502301/502302）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: 上游调用超时（504301）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 后台管理员 JWT；无需 glossary 或 translation-logs 菜单权限

  schemas:
    TranslateRequest:
      type: object
      required: [source_lang, target_lang, source_text]
      properties:
        source_lang:
          type: string
          minLength: 1
          maxLength: 8
          example: en
        target_lang:
          type: string
          minLength: 1
          maxLength: 8
          example: es
        source_text:
          type: string
          minLength: 1
          maxLength: 10000
        custom_requirement:
          type: string
          maxLength: 500
          nullable: true
        model:
          type: string
          maxLength: 128
          nullable: true
          description: 不传时使用非空的网关 default_model；默认模型为空或传入模型不在 model_list 时返回 400302
    TranslateResult:
      type: object
      required: [translated_text, model, status, latency_ms]
      properties:
        translated_text:
          type: string
        model:
          type: string
        status:
          type: integer
          enum: [1]
          description: 1=success
        latency_ms:
          type: integer
          format: int64
          minimum: 0

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: object
          additionalProperties: true

        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/products/export:
    get:
      summary: 导出商品 CSV
      description: |
        按后台列表相同的 status/category_id/search 条件导出，不分页；最多 10000 行。
        超限时 CSV 末尾追加截断标记，并返回 X-Export-Truncated: true。
      operationId: exportAdminProducts
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - name: category_id
          in: query
          schema:
            type: integer
            format: int64
        - name: search
          in: query
          schema:
            type: string
            maxLength: 80
      responses:
        '200':
          description: UTF-8 BOM CSV 文件
          headers:
            Content-Disposition:
              description: attachment 文件名（products-yyyyMMdd.csv）
              schema:
                type: string
            X-Export-Truncated:
              description: 仅截断时返回 true
              schema:
                type: boolean
          content:
            text/csv; charset=UTF-8:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/products/{id}:
    get:
      summary: 商品编辑详情
      description: ALIGN-003。返回全量字段 + SKU + 图片 + 尺码表 + 集合 + 三语翻译。不缓存。
      operationId: getAdminProduct
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProductDetail'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 编辑商品（保存并生成静态页）
      description: |
        ALIGN-003 / OP-011。整单覆盖更新；并发编辑以 SKU version 乐观锁与商品 updated 校验防丢失（409508）。
        保存成功后触发 @CacheInvalidate → MQ → revalidatePath + purge（"保存并生成静态页"语义，s-758）+ OperationLog（action=编辑商品）。
      operationId: updateAdminProduct
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProductUpsert'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProductDetail'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/Conflict'        # 409501 / 409504 / 409508
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: 删除商品
      description: 仅 draft 可删；published 需先下架（409509 PRODUCT_NOT_DELETABLE）。订单行为快照不受影响。写 OperationLog（action=删除商品）。
      operationId: deleteAdminProduct
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/Conflict'        # 409509 PRODUCT_NOT_DELETABLE
        '500':
          $ref: '#/components/responses/InternalError'


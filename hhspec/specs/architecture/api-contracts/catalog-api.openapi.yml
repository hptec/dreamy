openapi: 3.0.3
info:
  title: Catalog API (portal-api-integration)
  description: |
    catalog 限界上下文 API 契约，覆盖消费端（/api/store/products·categories·collections）与后台
    （/api/admin/products·categories·attribute-sets·attribute-defs·collection-groups·collections·uploads）。
    实体：Product / Sku / ProductImage / SizeChartRow / Category / AttributeDef / AttributeSet /
    AttributeSetItem / CollectionGroup / Collection 及 ProductTranslation / CategoryTranslation /
    AttributeDefTranslation / CollectionTranslation / CollectionGroupTranslation（决策 2/13）。

    ## R 包络映射（与线上基座一致，L3 勿按字面实现）
    实际 HTTP 线上响应统一为 huihao R 包络：成功 `{ code, message, data: <payload> }`，
    失败 `{ code, message, data: <details> }`（本契约错误 Schema 的 `details` 内容在线上装入 R 的 `data` 字段）。
    本契约各端点 response schema 仅建模 **data 载荷（payload）**，前端 client.ts 解包后消费。
    JSON 边界字段使用 snake_case；portal-admin/portal-store client 在浏览器侧统一转换为 camelCase。
    分页载荷统一为 huihao.page.Paginated 形状（snake_case 线上字段）：
    `{ data, total_elements, page_number, page_size, number_of_elements, total_pages }`
    ——与 backend UserOpsController 返回 R<Paginated<T>>、portal-admin PageResult（totalElements）消费习惯一致。

    ## Collection 命名与封面策略
    2026-06-17 起原 TagDimension / Tag 模型正式重命名为 CollectionGroup / Collection；商品挂载统一走
    AdminProductUpsert.collection_ids（Product-Collection nm 关系）。Collection 不持久化 cover，后台 Collection
    DTO 的 fallback_cover_urls 由集合内按 sort 排序的前 4 个商品主图动态装配，用于卡片拼贴。

    ## 鉴权约定（与 identity-api 一致）
    - 消费端公开只读端点 `security: []`；后台端点 AdminBearerAuth + RBAC 菜单权限 key（BE-DIM-6 新增权限点）。
    - store token 命中 /api/admin/* 必返 401（反之亦然）。
    - **鉴权基建提示（L2 明确设计）**：现有 StoreJwtFilter 对 /api/store/* 默认强制鉴权（identity 仅登录类端点例外）。
      本域全部消费端只读端点为匿名公开，L2 需将 filter 改造为**配置化公开路径白名单**（pattern 列表统一登记，
      勿逐端点硬编码），并与 marketing/review/trading/showroom 各域公开端点共用同一机制。

    ## 错误响应（决策 12，格式与 identity-api 一致）
    所有错误返回 `{ code, message, details? }`。新七域错误码为 6 位：高 3 位对应 HTTP 状态，
    第 4 位为域段（catalog=5、trading=6、marketing=7、review=8、shipping=9、analytics=0、showroom=1，
    决策 12 号段依次顺延、逢十回绕，showroom 为决策 20 新增域取 1），末 2 位为域内序号。
    消费端按 locale 返回 EN/ES/FR 文案，后台中文。

    ### catalog 域错误码表
    | code | 含义 | HTTP |
    |---|---|---|
    | 404501 | PRODUCT_NOT_FOUND 商品不存在或未发布 | 404 |
    | 404502 | CATEGORY_NOT_FOUND 分类不存在 | 404 |
    | 404503 | ATTRIBUTE_SET_NOT_FOUND 属性集不存在 | 404 |
    | 404504 | ATTRIBUTE_DEF_NOT_FOUND 属性定义不存在 | 404 |
    | 404505 | COLLECTION_NOT_FOUND 集合/分组不存在 | 404 |
    | 409501 | SLUG_EXISTS 商品 slug 已存在 | 409 |
    | 409502 | CATEGORY_HAS_PRODUCTS 分类下商品数 > 0 不可删除（js_guard: product_count === 0） | 409 |
    | 409503 | ATTRIBUTE_SET_IN_USE 属性集被分类引用不可删除 | 409 |
    | 409504 | SKU_CODE_EXISTS SKU 码重复 | 409 |
    | 409505 | CATEGORY_LEVEL_EXCEEDED 分类层级超过 3 层 | 409 |
    | 409506 | COLLECTION_GROUP_IN_USE 分组下仍有集合不可删除 | 409 |
    | 409507 | ATTRIBUTE_DEF_IN_USE 属性定义被属性集引用不可删除 | 409 |
    | 409508 | PRODUCT_VERSION_CONFLICT 商品并发编辑冲突（乐观锁） | 409 |
    | 409509 | PRODUCT_NOT_DELETABLE 已发布商品不可直接删除（需先下架） | 409 |
    | 422501 | FIELD_VALIDATION_FAILED 字段校验失败（含 compare_at < price、end_time <= start_time 等 js_guard） | 422 |
    | 422502 | SIZE_INPUT_OUT_OF_RANGE 尺码推荐输入超出可匹配范围 | 422 |
    | 502501 | OBJECT_STORAGE_UNAVAILABLE 对象存储预签名服务不可用（决策 9 降级路径） | 502 |

    ## 缓存标注（BE-DIM-8：每个只读端点标注缓存层级与失效触发者）
    - 消费端商品/分类/集合读端点：CDN `s-maxage` + JetCache 两级（key 含 locale 维度，决策 13）；
      失效触发者：管理端写操作 @CacheInvalidate → RabbitMQ → Next.js revalidatePath + Cloudflare purge（决策 4/22）。
    - /api/store/products/search：仅 JetCache 短 TTL 60s（决策 17），CDN 不缓存。
    - 尺码推荐为纯函数端点不缓存；后台端点一律不缓存。

    ## 价格与多币种（决策 14 连带约束之 L1 定夺）
    消费端商品读接口仅返回 USD 基准价（price/compare_at/multi_currency_prices 原样透出），
    展示换算放客户端（GET /api/store/exchange-rates，见 trading-api）；缓存 key 不含 currency 维度，仅含 locale。

    ## 版本历史
    - v1.0.0 (2026-06-10): 初始版本（ALIGN-002/003/004/016/020/024、决策 6/9/13/17/29）
    - v1.1.0 (2026-06-10): feasibility 修复——分页包络对齐 huihao Paginated；R 包络映射声明；CustomTag 合并处置；
      best_sellers/rating 聚合实现方式标注；StoreJwtFilter 公开路径白名单提示
    - v1.2.0 (2026-07-14): Tag 模型契约同步为 Collection；集合封面改为商品主图动态拼贴。
  version: 1.2.0
  contact:
    name: catalog domain team
    email: York_Morinkts@madonnafan.com

servers:
  - url: http://localhost:18081
    description: 本地（backend 单工程，端口 18081）

tags:
  - name: store-products
    description: 消费端商品列表/详情/搜索/推荐位（ALIGN-002/020、决策 29）
  - name: store-size
    description: 消费端 Find My Size 尺码推荐（ALIGN-024、决策 20.3）
  - name: store-categories
    description: 消费端分类树与营销集合导航（ALIGN-004）
  - name: admin-products
    description: 后台商品管理（ALIGN-002/003）
  - name: admin-categories
    description: 后台三层分类树管理（ALIGN-004）
  - name: admin-attribute-sets
    description: 后台属性集与属性字典（ALIGN-004）
  - name: admin-collections
    description: 后台集合分组、集合与集合商品管理（ALIGN-004）
  - name: admin-uploads
    description: 预签名 URL 上传（决策 9，媒体基建由 catalog 域代管，商品/分类/Banner/内容图片共用）

paths:
  # ============ STORE PRODUCTS ============
  /api/store/products:
    get:
      summary: 商品列表（分类页/筛选）
      description: |
        ALIGN-002 消费端。仅返回 status=published 商品；按 locale 应用 ProductTranslation（缺翻译回退 EN，决策 13）。
        缓存：CDN s-maxage + JetCache 两级（key 含全部筛选参数 + locale）；失效：后台商品写操作 @CacheInvalidate → MQ → revalidatePath + purge。
      operationId: listStoreProducts
      tags: [store-products]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: category_id
          in: query
          description: 分类筛选（含其子分类商品）
          schema:
            type: integer
            format: int64
        - name: collection_id
          in: query
          description: 集合筛选（Shop by Color 等，决策 29）
          schema:
            type: integer
            format: int64
        - name: color
          in: query
          description: 按 SKU 颜色筛选
          schema:
            type: string
            maxLength: 32
        - name: size
          in: query
          description: 按 SKU 尺码筛选
          schema:
            type: string
            maxLength: 16
        - name: price_min
          in: query
          description: USD 基准价下限
          schema:
            type: number
            minimum: 0
        - name: price_max
          in: query
          description: USD 基准价上限
          schema:
            type: number
            minimum: 0
        - name: sort
          in: query
          description: 排序规则（newest=上架时间倒序即 New Arrivals 规则，决策 29）
          schema:
            type: string
            enum: [newest, price_asc, price_desc, recommended]
            default: recommended
        - name: attr
          in: query
          description: 动态属性筛选，格式 key:value；参数可重复，同 key 多值为 OR、跨 key 为 AND，最多 20 项
          style: form
          explode: true
          schema:
            type: array
            maxItems: 20
            items:
              type: string
              maxLength: 320
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProductListResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/products/filters:
    get:
      summary: 分类动态属性筛选维度
      description: |
        返回分类生效属性集中非 hidden 的 select/multiselect 维度，按属性集顺序排列；
        value 为 EN 规范值，label 按 locale 翻译。分类不存在时返回空 items。
        缓存：CDN s-maxage + JetCache 两级（key 含 category_id + locale）；属性字典、属性集或分类写操作触发失效。
      operationId: listStoreProductFilters
      tags: [store-products]
      security: []
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreFilterDim'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/products/search:
    get:
      summary: 商品全文搜索
      description: |
        ALIGN-020 / 决策 17。MySQL FULLTEXT ngram 检索商品名；locale=es/fr 时叠加 translation 附表的商品名检索。
        缓存：仅 JetCache 短 TTL 60s（key 含 q + locale + 分页），CDN 不缓存；失效：TTL 自然过期（短 TTL 兜底）。
      operationId: searchStoreProducts
      tags: [store-products]
      security: []
      parameters:
        - name: q
          in: query
          required: true
          description: 搜索关键词
          schema:
            type: string
            minLength: 1
            maxLength: 80
        - $ref: '#/components/parameters/LocaleParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 成功（无结果返回空 data）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProductListResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/products/recommendations:
    get:
      summary: 首页/推荐位商品（规则化推荐）
      description: |
        决策 29 / ALIGN-033。block 数据规则：new_arrivals=上架时间倒序；best_sellers=近 30 天已支付销量聚合（冷启动回退 recommend 手动标记）；
        shop_by_color=色板集合筛选（需 collection_id）；you_may_also_like=同品类+同价格段（需 product_id）；complete_the_look=同类目规则凑数（需 product_id，不建关联表）。
        best_sellers 销量数据为 trading→catalog 反向依赖：由 MQ 订单支付事件消费者回写商品销量冗余字段（30 天滚动窗口），
        读路径不跨域 join；冗余字段与回写节奏由 L2 详设定稿。
        缓存：CDN s-maxage + JetCache 两级（key 含 block + product_id/collection_id + locale）；失效：商品写操作/订单支付事件回写 @CacheInvalidate → MQ → revalidatePath + purge。
      operationId: listStoreRecommendations
      tags: [store-products]
      security: []
      parameters:
        - name: block
          in: query
          required: true
          schema:
            type: string
            enum: [new_arrivals, best_sellers, shop_by_color, you_may_also_like, complete_the_look]
        - name: product_id
          in: query
          description: block=you_may_also_like / complete_the_look 时必填，基准商品
          schema:
            type: integer
            format: int64
        - name: collection_id
          in: query
          description: block=shop_by_color 时必填，色板集合
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 8
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreProductCard'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/products/{slug}:
    get:
      summary: 商品详情（PDP）
      description: |
        ALIGN-002/003/024 消费端 PDP。含图廊/SKU 矩阵（现货库存）/尺码表/定制尺寸开关与交期（决策 6）/集合；按 locale 应用翻译。
        未发布或不存在返回 404501。
        缓存：CDN s-maxage（ISR 商品页同源）+ JetCache 两级（key 含 slug + locale）；失效：后台商品写操作 @CacheInvalidate → MQ → revalidatePath + purge（s-758 失效链）。
      operationId: getStoreProduct
      tags: [store-products]
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9-]+$'
            maxLength: 128
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProductDetail'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404501 PRODUCT_NOT_FOUND
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/products/{id}/size-recommendation:
    post:
      summary: Find My Size 尺码推荐（纯函数）
      description: |
        ALIGN-024 / 决策 20.3。基于该商品 SizeChartRow 区间匹配（身高/胸/腰/臀落入码段 + 松紧偏好偏移）。
        话术为区间说明（如"您的三围均落在 US 8 区间"），不虚构买家占比；无法匹配时 matched=false 并给出建议联系客服文案 key。
        纯函数端点，不缓存，无副作用。
      operationId: recommendSize
      tags: [store-size]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/LocaleParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SizeRecommendationRequest'
      responses:
        '200':
          description: 匹配结果（含 matched=false 的无法匹配场景）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeRecommendationResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404501（商品无尺码表也视为不可推荐 → matched=false，商品不存在才 404）
        '422':
          $ref: '#/components/responses/ValidationError'  # 422502 SIZE_INPUT_OUT_OF_RANGE
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ STORE CATEGORIES & COLLECTIONS ============
  /api/store/categories:
    get:
      summary: 分类树（三层）
      description: |
        ALIGN-004 消费端导航/分类页。返回启用分类的三层树（含 product_count），按 locale 应用 CategoryTranslation。
        缓存：CDN s-maxage + JetCache 两级（key 含 locale）；失效：后台分类写操作 @CacheInvalidate → MQ → revalidatePath + purge。
      operationId: listStoreCategories
      tags: [store-categories]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreCategoryNode'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/collections:
    get:
      summary: 集合导航（按分组聚合）
      description: |
        ALIGN-004 / 决策 29。返回 status=enabled 的集合，按 CollectionGroup 聚合；
        按 locale 应用 CollectionTranslation/CollectionGroupTranslation。消费端响应不返回封面字段。
        缓存：CDN s-maxage + JetCache 两级（key 含 locale）；失效：后台集合写操作 @CacheInvalidate → MQ → revalidatePath + purge。
      operationId: listStoreCollections
      tags: [store-categories]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
        - name: group_id
          in: query
          description: 仅返回指定分组
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreCollectionGroup'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN PRODUCTS ============
  /api/admin/products:
    get:
      summary: 商品列表（后台）
      description: ALIGN-002。支持状态/分类/关键词筛选。不缓存。
      operationId: listAdminProducts
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - name: category_id
          in: query
          schema:
            type: integer
            format: int64
        - name: search
          in: query
          description: 商品名/款式编号模糊搜索
          schema:
            type: string
            maxLength: 80
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProductListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: 新增商品
      description: |
        ALIGN-003。整单提交基础信息/属性/SKU 矩阵/图片（对象 key 来自预签名上传）/尺码表/集合/三语翻译 tab（决策 13）。
        slug 唯一（409501）；SKU 码唯一（409504）；compare_at >= price（422501）。
        写成功后触发 @CacheInvalidate → MQ 失效链 + OperationLog（action=创建商品）。
      operationId: createAdminProduct
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProductUpsert'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProductDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409501 / 409504
        '422':
          $ref: '#/components/responses/ValidationError'  # 422501
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/products/batch:
    post:
      summary: 批量操作商品
      description: |
        单次 1~200 个 id，逐条独立执行；部分或全部行失败仍返回 200，由 failures 提供行级错误。
        delete 对不存在商品幂等成功；已发布商品删除失败码为 409509。
      operationId: batchAdminProducts
      tags: [admin-products]
      security:
        - AdminBearerAuth: [/products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProductBatchRequest'
      responses:
        '200':
          description: 批量处理结果（含部分失败）
          content:

    post:
      summary: 获取预签名上传 URL
      description: |
        决策 9 / ALIGN-003。S3 兼容对象存储预签名直传；后端只存对象 key/URL。
        媒体基建由 catalog 域代管，商品图廊/色样/分类/Banner/内容封面共用本端点。
        对象存储不可用返回 502501（降级路径：提示稍后重试，表单其余字段可先保存）。
      operationId: presignAdminUpload
      tags: [admin-uploads]
      security:
        - AdminBearerAuth: [/products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/UpstreamError'   # 502501
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: 资源唯一标识（Long 自增主键，决策 12）
      schema:
        type: integer
        format: int64
    PageParam:
      name: page
      in: query
      description: 页码（从 1 开始）
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: 每页数量
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    LocaleParam:
      name: locale
      in: query
      description: 内容语言（决策 13：EN 存主表，ES/FR 存 translation 附表，缺翻译回退 EN）；消费端只读缓存 key 含此维度
      schema:
        type: string
        enum: [en, es, fr]
        default: en

  schemas:
    ProductStatus:
      type: integer
      enum: [1, 2]
      description: 1=draft，2=published
    ImageKind:
      type: integer
      enum: [1, 2, 3, 4]
      description: 1=gallery，2=lifestyle，3=video，4=swatch
    AttributeType:
      type: integer
      enum: [1, 2, 3, 4]
      description: 1=select，2=multiselect，3=text，4=toggle
    AttributeVisibility:
      type: integer
      enum: [1, 2, 3]
      description: 1=visible，2=optional，3=hidden

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 数字业务错误码（高 3 位对应 HTTP 状态，第 4 位域段 catalog=5，见 info 码表）
          example: 404501
        message:
          type: string
          description: 当前语言默认文案（store EN/ES/FR；admin 中文）
        details:
          type: object
          description: 可选，字段级错误等
          additionalProperties: true

    # ---- 翻译附表（决策 13） ----
    ProductTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        name:
          type: string
          maxLength: 128
        description:
          type: string
        designer_note:
          type: string
        selling_points:
          type: array
          items:
            type: string
        seo_title:
          type: string
          maxLength: 128
        seo_description:
          type: string
          maxLength: 255
    CategoryTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        name:
          type: string
          maxLength: 64
    AttributeDefTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        label:
          type: string
        options:
          type: array
          description: 与主表 options 等长的译文选项列表
          items:
            type: string
    CollectionTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        label:
          type: string
    CollectionGroupTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        name:
          type: string

    # ---- 商品子资源 ----
    ProductImage:
      type: object
      required: [url, kind]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        url:
          type: string
          maxLength: 512
        kind:
          $ref: '#/components/schemas/ImageKind'
        color_name:
          type: string
          maxLength: 32
          description: kind=4（swatch）时的颜色名（每颜色一张色样图）
        sort:
          type: integer
          minimum: 0
          nullable: true
          default: 0
          description: 拖拽排序；sort === 0 为主图（js_guard）
    Sku:
      type: object
      required: [sku_code, color, size]
      properties:
        id:
          type: integer
          format: int64
          description: 已有 SKU 编辑时回传；新建行省略
        sku_code:
          type: string
          maxLength: 64
          pattern: '^[A-Z0-9-]+$'
        color:
          type: string
          maxLength: 32
        size:
          type: string
          maxLength: 16
        stock:
          type: integer
          minimum: 0
          nullable: true
          default: 0
          description: 现货库存；定制款（custom_size_available）不扣库存（决策 6）
        version:
          type: integer
          format: int64
          description: 乐观锁版本（扣减防超卖，BE-DIM-4）；已有 SKU 携带 id 时必须回传
    SizeChartRow:
      type: object
      required: [us]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        us:
          type: string
          maxLength: 8
        uk:
          type: string
          maxLength: 8
        au:
          type: string
          maxLength: 8
        bust:
          type: number
          minimum: 0
          description: 胸围(in)
        waist:
          type: number
          minimum: 0
          description: 腰围(in)
        hips:
          type: number
          minimum: 0
          description: 臀围(in)
        hollow_to_floor:
          type: number
          minimum: 0
          description: 中空到地(in)
    AttributeValueEntry:
      type: object
      required: [key, values]
      properties:
        key:
          type: string
          maxLength: 64
        values:
          type: array
          description: select/text/toggle 至多一个值；multiselect 可多值
          items:
            type: string
            maxLength: 255
    StoreAttributeOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          description: EN 规范值，用于筛选和落库
        label:
          type: string
          description: 已按 locale 解析的展示值
    StoreAttribute:
      type: object
      required: [key, label, type, values]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          $ref: '#/components/schemas/AttributeType'
        values:
          type: array
          items:
            $ref: '#/components/schemas/StoreAttributeOption'
    StoreFilterDim:
      type: object
      required: [key, label, type, options]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: integer
          enum: [1, 2]
          description: 1=select，2=multiselect
        options:
          type: array
          items:
            $ref: '#/components/schemas/StoreAttributeOption'
    FabricComposition:
      type: object
      required: [layer, material, percentage]
      properties:
        layer:
          type: integer
          minimum: 1
          maximum: 4
          description: 1=Shell，2=Lining，3=Overlay，4=Trim
        material:
          type: string
        percentage:
          type: number
          minimum: 0
          maximum: 100
    CareItem:
      type: object
      required: [symbol, label]
      properties:
        symbol:
          type: string
        label:
          type: string

    # ---- 消费端商品 ----
    StoreProductCard:
      type: object
      required: [id, slug, name, price]
      description: 商品卡片（列表/推荐位/收藏/浏览历史复用）；name/selling_points 已按 locale 解析
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
        price:
          type: number
          description: USD 基准现价（换算放客户端，决策 14 L1 定夺）
        compare_at:
          type: number
          description: USD 划线价（>= price）
        multi_currency_prices:
          type: object
          description: 每币种覆盖价（可空；客户端优先取覆盖价，否则按汇率换算）
          additionalProperties:
            type: number
        installment:
          type: boolean
        is_new:
          type: boolean
        is_best:
          type: boolean
        image_url:
          type: string
          description: 主图（ProductImage sort=0 的 url 派生）
        swatches:
          type: array
          description: 色样（kind=swatch 图片派生）
          items:
            type: object
            properties:
              color_name:
                type: string
              url:
                type: string
        rating_avg:
          type: number
          description: 已通过评价均分（review→catalog 反向依赖：MQ 评价审核事件回写商品评分冗余字段，读路径不跨域 join，L2 定稿）
        rating_count:
          type: integer
          description: 已通过评价数（同 rating_avg，MQ 事件回写冗余字段派生）
        selling_points:
          type: array
          items:
            type: string
    StoreProductListResponse:
      type: object
      description: huihao.page.Paginated 形状（线上为 R<Paginated<StoreProductCard>>，契约建模 data 载荷）
      required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StoreProductCard'
        total_elements:
          type: integer
          description: 总记录数
        page_number:
          type: integer
          description: 当前页码（从 1 开始）
        page_size:
          type: integer
        number_of_elements:
          type: integer
          description: 本页实际条数
        total_pages:
          type: integer
    StoreProductDetail:
      type: object
      required: [id, slug, name, price, category_id, lead_time_days, images, skus]
      description: PDP 全量数据；文案字段已按 locale 解析（缺翻译回退 EN）
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
        category_id:
          type: integer
          format: int64
        category_name:
          type: string
          description: 所属分类名（Category.name 派生，已按 locale 解析）
        description:
          type: string
        designer_note:
          type: string
        selling_points:
          type: array
          items:
            type: string
        price:
          type: number
        compare_at:
          type: number
        multi_currency_prices:
          type: object
          additionalProperties:
            type: number
        installment:
          type: boolean
        is_new:
          type: boolean
        is_best:
          type: boolean
        lead_time_days:
          type: integer
          minimum: 1
          description: 标准发货周期(天)；结算 wedding date 交期复核依据（决策 20.6）
        rush_available:
          type: boolean
        custom_size_available:
          type: boolean
          description: 定制尺寸开关（A-007；PDP Custom Size 表单依赖）
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/StoreAttribute'
        style_no:
          type: string
        seo_title:
          type: string
        seo_desc:
          type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
        skus:
          type: array
          items:
            $ref: '#/components/schemas/Sku'
        size_chart:
          type: array
          items:
            $ref: '#/components/schemas/SizeChartRow'
        collections:
          type: array
          description: 商品挂载的集合（已按 locale 解析）
          items:
            type: object
            required: [id, collection_group_id, name]
            properties:
              id:
                type: integer
                format: int64
              collection_group_id:
                type: integer
                format: int64
              name:
                type: string
        rating_avg:
          type: number
          description: 同 StoreProductCard.rating_avg（MQ 评价审核事件回写冗余字段）
        rating_count:
          type: integer
          description: 同 StoreProductCard.rating_count
        fabric_compositions:
          type: array
          items:
            $ref: '#/components/schemas/FabricComposition'
        care_instructions:
          type: array
          items:
            $ref: '#/components/schemas/CareItem'
        fabric_care_note:
          type: string

    # ---- 尺码推荐（决策 20.3） ----
    SizeRecommendationRequest:
      type: object
      required: [height, bust, waist, hips]
      properties:
        height:
          type: number
          minimum: 0
          description: 身高(in)，用于中空到地区间复核
        bust:
          type: number
          minimum: 0
          description: 胸围(in)
        waist:
          type: number
          minimum: 0
          description: 腰围(in)
        hips:
          type: number
          minimum: 0
          description: 臀围(in)
        fit_preference:
          type: string
          enum: [snug, regular, relaxed]
          default: regular
          description: 松紧偏好（按区间偏移一档）
    SizeRecommendationResponse:
      type: object
      required: [matched]
      properties:
        matched:
          type: boolean
          description: 是否匹配到码段；false 时 explanation 给出建议（不虚构买家占比）
        recommended_row:
          $ref: '#/components/schemas/SizeChartRow'
        explanation:
          type: string
          description: 区间说明话术（按 locale 渲染，如"您的三围均落在 US 8 区间"）
        dimension_notes:
          type: array
          description: 每维度落点说明（跨码段时透出取大码建议）
          items:
            type: object
            properties:
              dimension:
                type: string
                enum: [bust, waist, hips, hollow_to_floor]
              matched_us:
                type: string
                description: 该维度落入的 US 码

    # ---- 分类 / 集合 ----
    StoreCategoryNode:
      type: object
      required: [id, name, level]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 已按 locale 解析
        parent_id:
          type: integer
          format: int64
        level:
          type: integer
          minimum: 1
          maximum: 3
        sort:
          type: integer
        product_count:
          type: integer
          minimum: 0
        children:
          type: array
          items:
            $ref: '#/components/schemas/StoreCategoryNode'
    StoreCollectionGroup:
      type: object
      required: [id, name, collections]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 分组名（已按 locale 解析）
        description:
          type: string
        collections:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id:
                type: integer
                format: int64
              name:
                type: string
              product_count:
                type: integer

    # ---- 后台商品 ----
    AdminProductListItem:
      type: object
      required: [id, name, slug, price, status, sales_total]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        style_no:
          type: string
        category_id:
          type: integer
          format: int64
        category_name:
          type: string
          readOnly: true
        price:
          type: number
        compare_at:
          type: number
        status:
          $ref: '#/components/schemas/ProductStatus'
        is_new:
          type: boolean
        is_best:
          type: boolean
        recommend:
          type: boolean
        sort:
          type: integer
        stock_total:
          type: integer
          minimum: 0
          readOnly: true
          description: 全 SKU 库存合计（派生）
        image_url:
          type: string
          readOnly: true
          description: 主图（派生）
        sales_total:
          type: integer
          minimum: 0
          readOnly: true
          description: 已支付后状态订单行累计销量（派生；缺失按 0）
    AdminProductListResponse:
      type: object
      description: huihao.page.Paginated 形状（线上为 R<Paginated<AdminProductListItem>>）
      required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminProductListItem'
        total_elements:
          type: integer
          description: 总记录数
        page_number:
          type: integer
          description: 当前页码（从 1 开始）
        page_size:
          type: integer
        number_of_elements:
          type: integer
          description: 本页实际条数
        total_pages:
          type: integer
    AdminProductUpsert:
      type: object
      required: [name, slug, category_id, price, lead_time_days, status]
      properties:
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 128
          pattern: '^[a-z0-9-]+$'
        category_id:
          type: integer
          format: int64
        description:
          type: string
        designer_note:
          type: string
        selling_points:
          type: array
          items:
            type: string
        price:
          type: number
          minimum: 0
          description: 现价 USD
        compare_at:
          type: number
          minimum: 0
          description: 划线价；js_guard compare_at == null || compare_at >= price（422501）
        installment:
          type: boolean
        multi_currency_prices:
          type: object
          additionalProperties:
            type: number
        status:
          $ref: '#/components/schemas/ProductStatus'
        is_new:
          type: boolean
        is_best:
          type: boolean
        recommend:
          type: boolean
        sort:
          type: integer
          minimum: 0
        lead_time_days:
          type: integer
          minimum: 1
        rush_available:
          type: boolean
        custom_size_available:
          type: boolean
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeValueEntry'
        style_no:
          type: string
          maxLength: 32
        seo_title:
          type: string
          maxLength: 128
        seo_desc:
          type: string
          maxLength: 255
        images:
          type: array
          description: 整单覆盖（url 来自预签名上传后的公开地址）
          items:
            $ref: '#/components/schemas/ProductImage'
        skus:
          type: array
          description: 颜色x尺码矩阵整单覆盖；已有 SKU 带 id+version 防并发（409508）
          items:
            $ref: '#/components/schemas/Sku'
        size_chart:
          type: array
          items:
            $ref: '#/components/schemas/SizeChartRow'
        collection_ids:
          type: array
          description: 挂载的集合 id 集合（nm 关系）
          items:
            type: integer
            format: int64
        translations:
          type: array
          description: 三语 tab（决策 13；ES/FR，可部分提交）
          items:
            $ref: '#/components/schemas/ProductTranslation'
        updated_at:
          type: string
          format: date-time
          description: 编辑端可选回传；用于无 SKU 商品的并发防丢失校验
        fabric_compositions:
          type: array
          items:
            $ref: '#/components/schemas/FabricComposition'
        care:
          type: array
          items:
            $ref: '#/components/schemas/CareItem'
        fabric_care_note:
          type: string
    AdminProductDetail:
      allOf:
        - $ref: '#/components/schemas/AdminProductUpsert'
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
              readOnly: true
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true

    AdminProductBatchRequest:
      type: object
      required: [action, ids]
      properties:
        action:
          type: string
          enum: [publish, unpublish, recommend, unrecommend, delete]
        ids:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: integer
            format: int64
    AdminProductBatchFailure:
      type: object
      required: [id, error_code, message]
      properties:
        id:
          type: integer
          format: int64
        error_code:
          type: integer
        message:
          type: string
    AdminProductBatchResult:
      type: object
      required: [success_ids, failures]
      properties:
        success_ids:
          type: array
          items:
            type: integer
            format: int64
        failures:
          type: array
          items:
            $ref: '#/components/schemas/AdminProductBatchFailure'

    # ---- 后台分类 ----
    AdminCategoryUpsert:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64
        parent_id:
          type: integer
          format: int64
          description: 空为根分类；根分类必须给 attribute_set_id
        attribute_set_id:
          type: integer
          format: int64
        attr_overrides:
          type: object
          description: 仅存与父级属性集不同的 delta（saveDrawer 语义）
          additionalProperties:
            $ref: '#/components/schemas/AttributeVisibility'
        sort:
          type: integer
        translations:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTranslation'
    AdminCategoryNode:
      allOf:
        - $ref: '#/components/schemas/AdminCategoryUpsert'
        - type: object
          required: [id, level, product_count]
          properties:
            id:
              type: integer
              format: int64
            level:
              type: integer
              minimum: 1
              maximum: 3
            product_count:
              type: integer
              minimum: 0
              description: js_guard：=== 0 时才允许删除（canDelete）
            children:
              type: array
              items:
                $ref: '#/components/schemas/AdminCategoryNode'

    # ---- 属性集 / 属性定义 ----
    AttributeSetItem:
      type: object
      required: [attribute_id, visibility]
      properties:
        attribute_id:
          type: integer
          format: int64
        visibility:
          $ref: '#/components/schemas/AttributeVisibility'
          description: 必填/可选/隐藏（FLD-ATTRIBUTESETS-001/002/003）
    AttributeSetUpsert:
      type: object
      required: [label, items]
      properties:
        label:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AttributeSetItem'
    AttributeSet:
      allOf:
        - $ref: '#/components/schemas/AttributeSetUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            category_count:
              type: integer
              description: 引用本属性集的分类数（删除约束判定派生）
    AttributeDefUpsert:
      type: object
      required: [key, label, type]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          $ref: '#/components/schemas/AttributeType'
        options:
          type: array
          description: js_guard：type === select || multiselect 时才有选项
          items:
            type: string
        translations:
          type: array
          items:
            $ref: '#/components/schemas/AttributeDefTranslation'
    AttributeDef:
      allOf:
        - $ref: '#/components/schemas/AttributeDefUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64

    # ---- 集合分组 / 集合 ----
    CollectionGroupUpsert:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        translations:
          type: array
          items:
            $ref: '#/components/schemas/CollectionGroupTranslation'
    CollectionGroup:
      allOf:
        - $ref: '#/components/schemas/CollectionGroupUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            collection_count:
              type: integer
              description: 分组下集合数（删除约束判定派生）
    CollectionUpsert:
      type: object
      required: [collection_group_id, name, status]
      properties:
        collection_group_id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 64
        status:
          type: integer
          enum: [1, 2]
          description: 1=enabled，2=disabled
        translations:
          type: array
          items:
            $ref: '#/components/schemas/CollectionTranslation'
    Collection:
      allOf:
        - $ref: '#/components/schemas/CollectionUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            product_count:
              type: integer
              minimum: 0
            fallback_cover_urls:
              type: array
              maxItems: 4
              description: 按 product_collection.sort 取前 4 个商品主图动态派生；不持久化。
              items:
                type: string
    CollectionProduct:
      type: object
      required: [product_id, name, slug, status, sort]
      properties:
        product_id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        status:
          type: integer
          enum: [1, 2]
        image_url:
          type: string
          nullable: true
        sort:
          type: integer
          minimum: 0
    CollectionProductsUpsert:
      type: object
      required: [product_ids]
      properties:
        product_ids:
          type: array
          items:
            type: integer
            format: int64

    # ---- 上传 ----
    PresignRequest:
      type: object
      required: [file_name, content_type]
      properties:
        file_name:
          type: string
          maxLength: 255
        content_type:
          type: string
          description: MIME 类型（image/jpeg、image/png、image/webp、video/mp4）
        scope:
          type: string
          enum: [product, category, banner, content]
          default: product
          description: 对象 key 前缀归类
    PresignResponse:
      type: object
      required: [upload_url, object_key, public_url, expires_at]
      properties:
        upload_url:
          type: string
          description: PUT 直传地址（短时效）
        object_key:
          type: string
        public_url:
          type: string
          description: CDN 公开访问地址（落库存此值）
        expires_at:
          type: string
          format: date-time

  responses:
    ValidationError:
      description: 参数校验失败（422501 FIELD_VALIDATION_FAILED / 422502 SIZE_INPUT_OUT_OF_RANGE）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 token 无效（含跨端 token 误用，40100 系列沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 无权限（RBAC 菜单权限 key 校验失败，40300 沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: 资源不存在（404501~404505）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 冲突（409501~409509）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: 外部服务不可用（502501 OBJECT_STORAGE_UNAVAILABLE）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误（50000 沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    StoreBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        消费端 store JWT（与 identity-api 同基建）。catalog 域消费端读端点均为匿名公开（security: []，
        走 StoreJwtFilter 配置化公开路径白名单）；本 scheme 仅为跨文件约定一致而声明。
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        后台 admin JWT（与 identity-api 同基建）。security 列表中的字符串数组表示所需菜单权限 key
        （本域新增权限点：/products、/categories、/attribute-sets，BE-DIM-6），由 RBAC 守卫校验。

security: []

openapi: 3.0.3
info:
  title: Glossary API (i18n-complete-with-ai-assist)
  description: |
    婚纱领域翻译术语表管理 API 契约，维护 EN→ES/FR 的专业术语对照（A-line/ball gown/sweetheart neckline 等）。

    ## 设计依据
    - decision.md 决策 14（婚纱领域术语表，保证术语译法一致性）
    - er-diagram.yml：AiTranslationGlossary 实体定义
    - acceptance.yml：FUNC-022（术语表 CRUD + 启用术语注入 AI system prompt）

    ## 术语表作用
    翻译时，所有 enabled=true 的术语条目注入 AI system prompt，格式如下：
    ```
    Use these standard bridal terms in translation:
    - "A-line" → "línea A" (ES) / "ligne A" (FR)
    - "sweetheart neckline" → "escote corazón" (ES) / "décolleté en cœur" (FR)
    ...
    ```
    保证多次翻译同一术语的译法一致性，这是婚纱垂直领域翻译质量的关键。

    ## R 包络映射（与 catalog-api 一致）
    实际 HTTP 线上响应统一为 huihao R 包络：成功 `{ code, message, data: <payload> }`。
    本契约各端点 response schema 仅建模 **data 载荷（payload）**。
    分页载荷统一为 huihao.page.Paginated 形状（snake_case）：
    `{ data, total_elements, page_number, page_size, number_of_elements, total_pages }`

    ## 鉴权约定
    - 所有端点需要 AdminBearerAuth（后台 JWT）
    - 需要 `/system/glossary` 菜单权限（运营主管/系统管理员）

    ## 错误响应
    所有错误返回 `{ code, message, details? }`。术语表域错误码为 6 位：高 3 位对应 HTTP 状态，
    第 4 位为域段（glossary=4），末 2 位为域内序号。

    ### glossary 域错误码表
    | code | 含义 | HTTP |
    |------|------|------|
    | 404401 | TERM_NOT_FOUND | 404 |
    | 409401 | TERM_EN_EXISTS（英文术语已存在） | 409 |
    | 422401 | FIELD_VALIDATION_FAILED | 422 |

    ## 版本历史
    - v1.0.0 (2026-06-16): 初始版本（i18n-complete-with-ai-assist 变更）
  version: 1.0.0
  contact:
    name: glossary team
    email: York_Morinkts@madonnafan.com

servers:
  - url: http://localhost:8080
    description: 本地（backend 单工程，端口 8080）

tags:
  - name: admin-glossary
    description: 后台翻译术语表管理（FUNC-022）

paths:
  /api/admin/glossary/terms:
    post:
      summary: 新增术语
      description: |
        FUNC-022。新增婚纱领域翻译术语，term_en 唯一（不区分大小写）。
        启用状态的术语（enabled=true）会在翻译时注入 AI system prompt。
      operationId: createGlossaryTerm
      tags: [admin-glossary]
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlossaryTermUpsert'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '409':
          description: 英文术语已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 409401
                message: "术语已存在"
                details: { term_en: "A-line", existing_id: 12 }
        '422':
          description: 字段校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: 术语列表
      description: |
        FUNC-022。查询术语表，支持按 category/enabled 筛选和分页。
        默认按 term_en 字母序排序。
      operationId: listGlossaryTerms
      tags: [admin-glossary]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: category
          in: query
          description: 术语分类筛选（廓形/领型/面料/工艺等）
          schema:
            type: string
            maxLength: 32
        - name: enabled
          in: query
          description: 启用状态筛选（true=仅启用/false=仅禁用）
          schema:
            type: boolean
        - name: keyword
          in: query
          description: 关键词搜索（匹配 term_en/term_es/term_fr，不区分大小写）
          schema:
            type: string
            maxLength: 64
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 术语列表（分页）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTermPage'

  /api/admin/glossary/terms/{id}:
    get:
      summary: 获取术语详情
      description: 返回单个术语详情。
      operationId: getGlossaryTerm
      tags: [admin-glossary]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 术语详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '404':
          description: 术语不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404401
                message: "术语不存在"

    put:
      summary: 更新术语
      description: |
        FUNC-022。更新术语内容或启用状态。
        若修改 term_en，需检查新值是否与其他术语冲突（409）。
      operationId: updateGlossaryTerm
      tags: [admin-glossary]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlossaryTermUpsert'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '404':
          description: 术语不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 英文术语冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 字段校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: 删除术语
      description: |
        FUNC-022。删除术语（硬删除）。
        删除后，该术语不再注入翻译 prompt。无关联约束检查（术语表独立，不被其他表引用）。
      operationId: deleteGlossaryTerm
      tags: [admin-glossary]
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 删除成功（无响应体）
        '404':
          description: 术语不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 后台管理员 JWT（8h access token，需 /system/glossary 权限）

  parameters:
    PageParam:
      name: page
      in: query
      description: 页码（从 1 开始）
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: 每页条数
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  schemas:
    GlossaryTermUpsert:
      type: object
      required: [term_en, enabled]
      properties:
        term_en:
          type: string
          minLength: 1
          maxLength: 128
          description: 英文术语（唯一，不区分大小写）
          example: "A-line"
        term_es:
          type: string
          maxLength: 128
          description: 西语标准译法（可选，未填时该语言不注入 prompt）
          example: "línea A"
        term_fr:
          type: string
          maxLength: 128
          description: 法语标准译法（可选，未填时该语言不注入 prompt）
          example: "ligne A"
        category:
          type: string
          maxLength: 32
          description: 术语分类（廓形/领型/面料/工艺等，可选，用于分组展示）
          example: "廓形"
        enabled:
          type: boolean
          default: true
          description: 是否启用（注入 AI prompt）

    GlossaryTerm:
      allOf:
        - $ref: '#/components/schemas/GlossaryTermUpsert'
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
              example: 1
            created_at:
              type: string
              format: date-time
              example: "2026-06-16T08:00:00Z"
            updated_at:
              type: string
              format: date-time
              example: "2026-06-16T10:30:00Z"

    GlossaryTermPage:
      type: object
      required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GlossaryTerm'
        total_elements:
          type: integer
          format: int64
          description: 总记录数
          example: 58
        page_number:
          type: integer
          description: 当前页码（从 1 开始）
          example: 1
        page_size:
          type: integer
          description: 每页条数
          example: 50
        number_of_elements:
          type: integer
          description: 当前页实际条数
          example: 50
        total_pages:
          type: integer
          description: 总页数
          example: 2

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 6 位错误码（高 3 位对应 HTTP 状态）
          example: 404401
        message:
          type: string
          description: 错误消息
          example: "术语不存在"
        details:
          type: object
          description: 错误详情（可选，含字段名/值等上下文）
          additionalProperties: true

openapi: 3.0.3
info:
  title: Site Builder API (site-decoration-fullstack)
  description: |
    site_builder 限界上下文 API 契约（KD-15 新建 domain_code=site_builder），覆盖站点装修后台与消费端内容读取：
    - 后台 `/api/admin/site-builder/`：首页区块 CRUD/排序/启停、主导航整体保存、页脚栏目整体保存、公告条 CRUD/启停。
    - 消费端 `/api/store/content/`：首页区块聚合渲染、主导航、页脚、公告条；以及 `/api/store/newsletter` 首页区块订阅入口（扩展基线 marketing-api 端点，KD-13）。

    ## R 包络映射（与 marketing-api 一致，L3 勿按字面实现）
    实际 HTTP 线上响应统一为 huihao R 包络：成功 `{ code, message, data: <payload> }`，
    失败 `{ code, message, data: <details> }`（本契约错误 Schema 的 `details` 内容在线上装入 R 的 `data` 字段）。
    本契约各端点 response schema 仅建模 **data 载荷（payload）**。分页载荷统一为 huihao.page.Paginated 形状
    （snake_case：`{ data, total_elements, page_number, page_size, number_of_elements, total_pages }`）。

    ## 鉴权约定（KD-BE-6 / BE-DIM-6）
    - 后台端点 `AdminBearerAuth + @RequirePermission(perm_code)`；本域新增权限点：`/site/home`、`/site/navigation`、`/site/announcement`
      （`/site/announcement` 由 DataInitializer 新增种子，GRD-007）。
    - 消费端内容读端点公开匿名（`security: []`）；newsletter 订阅匿名提交（扩展基线，KD-13/KD-11）。
    - **鉴权基建提示（L2 明确设计）**：现有 StoreJwtFilter 对 /api/store/* 默认强制鉴权。本域全部消费端
      内容读端点与 newsletter 提交端点为匿名公开，需纳入 filter 的**配置化公开路径白名单**
      （与 marketing 域 store-content/store-newsletter 端点共用同一机制，勿逐端点硬编码）。

    ## i18n 策略（KD-16，覆盖 KD-3 / GRD-W08）
    HomePageSection / NavigationItem / FooterColumn / FooterLink / Announcement 五个主实体均使用主表 `i18n_json` JSON 列承载多语言文案，
    **不建独立 `*_translations` 表**。`i18n_json` 结构：`{ "en": {...}, "es": {...}, "fr": {...} }`；EN 为基准语言（主表 `label`/`content`/`title` 字段同步存 EN 值），
    ES/FR 翻译存 `i18n_json` 内。后台 API 透传 `i18n_json` 整块对象；消费端 API 由后端按 `locale` 参数解析后返回扁平字符串字段。
    BannerTranslation 是基线已有翻译表（与本域 KD-16 模式偏离，作为技术债保留，KD-16 已声明）。

    ## 发布机制（KD-4 保存即发布，无草稿态）
    HomePageSection / NavigationItem / FooterColumn / FooterLink / Announcement 均无草稿状态机，状态字段为 `enabled: boolean`（二态）。
    后台保存 API 直接写入 DB（单表 @Transactional，BE-DIM-4），保存成功后通过 in-process `cache.invalidateFamily(Family.HOME_SECTION|NAVIGATION|ANNOUNCEMENT)`
    + `publisher.publish(TYPE_*_CHANGED, ...)` 触发缓存失效链（GRD-004/GRD-005/GRD-W01 修正，**非 HTTP 自调** `/api/admin/cache/invalidate`）。

    ## 缓存标注（BE-DIM-8）
    - 消费端内容读端点（home/navigation/footer/announcements）：JetCache 两级缓存（Caffeine 本地 + Redis 远程，TTL=300s）；
      key 按 `portal+locale` 维度（`marketing:home_section:{locale}` / `marketing:navigation:{locale}` / `marketing:announcement:{locale}`）。
    - 失效触发者：后台对应写操作 @CacheInvalidate → `MarketingContentInvalidatedPublisher.publish` →
      `cacheService.logInvalidation` + `cdnService.invalidatePaths(["/", "/es", "/fr"])`（全站级失效，GRD-005）。
    - newsletter 订阅端点不缓存（订阅数据不进消费端缓存）。

    ## 错误响应（6 位码，与 marketing-api 一致格式）
    `{ code, message, details? }`；6 位码：高 3 位 HTTP 状态 + 域段（**site_builder=8**）+ 序号。

    ### site_builder 域错误码表
    | code | 含义 | HTTP |
    |---|---|---|
    | 404801 | SECTION_NOT_FOUND 首页区块不存在 | 404 |
    | 404802 | NAVIGATION_ITEM_NOT_FOUND 导航项不存在 | 404 |
    | 404803 | FOOTER_COLUMN_NOT_FOUND 页脚栏目不存在 | 404 |
    | 404804 | ANNOUNCEMENT_NOT_FOUND 公告条不存在 | 404 |
    | 409801 | SECTION_LABEL_EXISTS 首页区块 label 重复（同 sort_order 唯一约束） | 409 |
    | 409802 | NAVIGATION_LABEL_EXISTS 导航项 label 重复（label+sort_order 唯一约束） | 409 |
    | 409803 | FOOTER_COLUMN_TITLE_EXISTS 页脚栏目 title 重复（title+sort_order 唯一约束） | 409 |
    | 409804 | ANNOUNCEMENT_CONTENT_EXISTS 公告 content 文案重复 | 409 |
    | 422801 | FIELD_VALIDATION_FAILED 字段校验失败（必填缺失/枚举非法/长度超限等 js_guard） | 422 |
    | 422802 | TAXONOMY_REF_INVALID NavigationItem.taxonomy_id 不存在或 taxonomy_type 不匹配（TaxonomyService 校验失败，FLOW-010） | 422 |
    | 422803 | BANNER_REF_INVALID Hero 区块关联的 Banner position=HERO 不存在或未发布（FLOW-009 兜底） | 422 |
    | 422804 | PRODUCT_REF_INVALID ProductRail source=recommend 时 product_ids 含不存在商品（ProductService 校验失败） | 422 |
    | 422805 | WEDDING_REF_INVALID EditorialFeature wedding_ids 含不存在案例（WeddingService 校验失败） | 422 |
    | 422806 | MEGA_MENU_CONFIG_INVALID mega_menu_json 配置非法（source/ref_id/ref_type 组合不满足 js_guard） | 422 |
    | 422807 | I18N_JSON_INVALID i18n_json 结构非法（locale key 不在 {en,es,fr} 或必填文案缺失） | 422 |
    | 422808 | SECTION_TYPE_DATA_MISMATCH section_type 与 data_json/i18n_json 组合不满足 js_guard（如 Hero data_json 非空 / Newsletter i18n_json 为空） | 422 |

    注：`/api/store/newsletter` 扩展基线 marketing-api 端点（KD-13），错误码沿用 marketing 域（422704 FIELD_VALIDATION_FAILED 等），
    本契约不重复声明；`source=home_block` 枚举值为本变更新增（NewsletterSource.HOME_BLOCK(4)，GRD-009）。

    ## 端点总数
    - admin 端 15 个（home-sections 6 + navigation 2 + footer 2 + announcements 5）
    - store 端 5 个（home/navigation/footer/announcements 4 + newsletter 1）
    - 合计 **20 个**

    ## 版本历史
    - v1.0.0 (2026-06-23): 初始版本（site-decoration-fullstack L1.2 产出，KD-1~17 + GRD/GRD2 修正全量落地）
  version: 1.0.0
  contact:
    name: site_builder domain team
    email: York_Morinkts@madonnafan.com

servers:
  - url: http://localhost:8080
    description: 本地（backend 单工程，端口 8080）

tags:
  - name: admin-home-sections
    description: 后台首页区块管理（HomeBuilder.vue，KD-2/4/8/9/10/11，权限 /site/home）
  - name: admin-navigation
    description: 后台主导航整体保存（NavigationConfig.vue 主导航 Tab，权限 /site/navigation）
  - name: admin-footer
    description: 后台页脚栏目整体保存（NavigationConfig.vue 页脚栏目 Tab，权限 /site/navigation）
  - name: admin-announcements
    description: 后台公告条管理（NavigationConfig.vue 公告条 Tab，KD-7，权限 /site/announcement）
  - name: store-content
    description: 消费端内容读取（首页区块/导航/页脚/公告条，匿名公开，JetCache 两级缓存）
  - name: store-newsletter
    description: 消费端 Newsletter 订阅（KD-11/KD-13，扩展基线 marketing-api POST /api/store/newsletter，source=home_block）

paths:
  # ============ ADMIN HOME SECTIONS ============
  /api/admin/site-builder/home-sections:
    get:
      summary: 首页区块列表
      description: |
        返回所有 HomePageSection 记录（含禁用），按 sort_order 升序。
        管理端 HomeBuilder.vue 区块列表渲染数据源（含 enabled=false 区块，前端显示删除线 + 灰色）。
        缓存：后台读端点不缓存（实时读 DB）；消费端读走 /api/store/content/home（带 JetCache 两级）。
      operationId: listAdminHomeSections
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: 新增首页区块
      description: |
        KD-4 保存即发布（无草稿态）。BE-DIM-4 单表 @Transactional 事务原子写入。
        js_guard：section_type=Hero 时 data_json 应为空且 i18n_json 为 null（文案/图片/CTA 全部从 Banner position=HERO 派生，KD-2/KD-14）；
        section_type=Announcement 时 data_json 应为空且 i18n_json 为 null（公告内容从 Announcement 域派生，KD-7）；
        section_type=Newsletter 时 data_json 应为空且 i18n_json 非空（title/subtitle/cta_text 文案存 i18n_json，KD-11+KD-16）；
        section_type=ProductRail && data_json.source=recommend 时 data_json.product_ids 非空数组（KD-9）；
        section_type=ProductRail 时 data_json.limit ∈ [1, 12]；
        section_type=ShopByColor 时 data_json.count ∈ [1, 8]。
        保存成功触发 in-process 缓存失效链（cache.invalidateFamily(Family.HOME_SECTION) + publisher.publish(TYPE_HOME_SECTION_CHANGED)）。
        写 OperationLog（action=创建首页区块）。
      operationId: createAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSectionUpsert'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409801
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801~422808
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/{id}:
    put:
      summary: 编辑首页区块
      description: |
        KD-4 保存即发布。BE-DIM-4 单表 @Transactional。
        js_guard 同 POST（section_type 与 data_json/i18n_json 组合校验，422808 SECTION_TYPE_DATA_MISMATCH）。
        保存成功触发 in-process 缓存失效链（HOME_SECTION 族）。写 OperationLog（action=编辑首页区块）。
      operationId: updateAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSectionUpsert'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801
        '409':
          $ref: '#/components/responses/Conflict'        # 409801
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: 删除首页区块（物理删除）
      description: |
        KD-4/CONSTRAINT-004 物理删除（无 deleted_at 字段，配置类误删可重建）。
        保存成功触发 in-process 缓存失效链（HOME_SECTION 族）。写 OperationLog（action=删除首页区块）。
      operationId: deleteAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: 删除成功
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/sort:
    put:
      summary: 批量调整首页区块排序
      description: |
        HomeBuilder.vue ChevronUp/ChevronDown 调整 sort_order 后的批量保存。
        入参为有序 ID 数组，后端按数组下标重写 sort_order（0-based 连续整数）。
        BE-DIM-4 单 @Transactional 批量更新；保存成功触发 HOME_SECTION 族缓存失效。
        写 OperationLog（action=排序首页区块）。
      operationId: sortAdminHomeSections
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  description: 有序区块 ID 数组（数组下标即新 sort_order）
                  items:
                    type: integer
                    format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801 任一 id 不存在
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801 ids 为空或含重复
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/{id}/toggle:
    patch:
      summary: 切换首页区块启用状态（行内 Toggle）
      description: |
        HomeBuilder.vue Toggle v-model=b.enabled 切换；状态机 home_page_section_status（enabled ↔ disabled，KD-4）。
        BE-DIM-4 单字段更新 @Transactional；保存成功触发 HOME_SECTION 族缓存失效（GRD-W01 in-process）。
        写 OperationLog（action=切换首页区块启停）。
      operationId: toggleAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN NAVIGATION (整体保存) ============
  /api/admin/site-builder/navigation:
    get:
      summary: 主导航项列表（含 Mega Menu 配置）
      description: |
        返回所有 NavigationItem 记录（含禁用），按 sort_order 升序。
        管理端 NavigationConfig.vue 主导航 Tab 渲染数据源。
        Mega Menu 列定义内嵌在 NavigationItem.mega_menu_json（KD-6 不单独建表）。
        缓存：后台读端点不缓存。
      operationId: getAdminNavigation
      tags: [admin-navigation]
      security:
        - AdminBearerAuth: [/site/navigation]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationItem'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 整体保存主导航（批量 upsert + 排序 + 启停）
      description: |
        NavigationConfig.vue 主导航 Tab "保存并重新生成 header" 按钮触发（KD-4 保存即发布）。
        入参为完整导航项数组，后端 diff 当前 DB 状态：新增/更新/删除/重排 sort_order 一次性 @Transactional 完成（BE-DIM-4）。
        js_guard：link_type=taxonomy 时 taxonomy_id 非空（TaxonomyService.findById 校验，422802 TAXONOMY_REF_INVALID，FLOW-010）；
        link_type=custom 时 custom_href 非空；
        mega_menu_json.source=category-children 时 ref_id 非空；source=taxonomy-type 时 ref_type ∈ [theme, category]（422806 MEGA_MENU_CONFIG_INVALID）。
        保存成功触发 in-process 缓存失效链（NAVIGATION 族，header+footer 共用，GRD-004/GRD-W01）。
        写 OperationLog（action=保存主导航配置）。
      operationId: saveAdminNavigation
      tags: [admin-navigation]
      security:
        - AdminBearerAuth: [/site/navigation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/NavigationItemUpsert'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationItem'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409802
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801/422802/422806/422807/422808
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN FOOTER (整体保存) ============
  /api/admin/site-builder/footer:
    get:
      summary: 页脚栏目列表（含链接）
      description: |
        返回所有 FooterColumn 记录（含禁用），按 sort_order 升序，每栏目内嵌 FooterLink 数组（按 sort_order 升序）。
        管理端 NavigationConfig.vue 页脚栏目 Tab 渲染数据源。缓存：后台读端点不缓存。
      operationId: getAdminFooter
      tags: [admin-footer]
      security:
        - AdminBearerAuth: [/site/navigation]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FooterColumn'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 整体保存页脚（批量 upsert 栏目+链接+排序+启停）
      description: |
        NavigationConfig.vue 页脚栏目 Tab 保存按钮触发（KD-4 保存即发布）。
        入参为完整栏目数组（含内嵌 links），后端 diff 当前 DB 状态：新增/更新/删除栏目与链接、重排 sort_order 一次性 @Transactional 完成（BE-DIM-4）。
        js_guard：栏目 title 不重复（409803 FOOTER_COLUMN_TITLE_EXISTS）；链接 href 非空（422801）。
        保存成功触发 in-process 缓存失效链（NAVIGATION 族，与 header 共用，GRD-004 方案 A）。写 OperationLog（action=保存页脚配置）。
      operationId: saveAdminFooter
      tags: [admin-footer]
      security:
        - AdminBearerAuth: [/site/navigation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/FooterColumnUpsert'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FooterColumn'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409803
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801/422807
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN ANNOUNCEMENTS ============
  /api/admin/site-builder/announcements:
    get:
      summary: 公告条列表
      description: |
        返回所有 Announcement 记录（含禁用），按 sort_order 升序。
        管理端 NavigationConfig.vue 公告条 Tab 渲染数据源。缓存：后台读端点不缓存。
      operationId: listAdminAnnouncements
      tags: [admin-announcements]
      security:
        - AdminBearerAuth: [/site/announcement]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:

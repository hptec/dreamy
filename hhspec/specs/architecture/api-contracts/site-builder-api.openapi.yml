  # ============ STORE NEWSLETTER（扩展基线 marketing-api，KD-11/KD-13） ============
  /api/store/newsletter:
    post:
      summary: Newsletter 订阅（首页区块入口）
      description: |
        KD-11/KD-13 扩展基线 marketing-api POST /api/store/newsletter（不新建独立端点，GRD-009）。
        首页 Newsletter 区块订阅入口，source=home_block(4) 表示首页区块来源（NewsletterSource.HOME_BLOCK，GRD-009）。
        GRD2-003 方案 A：(email, source) 复合唯一约束，同邮箱同来源重复订阅幂等返回成功（200 + subscribed=true）；
        不同来源新增记录（如先 FOOTER 订阅后再 HOME_BLOCK 订阅，新增一条 source=HOME_BLOCK 记录）。
        GRD-001/KD-12：本期不扩展退订状态机，subscriber_status 单态 subscribed，订阅即生效；不发码不发邮件（对齐基线决策 26）。
        email 存储前小写归一（对齐基线 NewsletterService.normalizeEmail）。
        限流靠 Cloudflare WAF（与基线一致）。不缓存。
        错误码沿用 marketing 域（422704 FIELD_VALIDATION_FAILED 邮箱格式非法等），本契约不重复声明。
      operationId: subscribeNewsletterFromHomeBlock
      tags: [store-newsletter]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, source, locale]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: 订阅邮箱（后端存储前小写归一）
                source:
                  type: string
                  enum: [footer, modal, exit_intent, home_block]
                  description: |
                    订阅来源 IntEnum NewsletterSource（1=FOOTER / 2=MODAL / 3=EXIT_INTENT / 4=HOME_BLOCK）。
                    本变更新增 home_block(4)（GRD-009/KD-13），其他三个值沿用基线。
                locale:
                  type: string
                  enum: [en, es, fr]
                  description: 订阅时页面语言（写入 NewsletterSubscriber.locale）
      responses:
        '200':
          description: 已订阅（含重复订阅幂等返回）
          content:
            application/json:
              schema:
                type: object
                required: [subscribed]
                properties:
                  subscribed:
                    type: boolean
                    description: 成功订阅或重复订阅幂等均返回 true
        '422':
          $ref: '#/components/responses/ValidationError'  # 422704（marketing 域码）邮箱格式非法
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: 资源唯一标识（Long 自增主键）
      schema:
        type: integer
        format: int64
    LocaleParam:
      name: locale
      in: query
      description: |
        内容语言（KD-16 i18n_json JSON 列承载多语言文案；EN 为基准语言，ES/FR 翻译存 i18n_json 内）。
        后端按 locale 参数解析 i18n_json：locale=en 取主表字段，locale=es/fr 取 i18n_json[locale] 内对应字段，缺翻译回退 EN。
        缓存 key 含此维度（marketing:home_section:{locale} 等）。
      schema:
        type: string
        enum: [en, es, fr]
        default: en

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 数字业务错误码（高 3 位对应 HTTP 状态，第 4 位域段 site_builder=8，见 info 码表）
          example: 422801
        message:
          type: string
          description: 当前语言默认文案（store EN/ES/FR；admin 中文）
        details:
          type: object
          additionalProperties: true

    # ============ i18n_json 共享结构 ============
    I18nJson:
      type: object
      description: |
        KD-16 多语言文案 JSON 列结构。顶层 key 为 locale（en/es/fr），value 为该 locale 下的文案字段对象。
        EN 为基准语言，主表 label/content/title 字段同步存 EN 值；ES/FR 翻译存 i18n_json 内。
        缺翻译时消费端回退 EN 主表字段。使用 JacksonTypeHandler + @TableName(autoResultMap=true)（对齐 Category.attrOverrides 模式）。
        各实体 i18n_json 字段结构：
        - HomePageSection（非 Hero/Announcement 类型）：{ eyebrow, title, subtitle, cta_text }；Newsletter 类型：{ title, subtitle, cta_text }
        - NavigationItem：{ label, mega_menu_titles: { "<col_sort_order>": "<title>" } }
        - FooterColumn：{ title }
        - FooterLink：{ label }
        - Announcement：{ content }
        空 locale 对象允许（如仅提供 EN 翻译时 { "en": {...} }）。
      additionalProperties:
        type: object
        additionalProperties: true
      example:
        en:
          title: "Shop by Color"
          subtitle: "Find your perfect shade"
          cta_text: "Explore"
        es:
          title: "Comprar por Color"
          subtitle: "Encuentra tu tono perfecto"
          cta_text: "Explorar"
        fr:
          title: "Acheter par Couleur"
          subtitle: "Trouvez votre teinte parfaite"
          cta_text: "Explorer"

    # ============ HomePageSection ============
    HomePageSectionUpsert:
      type: object
      required: [section_type, enabled, sort_order]
      properties:
        section_type:
          type: string
          enum: [hero, theme_cards, product_rail, editorial_feature, newsletter, custom]
          description: |
            实际存储值为小写 snake_case。不同类型 data_json/i18n_json 约束不同（422808 SECTION_TYPE_DATA_MISMATCH）：
            - hero：data_json 为空且 i18n_json 为 null，且全表最多一条 Hero section
            - newsletter：data_json 为空且 i18n_json 非空（文案存 i18n_json）
            - theme_cards/product_rail/editorial_feature/custom：data_json 存区块配置，i18n_json 存文案（可选）
        label:
          type: string
          maxLength: 255
          nullable: true
          description: 后台显示名称（如 "Hero 主视觉"）
        enabled:
          type: boolean
          description: 启用状态（KD-4 保存即发布，无草稿态）
        sort_order:
          type: integer
          minimum: 0
          description: 排序序号（消费端按 sort_order 升序渲染）
        data_json:
          type: object
          nullable: true
          description: |
            区块配置数据（GRD2-002 修正）。结构随 section_type 变化：
            - hero/newsletter：应为 null（数据从 Banner 派生或 i18n_json 承载）
            - theme_cards：{ mode?: "auto"|"manual", count?: integer ∈ [1, 8], category_ids?: long[] }
            - product_rail：{ source?: "new_arrival"|"best_seller"|"recommend"|"category", limit?: integer ∈ [1, 12], product_ids?: long[], category_id?: long, sort?: string }
            - editorial_feature：{ limit?: integer ∈ [1, 6] }
            - custom：自定义 JSON 对象
          additionalProperties: true
        i18n_json:
          $ref: '#/components/schemas/I18nJson'
          nullable: true
        version:
          type: integer
          minimum: 0
          description: |
            乐观锁版本。POST 创建时省略（服务端初始化为 0）；PUT 更新与批量保存时必须传入
            最近一次响应中的 version，成功后响应返回递增后的版本。

    HomePageSectionUpdate:
      allOf:
        - $ref: '#/components/schemas/HomePageSectionUpsert'
        - type: object
          required: [version]

    HomePageSaveItem:
      allOf:
        - $ref: '#/components/schemas/HomePageSectionUpsert'
        - type: object
          required: [id, version]
          properties:
            id:
              type: integer
              format: int64

    HomePageSaveRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          description: 待保存的既有区块；每项 id 唯一，且每项 id、version 均必填。
          items:
            $ref: '#/components/schemas/HomePageSaveItem'

    HomePageSortItem:
      type: object
      required: [id, sort_order]
      properties:
        id:
          type: integer
          format: int64
        sort_order:
          type: integer
          minimum: 0

    HomePageSortRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          description: 显式 ID 与新排序值列表；id 必须唯一且存在，字段名使用全局 snake_case 序列化结果。
          items:
            $ref: '#/components/schemas/HomePageSortItem'

    HomePageSection:
      allOf:
        - $ref: '#/components/schemas/HomePageSectionUpsert'
        - type: object
          required: [id, data_json, i18n_json, label, version, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    # ============ NavigationItem ============
    NavigationItemUpsert:
      type: object
      required: [label, link_type, enabled, sort_order]
      properties:
        label:
          type: string
          maxLength: 64
          description: 导航项标签（EN 基准，存主表；ES/FR 翻译存 i18n_json.label）
        link_type:
          type: string
          enum: [taxonomy, custom]
          description: |
            链接类型。taxonomy 时引用 Taxonomy（品类/主题），href 从 TaxonomyService 派生；
            custom 时存 custom_href 自定义 URL。
        taxonomy_id:
          type: integer
          format: int64
          nullable: true
          description: link_type=taxonomy 时必填；引用 Taxonomy.id（Category 或 Collection 多态，GRD-002）。
        taxonomy_type:
          type: string
          enum: [category, theme]
          nullable: true
          description: |
            派生字段（OQ-4 方案 A 冗余存储）。link_type=taxonomy 时必填；
            标识引用的是品类（Category）还是主题（Collection with collectionGroupId=主题组）。
            TaxonomyService.findById 校验存在性 + 类型一致性（422802 TAXONOMY_REF_INVALID）。
        custom_href:
          type: string
          maxLength: 255
          nullable: true
          description: link_type=custom 时必填；自定义 URL。
        mega_menu_json:
          type: array
          nullable: true
          description: |
            KD-6 Mega Menu 列数组（内嵌 JSON 字段，不单独建表）。每列结构：
            { title: string, source: "category-children"|"taxonomy-type"|"custom", ref_id?: long, ref_type?: "category"|"theme", custom_links?: string[], sort_order: integer }
            js_guard（422806 MEGA_MENU_CONFIG_INVALID）：
            - source=category-children 时 ref_id 非空（引用品类 ID，派生子类）
            - source=taxonomy-type 时 ref_type ∈ [theme, category]（派生全部上线品类/主题）
            - source=custom 时 custom_links 非空数组
            列标题 i18n 存主表 i18n_json.mega_menu_titles（{ "<col_sort_order>": "<title>" }，OQ-5 方案 A）。
          items:
            type: object
            properties:
              title:
                type: string
                maxLength: 64
                description: 列标题（EN 基准）
              source:
                type: string
                enum: [category-children, taxonomy-type, custom]
              ref_id:
                type: integer
                format: int64
                nullable: true
              ref_type:
                type: string
                enum: [category, theme]
                nullable: true
              custom_links:
                type: array
                nullable: true
                items:
                  type: string
                  maxLength: 255
              sort_order:
                type: integer
                minimum: 0
        i18n_json:
          $ref: '#/components/schemas/I18nJson'
          nullable: true
        enabled:
          type: boolean
        sort_order:
          type: integer
          minimum: 0

    NavigationItem:
      allOf:
        - $ref: '#/components/schemas/NavigationItemUpsert'
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    # ============ FooterColumn / FooterLink ============
    FooterLinkUpsert:
      type: object
      required: [label, href, sort_order]
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: 已有链接更新时传 id；新增链接不传 id（后端自增生成）。
        label:
          type: string
          maxLength: 64
          description: 链接文案（EN 基准，存主表；ES/FR 翻译存 i18n_json.label）
        href:
          type: string
          maxLength: 255
          description: 链接 URL
        sort_order:
          type: integer
          minimum: 0
        i18n_json:
          $ref: '#/components/schemas/I18nJson'
          nullable: true

    FooterLink:
      allOf:
        - $ref: '#/components/schemas/FooterLinkUpsert'
        - type: object
          required: [id, footer_column_id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            footer_column_id:
              type: integer
              format: int64
              description: 逻辑外键 FooterColumn.id
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    FooterColumnUpsert:
      type: object
      required: [title, enabled, sort_order, links]
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: 已有栏目更新时传 id；新增栏目不传 id。
        title:
          type: string
          maxLength: 64
          description: 栏目标题（EN 基准，存主表；ES/FR 翻译存 i18n_json.title）
        enabled:
          type: boolean
        sort_order:
          type: integer
          minimum: 0
        links:
          type: array
          description: 栏目下的链接列表（按 sort_order 升序）；整体保存时后端 diff 已有链接：传 id 的更新、不传 id 的新增、未传的删除。
          items:
            $ref: '#/components/schemas/FooterLinkUpsert'
        i18n_json:
          $ref: '#/components/schemas/I18nJson'
          nullable: true

    FooterColumn:
      allOf:
        - $ref: '#/components/schemas/FooterColumnUpsert'
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            links:
              type: array
              items:
                $ref: '#/components/schemas/FooterLink'
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    # ============ Announcement ============
    AnnouncementUpsert:
      type: object
      required: [enabled, sort_order, content]
      properties:
        enabled:
          type: boolean
        sort_order:
          type: integer
          minimum: 0
        content:
          type: string
          maxLength: 255
          description: 公告文案（EN 基准，存主表；ES/FR 翻译存 i18n_json.content）
        i18n_json:
          $ref: '#/components/schemas/I18nJson'
          nullable: true

    Announcement:
      allOf:
        - $ref: '#/components/schemas/AnnouncementUpsert'
        - type: object
          required: [id, created_at, updated_at]
          properties:
            id:
              type: integer
              format: int64
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    # ============ 消费端 Schema（已按 locale 解析） ============
    StoreHeroSlide:
      type: object
      description: |
        单张 Hero 轮播项。文案已按 locale 从 BannerTranslation 解析，链接取 Banner 主表。
      required: [id, image_url]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          nullable: true
          description: Banner title（已按 locale 解析）。
        subtitle:
          type: string
          nullable: true
        image_url:
          type: string
          description: Banner 主图 URL
        cta_text:
          type: string
          nullable: true
          description: 第一 CTA 文案（已按 locale 解析）。
        cta_link:
          type: string
          nullable: true
          description: 第一 CTA 链接。
        cta_text_secondary:
          type: string
          nullable: true
          description: 第二 CTA 文案（已按 locale 解析）。
        cta_link_secondary:
          type: string
          nullable: true
          description: 第二 CTA 链接。

    StoreHeroData:
      type: object
      description: |
        Hero section 的 `data`。`banners[]` 是权威轮播结构，含所有当前有效 HERO Banner，顺序为 sort ASC、id ASC。
        无有效 Banner 时响应省略整个 Hero section。下方 title/image_url/CTA 等扁平字段是 banners[0]
        的兼容快照，仅用于新旧消费端滚动部署；新客户端必须以 banners[] 渲染轮播。
      required: [banners]
      properties:
        banners:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/StoreHeroSlide'
        title:
          type: string
          nullable: true
          deprecated: true
        subtitle:
          type: string
          nullable: true
          deprecated: true
        image_url:
          type: string
          nullable: true
          deprecated: true
        cta_text:
          type: string
          nullable: true
          deprecated: true
        cta_link:
          type: string
          nullable: true
          deprecated: true
        cta_text_secondary:
          type: string
          nullable: true
          deprecated: true
        cta_link_secondary:
          type: string
          nullable: true
          deprecated: true

    StoreSectionCopy:
      type: object
      description: 从 HomePageSection.i18n_json 按 locale→en 回退解析的通用区块文案。
      properties:
        eyebrow:
          type: string
          nullable: true
        heading:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    StoreThemeCardsData:
      allOf:
        - $ref: '#/components/schemas/StoreSectionCopy'
        - type: object
          required: [cards]
          properties:
            cards:
              type: array
              description: auto 模式取根分类前 count 条；manual 模式严格保留 category_ids 顺序。
              items:
                type: object
                required: [id, name]
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  product_count:
                    type: integer
                    nullable: true

    StoreProductRailData:
      allOf:
        - $ref: '#/components/schemas/StoreSectionCopy'
        - type: object
          required: [products]
          properties:
            products:
              type: array
              items:
                $ref: '#/components/schemas/StoreProductCard'

    StoreProductCard:
      type: object
      description: catalog 域商品卡片派生结果。
      required: [id, slug, name, price]
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
        price:
          type: number
          description: USD 基准现价
        image_url:
          type: string
          nullable: true
        is_new:
          type: boolean
          nullable: true
        is_best:
          type: boolean
          nullable: true

    StoreEditorialFeatureData:
      allOf:
        - $ref: '#/components/schemas/StoreSectionCopy'
        - type: object
          required: [stories]
          properties:
            stories:
              type: array
              description: published 真实婚礼，按 wedding_date DESC 取前 limit 条。
              items:
                type: object
                required: [id, couple]
                properties:
                  id:
                    type: integer
                    format: int64
                  couple:
                    type: string
                  location:
                    type: string
                    nullable: true
                  theme:
                    type: string
                    nullable: true
                  wedding_date:
                    type: string
                    nullable: true
                  cover:
                    type: string
                    nullable: true
                  title:
                    type: string
                    nullable: true

    StoreNewsletterData:
      allOf:
        - $ref: '#/components/schemas/StoreSectionCopy'
        - type: object
          properties:
            placeholder:
              type: string
              nullable: true
            cta:
              type: string
              nullable: true

    StoreHeroSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [hero]
        data:
          $ref: '#/components/schemas/StoreHeroData'

    StoreThemeCardsSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [theme_cards]
        data:
          $ref: '#/components/schemas/StoreThemeCardsData'

    StoreProductRailSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [product_rail]
        data:
          $ref: '#/components/schemas/StoreProductRailData'

    StoreEditorialFeatureSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [editorial_feature]
        data:
          $ref: '#/components/schemas/StoreEditorialFeatureData'

    StoreNewsletterSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [newsletter]
        data:
          $ref: '#/components/schemas/StoreNewsletterData'

    StoreCustomSection:
      type: object
      required: [section_type, data]
      properties:
        section_type:
          type: string
          enum: [custom]
        data:
          type: object
          additionalProperties: true

    StoreHomePageSection:
      description: |
        消费端实际响应元素，固定为 `{section_type, data}`。不返回管理端 id/label/sort_order；
        数组顺序已由 home_sections.sort_order,id 决定。
      oneOf:
        - $ref: '#/components/schemas/StoreHeroSection'
        - $ref: '#/components/schemas/StoreThemeCardsSection'
        - $ref: '#/components/schemas/StoreProductRailSection'
        - $ref: '#/components/schemas/StoreEditorialFeatureSection'
        - $ref: '#/components/schemas/StoreNewsletterSection'
        - $ref: '#/components/schemas/StoreCustomSection'
      discriminator:
        propertyName: section_type
        mapping:
          hero: '#/components/schemas/StoreHeroSection'
          theme_cards: '#/components/schemas/StoreThemeCardsSection'
          product_rail: '#/components/schemas/StoreProductRailSection'
          editorial_feature: '#/components/schemas/StoreEditorialFeatureSection'
          newsletter: '#/components/schemas/StoreNewsletterSection'
          custom: '#/components/schemas/StoreCustomSection'

    StoreNavigationItem:
      type: object
      required: [id, label, link_type, sort_order]
      description: 消费端主导航项（已按 locale 解析 label；mega_menu 列子链接从 TaxonomyService 派生）。
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
          description: i18n_json[locale].label（缺翻译回退 EN 主表 label）
        link_type:
          type: string
          enum: [taxonomy, custom]
        href:
          type: string
          description: |
            派生链接。link_type=taxonomy 时由 TaxonomyService 派生（type=category → /categories/{slug}；type=theme → /themes/{slug}）；
            link_type=custom 时取 custom_href。
        sort_order:
          type: integer
        mega_menu:
          type: array
          nullable: true
          description: |
            Mega Menu 列派生数据（KD-6）。每列含 title（i18n_json.mega_menu_titles[locale] 解析）+ 子链接数组（TaxonomyService 派生）。
            无 Mega Menu 配置时为 null。
          items:
            type: object
            properties:
              title:
                type: string
              sort_order:
                type: integer
              links:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                    href:
                      type: string

    StoreFooterColumn:
      type: object
      required: [id, title, sort_order, links]
      description: 消费端页脚栏目（已按 locale 解析 title/label）。
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          description: i18n_json[locale].title（缺翻译回退 EN 主表 title）
        sort_order:
          type: integer
        links:
          type: array
          items:
            type: object
            required: [id, label, href, sort_order]
            properties:
              id:
                type: integer
                format: int64
              label:
                type: string
                description: i18n_json[locale].label（缺翻译回退 EN 主表 label）
              href:
                type: string
              sort_order:
                type: integer

    StoreAnnouncement:
      type: object
      required: [id, content, sort_order]
      description: 消费端公告条（已按 locale 解析 content）。
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
          description: i18n_json[locale].content（缺翻译回退 EN 主表 content）
        sort_order:
          type: integer

  responses:
    ValidationError:
      description: 参数/业务校验失败（422801~422808；newsletter 端点沿用 marketing 域 422704）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 token 无效（40100 系列沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 无权限（RBAC 菜单权限 key 校验失败，40300；本域权限点 /site/home、/site/navigation、/site/announcement）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: 资源不存在（404801~404804）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 冲突（409801~409804）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误（50000 沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    StoreBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        消费端 store JWT（与 identity-api 同基建）。本域消费端内容读端点与 newsletter 提交端点为匿名公开（security: []），
        StoreBearerAuth 仅作占位（本域暂无需要登录态的 store 端点）。
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        后台 admin JWT（与 identity-api 同基建）。security 列表中的字符串数组表示所需菜单权限 key
        （本域权限点：/site/home、/site/navigation、/site/announcement，KD-BE-6 / BE-DIM-6），由 RBAC 守卫校验。
        /site/announcement 由 DataInitializer 新增种子（GRD-007）。

security: []

openapi: 3.0.3
info:
  title: Site Builder API (site-decoration-fullstack)
  description: |
    site_builder 限界上下文 API 契约（KD-15 新建 domain_code=site_builder），覆盖站点装修后台与消费端内容读取：
    - 后台 `/api/admin/site-builder/`：首页区块 CRUD/排序/启停、主导航整体保存、页脚栏目整体保存、公告条 CRUD/启停。
    - 消费端 `/api/store/content/`：首页区块聚合渲染、主导航、页脚、公告条；以及 `/api/store/newsletter` 首页区块订阅入口（扩展基线 marketing-api 端点，KD-13）。

    ## R 包络映射（与 marketing-api 一致，L3 勿按字面实现）
    实际 HTTP 线上响应统一为 huihao R 包络：成功 `{ code, message, data: <payload> }`，
    失败 `{ code, message, data: <details> }`（本契约错误 Schema 的 `details` 内容在线上装入 R 的 `data` 字段）。
    本契约各端点 response schema 仅建模 **data 载荷（payload）**。分页载荷统一为 huihao.page.Paginated 形状
    （snake_case：`{ data, total_elements, page_number, page_size, number_of_elements, total_pages }`）。

    ## 鉴权约定（KD-BE-6 / BE-DIM-6）
    - 后台端点 `AdminBearerAuth + @RequirePermission(perm_code)`；本域新增权限点：`/site/home`、`/site/navigation`、`/site/announcement`
      （`/site/announcement` 由 DataInitializer 新增种子，GRD-007）。
    - 消费端内容读端点公开匿名（`security: []`）；newsletter 订阅匿名提交（扩展基线，KD-13/KD-11）。
    - **鉴权基建提示（L2 明确设计）**：现有 StoreJwtFilter 对 /api/store/* 默认强制鉴权。本域全部消费端
      内容读端点与 newsletter 提交端点为匿名公开，需纳入 filter 的**配置化公开路径白名单**
      （与 marketing 域 store-content/store-newsletter 端点共用同一机制，勿逐端点硬编码）。

    ## i18n 策略（KD-16，覆盖 KD-3 / GRD-W08）
    HomePageSection / NavigationItem / FooterColumn / FooterLink / Announcement 五个主实体均使用主表 `i18n_json` JSON 列承载多语言文案，
    **不建独立 `*_translations` 表**。`i18n_json` 结构：`{ "en": {...}, "es": {...}, "fr": {...} }`；EN 为基准语言（主表 `label`/`content`/`title` 字段同步存 EN 值），
    ES/FR 翻译存 `i18n_json` 内。后台 API 透传 `i18n_json` 整块对象；消费端 API 由后端按 `locale` 参数解析后返回扁平字符串字段。
    BannerTranslation 是基线已有翻译表（与本域 KD-16 模式偏离，作为技术债保留，KD-16 已声明）。

    ## 发布机制（KD-4 保存即发布，无草稿态）
    HomePageSection / NavigationItem / FooterColumn / FooterLink / Announcement 均无草稿状态机，状态字段为 `enabled: boolean`（二态）。
    后台保存 API 直接写入 DB（单表 @Transactional，BE-DIM-4），保存成功后由 SiteBuilderCacheService
    递增对应 Redis generation 并向 `site_builder:cache:invalidation` 发布失效消息；失效通知失败仅记录日志，不回滚已提交业务写入。

    ## 缓存标注（BE-DIM-8）
    - 消费端内容读端点（home/navigation/footer/announcements）当前由 Next RSC `no-store` 直读后端，后端聚合不缓存响应；
      后台写操作递增 Redis 共享 generation 并发布失效消息，供 CDN/后续缓存接入使用，避免进程内旧值。
    - 失效触发者：后台对应 Service 写操作 → `SiteBuilderCacheService.invalidate*Family()` →
      Redis generation 自增 + Pub/Sub 失效消息。
    - newsletter 订阅端点不缓存（订阅数据不进消费端缓存）。

    ## 启动数据安全约定
    - 演示业务 seed（首页区块、Banner、营销内容等）缺省关闭；仅显式设置
      `DEMO_SEED_ENABLED=true` / `dreamy.seed.demo-enabled=true` 时执行，正式启动不得创建或覆盖运营数据。
    - 新环境创建首个超管必须显式提供 `DREAMY_BOOTSTRAP_ADMIN_EMAIL` 和
      `DREAMY_BOOTSTRAP_ADMIN_PASSWORD`（至少 12 字符）；仅 demo seed 开启时允许本地演示凭据，不存在生产默认固定密码。

    ## 错误响应（6 位码，与 marketing-api 一致格式）
    `{ code, message, details? }`；6 位码：高 3 位 HTTP 状态 + 域段（**site_builder=8**）+ 序号。

    ### site_builder 域错误码表
    | code | 含义 | HTTP |
    |---|---|---|
    | 404801 | HOME_SECTION_NOT_FOUND 首页区块不存在 | 404 |
    | 404802 | NAVIGATION_NOT_FOUND 导航配置不存在 | 404 |
    | 404803 | FOOTER_NOT_FOUND 页脚配置不存在 | 404 |
    | 404804 | ANNOUNCEMENT_NOT_FOUND 公告条不存在 | 404 |
    | 404805 | TAXONOMY_NOT_FOUND 导航引用的分类不存在 | 404 |
    | 409801 | HOME_SECTION_SORT_CONFLICT 首页区块乐观锁 version 冲突 | 409 |
    | 409802 | NAVIGATION_ITEM_CYCLE_DETECTED 导航项形成循环引用 | 409 |
    | 409803 | FOOTER_COLUMN_SORT_CONFLICT 页脚栏目排序冲突 | 409 |
    | 409804 | ANNOUNCEMENT_TIME_WINDOW_CONFLICT 公告时间窗冲突 | 409 |
    | 409805 | NAVIGATION_VERSION_CONFLICT 导航配置乐观锁 version 冲突 | 409 |
    | 422801 | HOME_SECTION_DATA_JSON_INVALID 首页区块 data_json 或整页保存结构非法 | 422 |
    | 422802 | HOME_SECTION_TYPE_INVALID 首页区块 section_type 非法 | 422 |
    | 422803 | FOOTER_COLUMN_REF_INVALID 页脚链接引用的栏目不存在 | 422 |
    | 422804 | FOOTER_LINK_URL_INVALID 页脚链接 URL 非法 | 422 |
    | 422805 | ANNOUNCEMENT_TIME_WINDOW_INVALID 公告时间窗非法 | 422 |
    | 422806 | MEGA_MENU_CONFIG_INVALID mega_menu_json 配置非法（source/ref_id/ref_type 组合不满足 js_guard） | 422 |
    | 422807 | I18N_JSON_INVALID i18n_json 结构非法（locale key 不在 {en,es,fr}） | 422 |
    | 422808 | SECTION_TYPE_DATA_MISMATCH section_type 与 data_json/i18n_json 组合或字段约束不满足 js_guard | 422 |
    | 500801 | SITE_BUILDER_INTERNAL_ERROR 站点装修内部错误 | 500 |
    | 502801 | BANNER_SERVICE_UNAVAILABLE Banner 跨域服务不可用 | 502 |
    | 502802 | TAXONOMY_SERVICE_UNAVAILABLE Taxonomy 跨域服务不可用 | 502 |
    | 502803 | WEDDING_SERVICE_UNAVAILABLE Wedding 跨域服务不可用 | 502 |
    | 502804 | PRODUCT_SERVICE_UNAVAILABLE Product 跨域服务不可用 | 502 |

    注：`/api/store/newsletter` 扩展基线 marketing-api 端点（KD-13），错误码沿用 marketing 域（422704 FIELD_VALIDATION_FAILED 等），
    本契约不重复声明；`source=home_block` 枚举值为本变更新增（NewsletterSource.HOME_BLOCK(4)，GRD-009）。

    ## 端点总数
    - admin 端 17 个（home-sections 8 + navigation 2 + footer 2 + announcements 5）
    - store 端 5 个（home/navigation/footer/announcements 4 + newsletter 1）
    - 合计 **22 个**

    ## 版本历史
    - v1.1.0 (2026-07-14): 对齐首页区块详情、整页保存、排序与乐观锁实际契约
    - v1.0.0 (2026-06-23): 初始版本（site-decoration-fullstack L1.2 产出，KD-1~17 + GRD/GRD2 修正全量落地）
  version: 1.1.0
  contact:
    name: site_builder domain team
    email: York_Morinkts@madonnafan.com

servers:
  - url: http://localhost:8080
    description: 本地（backend 单工程，端口 8080）

tags:
  - name: admin-home-sections
    description: 后台首页区块管理（HomeBuilder.vue，KD-2/4/8/9/10/11，权限 /site/home）
  - name: admin-navigation
    description: 后台主导航整体保存（NavigationConfig.vue 主导航 Tab，权限 /site/navigation）
  - name: admin-footer
    description: 后台页脚栏目整体保存（NavigationConfig.vue 页脚栏目 Tab，权限 /site/navigation）
  - name: admin-announcements
    description: 后台公告条管理（NavigationConfig.vue 公告条 Tab，KD-7，权限 /site/announcement）
  - name: store-content
    description: 消费端内容读取（首页区块/导航/页脚/公告条，匿名公开，当前直接聚合读取）
  - name: store-newsletter
    description: 消费端 Newsletter 订阅（KD-11/KD-13，扩展基线 marketing-api POST /api/store/newsletter，source=home_block）

paths:
  # ============ ADMIN HOME SECTIONS ============
  /api/admin/site-builder/home-sections:
    get:
      summary: 首页区块列表
      description: |
        返回所有 HomePageSection 记录（含禁用），按 sort_order 升序。
        管理端 HomeBuilder.vue 区块列表渲染数据源（含 enabled=false 区块，前端显示删除线 + 灰色）。
        缓存：后台读端点不缓存（实时读 DB）；消费端读走 /api/store/content/home（带 JetCache 两级）。
      operationId: listAdminHomeSections
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - name: enabled_only
          in: query
          required: false
          description: true 时仅返回 enabled=true 的区块；省略或 false 时返回全部区块。
          schema:
            type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: 新增首页区块
      description: |
        KD-4 保存即发布（无草稿态）。BE-DIM-4 单表 @Transactional 事务原子写入。
        Hero 区块是首页配置单例：同一首页最多一条 section_type=hero（不区分 enabled），重复创建被拒绝。
        js_guard：section_type=hero 时 data_json 应为空，运行时文案/图片/CTA 从 position=HERO 的全部有效 Banner
        派生，不绑定单个 banner_id（KD-2/KD-14）；section_type=newsletter 时 i18n_json 非空；
        section_type=product_rail 时校验 source/limit/product_ids/category_id/sort 组合；
        section_type=theme_cards 时校验 mode/limit/category_ids 组合；section_type=editorial_feature 时 limit ∈ [1, 6]。
        保存成功递增 `site_builder:home:generation` 并发布共享失效消息。
      operationId: createAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSectionUpsert'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801/422802/422807/422808
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 批量保存首页区块
      description: |
        对传入的既有区块逐项执行乐观锁更新，并在单个事务中提交；不创建新 ID，也不删除未传入区块。
        `items` 必须非空且 ID 不得重复，每项必须携带当前 `id` 与 `version`。任一 ID 不存在或
        version 已过期时整批回滚。保存成功后返回按 sort_order、id 排序的完整区块列表。
      operationId: saveAllAdminHomeSections
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSaveRequest'
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801 任一 id 不存在
        '409':
          $ref: '#/components/responses/Conflict'        # 409801 任一 version 已过期
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801/422802/422807/422808
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/{id}:
    get:
      summary: 首页区块详情
      operationId: getAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 编辑首页区块
      description: |
        KD-4 保存即发布。BE-DIM-4 单表 @Transactional。
        js_guard 同 POST（section_type 与 data_json/i18n_json 组合校验，422808 SECTION_TYPE_DATA_MISMATCH）。
        保存成功递增 `site_builder:home:generation` 并发布共享失效消息。
      operationId: updateAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSectionUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801
        '409':
          $ref: '#/components/responses/Conflict'        # 409801
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: 删除首页区块（物理删除）
      description: |
        KD-4/CONSTRAINT-004 物理删除（无 deleted_at 字段，配置类误删可重建）。
        删除成功递增 `site_builder:home:generation` 并发布共享失效消息。
      operationId: deleteAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 删除成功（实际响应 `R<Void>` JSON 包络，`data=null`）
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/sort:
    put:
      summary: 批量调整首页区块排序
      description: |
        HomeBuilder.vue ChevronUp/ChevronDown 调整 sort_order 后的批量保存。
        入参为 `{items: [{id, sort_order}]}`，后端按每项显式 sort_order 更新，不按数组下标推导。
        BE-DIM-4 单 @Transactional 批量更新；每个成功更新的区块 version 自增 1，响应为 `R<Void>`；
        保存成功递增 `site_builder:home:generation` 并发布共享失效消息。
      operationId: sortAdminHomeSections
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomePageSortRequest'
      responses:
        '200':
          description: 排序成功（实际响应 `R<Void>` JSON 包络，`data=null`）
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801 任一 id 不存在
        '409':
          $ref: '#/components/responses/Conflict'        # 409801 并发更新冲突
        '422':
          $ref: '#/components/responses/ValidationError' # 422808 空/重复项或非法 sort_order
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/site-builder/home-sections/{id}/toggle:
    patch:
      summary: 切换首页区块启用状态（行内 Toggle）
      description: |
        HomeBuilder.vue Toggle v-model=b.enabled 切换；状态机 home_page_section_status（enabled ↔ disabled，KD-4）。
        BE-DIM-4 单字段更新 @Transactional；成功后返回 version 已递增的区块，并递增
        `site_builder:home:generation`、发布共享失效消息。
      operationId: toggleAdminHomeSection
      tags: [admin-home-sections]
      security:
        - AdminBearerAuth: [/site/home]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePageSection'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404801
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN NAVIGATION (整体保存) ============
  /api/admin/site-builder/navigation:
    get:
      summary: 主导航项列表（含 Mega Menu 配置）
      description: |
        返回所有 NavigationItem 记录（含禁用），按 sort_order 升序。
        管理端 NavigationConfig.vue 主导航 Tab 渲染数据源。
        Mega Menu 列定义内嵌在 NavigationItem.mega_menu_json（KD-6 不单独建表）。
        缓存：后台读端点不缓存。
      operationId: getAdminNavigation
      tags: [admin-navigation]
      security:
        - AdminBearerAuth: [/site/navigation]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationItem'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: 整体保存主导航（批量 upsert + 排序 + 启停）
      description: |
        NavigationConfig.vue 主导航 Tab "保存并重新生成 header" 按钮触发（KD-4 保存即发布）。
        入参为完整导航项数组，后端 diff 当前 DB 状态：新增/更新/删除/重排 sort_order 一次性 @Transactional 完成（BE-DIM-4）。
        js_guard：link_type=taxonomy 时 taxonomy_id 非空（TaxonomyService.findById 校验，422802 TAXONOMY_REF_INVALID，FLOW-010）；
        link_type=custom 时 custom_href 非空；
        mega_menu_json.source=category-children 时 ref_id 非空；source=taxonomy-type 时 ref_type ∈ [theme, category]（422806 MEGA_MENU_CONFIG_INVALID）。
        保存成功触发 in-process 缓存失效链（NAVIGATION 族，header+footer 共用，GRD-004/GRD-W01）。
        写 OperationLog（action=保存主导航配置）。
      operationId: saveAdminNavigation
      tags: [admin-navigation]
      security:
        - AdminBearerAuth: [/site/navigation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/NavigationItemUpsert'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationItem'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409802
        '422':
          $ref: '#/components/responses/ValidationError'  # 422801/422802/422806/422807/422808
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN FOOTER (整体保存) ============
  /api/admin/site-builder/footer:
    get:
      summary: 页脚栏目列表（含链接）
      description: |
        返回所有 FooterColumn 记录（含禁用），按 sort_order 升序，每栏目内嵌 FooterLink 数组（按 sort_order 升序）。
        管理端 NavigationConfig.vue 页脚栏目 Tab 渲染数据源。缓存：后台读端点不缓存。

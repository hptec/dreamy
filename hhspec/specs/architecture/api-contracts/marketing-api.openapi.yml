          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/content/lookbooks/{id}/status:
    patch:
      summary: 发布/下线 Lookbook
      description: PublishStatus 1（DRAFT）↔2（PUBLISHED）场景集。触发缓存失效链。
      operationId: patchAdminLookbookStatus
      tags: [admin-lookbooks]
      security:
        - AdminBearerAuth: [/content/lookbook]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/PublishStatus'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lookbook'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN GUIDES ============
  /api/admin/content/guides:
    get:
      summary: 备婚指南列表（后台）
      operationId: listAdminGuides
      tags: [admin-guides]
      security:
        - AdminBearerAuth: [/content/lookbook]
      parameters:
        - name: status
          in: query
          description: PublishStatus IntEnum；省略表示全部，不接受字符串 all。
          schema:
            $ref: '#/components/schemas/PublishStatus'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]

openapi: 3.0.3
info:
  title: Marketing API (portal-api-integration)
  description: |
    marketing 限界上下文 API 契约，覆盖消费端（/api/store/content·promotions·newsletter·contact）与后台
    （/api/admin/promotions·banners·content）。
    实体：Coupon / FlashSale / Banner / BlogPost / Lookbook / Guide / RealWedding / NewsletterSubscriber /
    ContactMessage 及 CouponTranslation / FlashSaleTranslation / BannerTranslation / BlogPostTranslation /
    LookbookTranslation / GuideTranslation / RealWeddingTranslation（决策 2/13/26/30）。

    ## R 包络映射（与线上基座一致，L3 勿按字面实现）
    实际 HTTP 线上响应统一为 huihao R 包络：成功 `{ code, message, data: <payload> }`，
    失败 `{ code, message, data: <details> }`（本契约错误 Schema 的 `details` 内容在线上装入 R 的 `data` 字段）。
    本契约各端点 response schema 仅建模 **data 载荷（payload）**。分页载荷统一为 huihao.page.Paginated 形状
    （snake_case：`{ data, total_elements, page_number, page_size, number_of_elements, total_pages }`，
    与 backend UserOpsController R<Paginated<T>> / portal-admin PageResult 消费习惯一致）。

    ## 鉴权约定（与 identity-api 一致）
    - 消费端内容/订阅/联系端点公开（security: []）；写端点（newsletter/contact）限流靠 Cloudflare WAF（决策 11/26/30）。
    - 后台端点 AdminBearerAuth + RBAC 菜单权限 key。
    - **鉴权基建提示（L2 明确设计）**：现有 StoreJwtFilter 对 /api/store/* 默认强制鉴权。本域全部消费端
      内容读端点与 newsletter/contact 提交端点为匿名公开，需纳入 filter 的**配置化公开路径白名单**
      （与 catalog/review/trading/showroom 公开端点共用同一机制，勿逐端点硬编码）。

    ## 错误响应（决策 12，格式与 identity-api 一致）
    `{ code, message, details? }`；6 位码：高 3 位 HTTP 状态 + 域段（marketing=7）+ 序号。

    ### marketing 域错误码表
    | code | 含义 | HTTP |
    |---|---|---|
    | 404701 | CONTENT_NOT_FOUND 内容不存在或未发布（Banner/Blog/Lookbook/Guide/Wedding） | 404 |
    | 404702 | COUPON_NOT_FOUND 优惠券不存在 | 404 |
    | 404703 | FLASH_SALE_NOT_FOUND 闪购活动不存在 | 404 |
    | 409701 | COUPON_CODE_EXISTS 券码已存在 | 409 |
    | 409702 | SLUG_EXISTS 文章 slug 已存在 | 409 |
    | 409703 | CONTENT_STATE_INVALID 当前发布状态不允许该操作（发布状态机 guard） | 409 |
    | 422701 | COUPON_INVALID 券不可用（不存在/未开始/已过期/已停用） | 422 |
    | 422702 | COUPON_MIN_AMOUNT_NOT_MET 未达券门槛金额 | 422 |
    | 422703 | COUPON_EXHAUSTED 券已领完/用完（used_count >= total_limit，js_guard） | 422 |
    | 422704 | FIELD_VALIDATION_FAILED 字段校验失败（含 end_at > start_at 等 js_guard） | 422 |

    注：结算校验券时（trading 调用 /coupons/validate），无效不抛错而是 200 + valid=false + reason_code（上表 4227xx），
    便于结算页就地提示；仅下单事务内核销失败才抛 422。

    ## 缓存标注（BE-DIM-8）
    - 消费端内容读端点（banners/blogs/weddings/lookbooks/guides/flash-sales）：CDN s-maxage + JetCache 两级
      （key 含 locale 维度，决策 13）；失效触发者：后台对应写操作 @CacheInvalidate → RabbitMQ → revalidatePath + Cloudflare purge（s-758）。
      源站 family 失效使用 Redis 共享代际 `marketing:cache-generation:{family}` 原子递增，缓存键实际形如
      `marketing:banners:v{generation}:{position}:{locale}`；所有实例立即切换到新命名空间，旧代由 TTL 回收，不依赖单进程 key registry。
    - 定时投放与到期下线（Banner start/end、Coupon/FlashSale endAt）由 @Scheduled 扫描状态翻转并触发同一失效链（ALIGN-008/009）。
    - newsletter/contact/coupons/validate 写或校验端点不缓存。

    ## 启动数据安全约定
    - 营销/Banner 演示 seed 缺省关闭，仅 `DEMO_SEED_ENABLED=true` 时灌入；正式启动不创建或覆盖业务数据。
    - 首个后台管理员需显式配置 `DREAMY_BOOTSTRAP_ADMIN_EMAIL` /
      `DREAMY_BOOTSTRAP_ADMIN_PASSWORD`（至少 12 字符）；不提供生产默认公开密码。

    ## 营销状态枚举线格式
    query、request body、response body 均使用后端 IntEnum 数字值；列表查询省略 status 表示全部，不接受字符串 `all`：
    - BannerPosition：1=HERO、2=FEATURED、3=TOPBAR
    - ContentStatus（Banner/Blog）：1=DRAFT、2=PUBLISHED、3=ARCHIVED
    - CouponStatus：1=DRAFT、2=SCHEDULED、3=ACTIVE、4=EXPIRING、5=EXPIRED
    - FlashSaleStatus：1=DRAFT、2=SCHEDULED、3=ACTIVE、4=ENDED
    - PublishStatus（Wedding/Lookbook/Guide）：1=DRAFT、2=PUBLISHED

    ## 版本历史
    - v1.0.0 (2026-06-10): 初始版本（ALIGN-008/009/010/011/012/016/030/034）
    - v1.1.0 (2026-06-10): feasibility 修复——分页包络对齐 huihao Paginated；R 包络映射声明；公开路径白名单提示
  version: 1.0.0
  contact:
    name: marketing domain team
    email: York_Morinkts@madonnafan.com

servers:
  - url: http://localhost:8080
    description: 本地（backend 单工程，端口 8080）

tags:
  - name: store-content
    description: 消费端内容读取（Banner/Blog/Weddings/Lookbook/Guide）
  - name: store-promotions
    description: 消费端促销（闪购展示、券校验）
  - name: store-newsletter
    description: Newsletter 订阅落表（ALIGN-030，决策 26）
  - name: store-contact
    description: 联系表单落表（ALIGN-034，决策 30）
  - name: admin-coupons
    description: 后台优惠券管理（ALIGN-008）
  - name: admin-flash-sales
    description: 后台闪购管理（ALIGN-008）
  - name: admin-banners
    description: 后台 Banner 管理（ALIGN-009）
  - name: admin-blogs
    description: 后台博客管理（ALIGN-010）
  - name: admin-weddings
    description: 后台真实婚礼案例管理（ALIGN-011）
  - name: admin-lookbooks
    description: 后台 Lookbook 管理（ALIGN-012）
  - name: admin-guides
    description: 后台备婚指南管理（ALIGN-012）

paths:
  # ============ STORE CONTENT ============
  /api/store/content/banners:
    get:
      summary: 在线 Banner（按位置）
      description: |
        返回 status=2（PUBLISHED）且当前时间落于投放窗口（start_time/end_time）的全部 Banner，按 sort ASC、id ASC 稳定排序；
        文案按 locale 解析（BannerTranslation）。
        首页 Hero 会消费 position=1（HERO）的整个有序数组作为轮播数据，不只取首条。
        缓存：CDN s-maxage + JetCache 两级（Redis 共享代际 + position + locale）；失效：后台 Banner 写/投放窗口穿越 → 代际递增 + MQ → revalidatePath + purge。
      operationId: listStoreBanners
      tags: [store-content]
      security: []
      parameters:
        - name: position
          in: query
          description: BannerPosition IntEnum（1=HERO、2=FEATURED、3=TOPBAR）
          schema:
            $ref: '#/components/schemas/BannerPosition'
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreBanner'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/blogs:
    get:
      summary: 博客文章列表
      description: |
        status=2（PUBLISHED）文章，按 published_at 倒序；支持栏目筛选；按 locale 解析（BlogPostTranslation）。
        缓存：CDN s-maxage + JetCache 两级（key 含 category + 分页 + locale）；失效：后台博客写操作 → MQ → revalidatePath + purge。
      operationId: listStoreBlogs
      tags: [store-content]
      security: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/LocaleParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                description: huihao.page.Paginated 形状（线上为 R<Paginated<StoreBlogPostCard>>）
                required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreBlogPostCard'
                  total_elements:
                    type: integer
                    description: 总记录数
                  page_number:
                    type: integer
                    description: 当前页码（从 1 开始）
                  page_size:
                    type: integer
                  number_of_elements:
                    type: integer
                    description: 本页实际条数
                  total_pages:
                    type: integer
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/blogs/{slug}:
    get:
      summary: 博客文章详情
      description: |
        按 slug 读取 status=2（PUBLISHED）文章（阅读数 views 异步累加，不阻塞读路径）。
        缓存：CDN s-maxage（ISR 文章页同源）+ JetCache 两级（key 含 slug + locale）；失效：后台博客写操作 → MQ → revalidatePath + purge。
      operationId: getStoreBlog
      tags: [store-content]
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreBlogPostDetail'
        '404':
          $ref: '#/components/responses/NotFoundError'   # 404701
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/weddings:
    get:
      summary: 真实婚礼案例列表
      description: |
        status=2（PUBLISHED）案例；按 locale 解析（RealWeddingTranslation）。
        缓存：CDN s-maxage + JetCache 两级（key 含分页 + locale）；失效：后台案例写操作 → MQ → revalidatePath + purge。
      operationId: listStoreWeddings
      tags: [store-content]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                description: huihao.page.Paginated 形状（线上为 R<Paginated<StoreRealWedding>>）
                required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreRealWedding'
                  total_elements:
                    type: integer
                    description: 总记录数
                  page_number:
                    type: integer
                    description: 当前页码（从 1 开始）
                  page_size:
                    type: integer
                  number_of_elements:
                    type: integer
                    description: 本页实际条数
                  total_pages:
                    type: integer
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/weddings/{id}:
    get:
      summary: 真实婚礼案例详情（Shop the Look）
      description: |
        含关联商品卡片（nm 关系，catalog 域联表派生）。
        缓存：CDN s-maxage + JetCache 两级（key 含 id + locale）；失效：后台案例写操作 → MQ → revalidatePath + purge。
      operationId: getStoreWedding
      tags: [store-content]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreRealWedding'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/lookbooks:
    get:
      summary: Lookbook 列表
      description: |
        status=2（PUBLISHED）；按 locale 解析（LookbookTranslation）。
        缓存：CDN s-maxage + JetCache 两级（key 含 locale）；失效：后台 Lookbook 写操作 → MQ → revalidatePath + purge。
      operationId: listStoreLookbooks
      tags: [store-content]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreLookbook'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/lookbooks/{id}:
    get:
      summary: Lookbook 详情（关联商品）
      description: 缓存：CDN s-maxage + JetCache 两级（key 含 id + locale）；失效：后台 Lookbook 写操作 → MQ → revalidatePath + purge。
      operationId: getStoreLookbook
      tags: [store-content]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreLookbook'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/content/guides:
    get:
      summary: 备婚指南列表（按阶段）
      description: |
        status=2（PUBLISHED），按 phase 排序；按 locale 解析（GuideTranslation）。
        缓存：CDN s-maxage + JetCache 两级（key 含 locale）；失效：后台 Guide 写操作 → MQ → revalidatePath + purge。
      operationId: listStoreGuides
      tags: [store-content]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreGuide'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ STORE PROMOTIONS ============
  /api/store/promotions/flash-sales:
    get:
      summary: 进行中的闪购活动
      description: |
        status=3（ACTIVE）活动及关联商品卡片；到期由 @Scheduled 自动转为 4（ENDED）（ALIGN-008）。按 locale 解析（FlashSaleTranslation）。
        缓存：CDN s-maxage（短）+ JetCache 两级（key 含 locale，TTL 60s 兜底倒计时新鲜度）；失效：后台闪购写/到期下线 → MQ → revalidatePath + purge。
      operationId: listStoreFlashSales
      tags: [store-promotions]
      security: []
      parameters:
        - $ref: '#/components/parameters/LocaleParam'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreFlashSale'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/store/promotions/coupons/validate:
    post:
      summary: 优惠券校验（结算页就地校验）
      description: |
        ALIGN-008。校验券码可用性与门槛并返回减免金额（USD 基准，trading 报价时按汇率换算）；
        不可用返回 200 + valid=false + reason_code（4227xx），不抛错。核销（used_count+1）发生在下单事务内（trading 域进程内直调）。不缓存。
      operationId: validateStoreCoupon
      tags: [store-promotions]
      security:
        - StoreBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, subtotal]
              properties:
                code:
                  type: string
                  maxLength: 32
                  pattern: '^[A-Z0-9]+$'
                subtotal:
                  type: number
                  minimum: 0
                  description: 当前购物车小计（USD 基准，门槛判定）
      responses:
        '200':
          description: 校验结果（含不可用场景）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponValidateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'  # 422704 格式校验
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ STORE NEWSLETTER（决策 26） ============
  /api/store/newsletter:
    post:
      summary: Newsletter 订阅
      description: |
        ALIGN-030。仅落表收集：email 唯一，重复订阅幂等返回成功（js_guard）；不发码不发邮件（弹窗文案为纯订阅确认）。
        记录 source（footer/modal/exit_intent）与 locale。限流靠 WAF（决策 11）。不缓存。
      operationId: subscribeNewsletter
      tags: [store-newsletter]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, source, locale]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                source:
                  type: string
                  enum: [footer, modal, exit_intent]
                locale:
                  type: string
                  enum: [en, es, fr]
      responses:
        '200':
          description: 已订阅（含重复订阅幂等返回）
          content:
            application/json:
              schema:
                type: object
                required: [subscribed]
                properties:
                  subscribed:
                    type: boolean
        '422':
          $ref: '#/components/responses/ValidationError'  # 422704 邮箱格式
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ STORE CONTACT（决策 30） ============
  /api/store/contact:
    post:
      summary: 联系表单提交
      description: ALIGN-034。落表 ContactMessage（管理端本期不做查看页，运营直查库）。限流靠 WAF（决策 11）。不缓存。
      operationId: submitContactMessage
      tags: [store-contact]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  format: email
                  maxLength: 255
                subject:
                  type: string
                  maxLength: 200
                message:
                  type: string
                  maxLength: 5000
      responses:
        '201':
          description: 已提交
          content:
            application/json:
              schema:
                type: object
                required: [submitted]
                properties:
                  submitted:
                    type: boolean
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============ ADMIN COUPONS ============
  /api/admin/promotions/coupons:
    get:
      summary: 优惠券列表
      operationId: listAdminCoupons
      tags: [admin-coupons]
      security:
        - AdminBearerAuth: [/promotions]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          description: CouponStatus IntEnum；省略表示全部，不接受字符串 all。
          schema:
            $ref: '#/components/schemas/CouponStatus'
        - name: search
          in: query
          description: 券码/名称模糊搜索
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                description: huihao.page.Paginated 形状（线上为 R<Paginated<Coupon>>）
                required: [data, total_elements, page_number, page_size, number_of_elements, total_pages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'
                  total_elements:
                    type: integer
                    description: 总记录数
                  page_number:
                    type: integer
                    description: 当前页码（从 1 开始）
                  page_size:
                    type: integer
                  number_of_elements:
                    type: integer
                    description: 本页实际条数
                  total_pages:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: 新增优惠券
      description: ALIGN-008（s-760）。code 唯一（409701）；end_at > start_at（422704）。写 OperationLog（action=创建优惠券）。
      operationId: createAdminCoupon
      tags: [admin-coupons]
      security:
        - AdminBearerAuth: [/promotions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponUpsert'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'        # 409701

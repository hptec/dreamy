                      $ref: '#/components/schemas/Guide'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: 新增指南
      description: ALIGN-012。写 OperationLog（action=创建指南）。
      operationId: createAdminGuide
      tags: [admin-guides]
      security:
        - AdminBearerAuth: [/content/lookbook]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuideUpsert'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/content/guides/{id}:
    put:
      summary: 编辑指南
      operationId: updateAdminGuide
      tags: [admin-guides]
      security:
        - AdminBearerAuth: [/content/lookbook]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuideUpsert'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: 删除指南
      operationId: deleteAdminGuide
      tags: [admin-guides]
      security:
        - AdminBearerAuth: [/content/lookbook]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: 删除成功
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/content/guides/{id}/status:
    patch:
      summary: 发布/下线指南
      description: PublishStatus 1（DRAFT）↔2（PUBLISHED）场景集。触发缓存失效链。
      operationId: patchAdminGuideStatus
      tags: [admin-guides]
      security:
        - AdminBearerAuth: [/content/lookbook]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/PublishStatus'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: 资源唯一标识（Long 自增主键）
      schema:
        type: integer
        format: int64
    PageParam:
      name: page
      in: query
      description: 页码（从 1 开始）
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: 每页数量
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    LocaleParam:
      name: locale
      in: query
      description: 内容语言（决策 13：EN 存主表，ES/FR 存 translation 附表，缺翻译回退 EN）；缓存 key 含此维度
      schema:
        type: string
        enum: [en, es, fr]
        default: en

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 数字业务错误码（高 3 位对应 HTTP 状态，第 4 位域段 marketing=7，见 info 码表）
          example: 422701
        message:
          type: string
          description: 当前语言默认文案（store EN/ES/FR；admin 中文）
        details:
          type: object
          additionalProperties: true

    ProductRef:
      type: object
      description: 内容关联商品卡片（catalog 域联表派生）
      required: [id, slug, name, price]
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
        name:
          type: string
        price:
          type: number
          description: USD 基准现价
        image_url:
          type: string

    # ---- 翻译附表（决策 13） ----
    CouponTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        name:
          type: string
        description:
          type: string
    FlashSaleTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        name:
          type: string
    BannerTranslation:
      type: object
      description: Banner 的 ES/FR 文案。CTA 链接为语言无关字段，取 Banner 主表 cta_link/cta_link_secondary。
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        title:
          type: string
          maxLength: 255
          nullable: true
        subtitle:
          type: string
          maxLength: 255
          nullable: true
        cta_text:
          type: string
          maxLength: 64
          nullable: true
        cta_text_secondary:
          type: string
          maxLength: 64
          nullable: true
          description: 第二 CTA 文案，缺失时回退 Banner.cta_text_secondary。
    BlogPostTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        title:
          type: string
        excerpt:
          type: string
        body:
          type: string
        seo_title:
          type: string
        seo_description:
          type: string
    LookbookTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        title:
          type: string
        description:
          type: string
    GuideTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        title:
          type: string
        body:
          type: string
    RealWeddingTranslation:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [es, fr]
        title:
          type: string
        story:
          type: string

    # ---- 营销共享 IntEnum ----
    BannerPosition:
      type: integer
      format: int32
      enum: [1, 2, 3]
      description: 1=HERO（首屏大图），2=FEATURED（精选位），3=TOPBAR（顶栏）。
      example: 1
    ContentStatus:
      type: integer
      format: int32
      enum: [1, 2, 3]
      description: Banner/Blog 共用。1=DRAFT（草稿），2=PUBLISHED（已发布），3=ARCHIVED（已归档）。
      example: 2
    CouponStatus:
      type: integer
      format: int32
      enum: [1, 2, 3, 4, 5]
      description: 1=DRAFT，2=SCHEDULED，3=ACTIVE，4=EXPIRING，5=EXPIRED。
      example: 3
    FlashSaleStatus:
      type: integer
      format: int32
      enum: [1, 2, 3, 4]
      description: 1=DRAFT，2=SCHEDULED，3=ACTIVE，4=ENDED。
      example: 3
    PublishStatus:
      type: integer
      format: int32
      enum: [1, 2]
      description: Wedding/Lookbook/Guide 共用。1=DRAFT，2=PUBLISHED。
      example: 2

    # ---- 消费端内容 ----
    StoreBanner:
      type: object
      required: [id, name, image_url, position, sort]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        image_url:
          type: string
        position:
          $ref: '#/components/schemas/BannerPosition'
        sort:
          type: integer
        title:
          type: string
          description: 文案（BannerTranslation，已按 locale 解析）
          nullable: true
        subtitle:
          type: string
          nullable: true
        cta_text:
          type: string
          nullable: true
        cta_link:
          type: string
          maxLength: 512
          nullable: true
          description: 第一 CTA 链接（语言无关）。
        cta_text_secondary:
          type: string
          nullable: true
          description: 已按 locale 解析的第二 CTA 文案。
        cta_link_secondary:
          type: string
          maxLength: 512
          nullable: true
          description: 第二 CTA 链接（语言无关）。
    StoreBlogPostCard:
      type: object
      required: [id, title, slug]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          description: 已按 locale 解析
        slug:
          type: string
        cover:
          type: string
        category:
          type: string
        author:
          type: string
        excerpt:
          type: string
          description: 摘要（BlogPostTranslation.excerpt；EN 取 content 截断派生）
        published_at:
          type: string
          format: date-time
        views:
          type: integer
    StoreBlogPostDetail:
      allOf:
        - $ref: '#/components/schemas/StoreBlogPostCard'
        - type: object
          required: [content]
          properties:
            content:
              type: string
              description: 正文（locale=es/fr 时取 translation.body，缺翻译回退 EN content）
            seo_title:
              type: string
            seo_description:
              type: string
    StoreRealWedding:
      type: object
      required: [id, couple, status]
      properties:
        id:
          type: integer
          format: int64
        couple:
          type: string
        location:
          type: string
        theme:
          type: string
        wedding_date:
          type: string
          maxLength: 16
          description: 如 "2025-06"
        cover:
          type: string
        status:
          allOf:
            - $ref: '#/components/schemas/PublishStatus'
            - type: integer
              enum: [2]
          description: 消费端只返回已发布案例，恒为 2（PUBLISHED）。
        title:
          type: string
          description: RealWeddingTranslation，已按 locale 解析
        story:
          type: string
        products:
          type: array
          description: Shop the Look 关联商品（详情返回）
          items:
            $ref: '#/components/schemas/ProductRef'
    StoreLookbook:
      type: object
      required: [id, title]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          description: 已按 locale 解析
        theme:
          type: string
        description:
          type: string
        products:
          type: array
          description: 关联商品（详情返回）
          items:
            $ref: '#/components/schemas/ProductRef'
    StoreGuide:
      type: object
      required: [id, phase, title]
      properties:
        id:
          type: integer
          format: int64
        phase:
          type: string
        timeframe:
          type: string
        title:
          type: string
          description: 已按 locale 解析
        body:
          type: string
        tasks_count:
          type: integer
    StoreFlashSale:
      type: object
      required: [id, name, discount, start_at, end_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 已按 locale 解析
        discount:
          type: string
          maxLength: 32
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
          description: 前端倒计时依据；到期后端自动下线
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductRef'

    # ---- 券校验 ----
    CouponValidateResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        reason_code:
          type: integer
          description: valid=false 时的原因码（422701/422702/422703）
        discount_amount:
          type: number
          minimum: 0
          description: USD 基准减免金额（type=free_shipping 时为 0 且 free_shipping=true）
        free_shipping:
          type: boolean
        coupon:
          type: object
          properties:
            code:
              type: string
            name:
              type: string
              description: 已按 locale 解析
            type:
              type: string
              enum: [discount, fixed_amount, free_shipping]
            value:
              type: string
            min_amount:
              type: number

    # ---- 后台促销 ----
    CouponUpsert:
      type: object
      required: [code, name, type, value, status]
      properties:
        code:
          type: string
          maxLength: 32
          pattern: '^[A-Z0-9]+$'
        name:
          type: string
          maxLength: 64
        type:
          type: string
          enum: [discount, fixed_amount, free_shipping]
        value:
          type: string
          maxLength: 32
          description: 如 "15% OFF" / "$50 OFF"
        min_amount:
          type: number
          minimum: 0
        total_limit:
          type: integer
          minimum: 0
          description: 限量发放（>9999 视为不限）
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
          description: js_guard：end_at > start_at（422704）
        status:
          $ref: '#/components/schemas/CouponStatus'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/CouponTranslation'
    Coupon:
      allOf:
        - $ref: '#/components/schemas/CouponUpsert'
        - type: object
          required: [id, used_count]
          properties:
            id:
              type: integer
              format: int64
            used_count:
              type: integer
              minimum: 0
              description: 只读核销计数；js_guard used_count <= total_limit
    FlashSaleUpsert:
      type: object
      required: [name, discount, start_at, end_at, status]
      properties:
        name:
          type: string
          maxLength: 64
        discount:
          type: string
          maxLength: 32
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
          description: js_guard：end_at > start_at；到期定时任务自动下线
        status:
          $ref: '#/components/schemas/FlashSaleStatus'
        product_ids:
          type: array
          description: 参与商品（nm 关系）
          items:
            type: integer
            format: int64
        translations:
          type: array
          items:
            $ref: '#/components/schemas/FlashSaleTranslation'
    FlashSale:
      allOf:
        - $ref: '#/components/schemas/FlashSaleUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64

    # ---- 后台 Banner / 内容 ----
    BannerUpsert:
      type: object
      required: [name, image_url, position, status, sort]
      properties:
        name:
          type: string
        image_url:
          type: string
        position:
          $ref: '#/components/schemas/BannerPosition'
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          description: js_guard：end_time > start_time（422704）
        status:
          $ref: '#/components/schemas/ContentStatus'
        sort:
          type: integer
          minimum: 0
        title:
          type: string
          maxLength: 255
          nullable: true
          description: EN 基准标题。
        subtitle:
          type: string
          maxLength: 255
          nullable: true
          description: EN 基准副题。
        cta_text:
          type: string
          maxLength: 64
          nullable: true
          description: EN 第一 CTA 文案。
        cta_link:
          type: string
          maxLength: 512
          nullable: true
          description: 第一 CTA 链接（语言无关）。
        cta_text_secondary:
          type: string
          maxLength: 64
          nullable: true
          description: EN 第二 CTA 文案。
        cta_link_secondary:
          type: string
          maxLength: 512
          nullable: true
          description: 第二 CTA 链接（语言无关）。
        translations:
          type: array
          items:
            $ref: '#/components/schemas/BannerTranslation'
    Banner:
      allOf:
        - $ref: '#/components/schemas/BannerUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            clicks:
              type: integer
              minimum: 0
              description: 点击统计只读
    BlogPostUpsert:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
        cover:
          type: string
        category:
          type: string
          description: 文章栏目
        author:
          type: string
        content:
          type: string
        slug:
          type: string
          maxLength: 128
          description: 发布后静态文章页路径；唯一（409702）
        status:
          $ref: '#/components/schemas/ContentStatus'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/BlogPostTranslation'
    BlogPost:
      allOf:
        - $ref: '#/components/schemas/BlogPostUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            published_at:
              type: string
              format: date-time
            views:
              type: integer
              minimum: 0
              description: 阅读数只读
    RealWeddingUpsert:
      type: object
      required: [couple, status]
      properties:
        couple:
          type: string
          maxLength: 64
        location:
          type: string
          maxLength: 128
        theme:
          type: string
          maxLength: 32
        wedding_date:
          type: string
          maxLength: 16
        cover:
          type: string
          maxLength: 512
        status:
          $ref: '#/components/schemas/PublishStatus'
        product_ids:
          type: array
          items:
            type: integer
            format: int64
        translations:
          type: array
          items:
            $ref: '#/components/schemas/RealWeddingTranslation'
    RealWedding:
      allOf:
        - $ref: '#/components/schemas/RealWeddingUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
    LookbookUpsert:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
          maxLength: 128
        theme:
          type: string
          maxLength: 32
        status:
          $ref: '#/components/schemas/PublishStatus'
        product_ids:
          type: array
          items:
            type: integer
            format: int64
        translations:
          type: array
          items:
            $ref: '#/components/schemas/LookbookTranslation'
    Lookbook:
      allOf:
        - $ref: '#/components/schemas/LookbookUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
    GuideUpsert:
      type: object
      required: [phase, title, status]
      properties:
        phase:
          type: string
          maxLength: 32
        timeframe:
          type: string
          maxLength: 64
        title:
          type: string
          maxLength: 128
        tasks_count:
          type: integer
          minimum: 0
        status:
          $ref: '#/components/schemas/PublishStatus'
        translations:
          type: array
          items:
            $ref: '#/components/schemas/GuideTranslation'
    Guide:
      allOf:
        - $ref: '#/components/schemas/GuideUpsert'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64

  responses:
    ValidationError:
      description: 参数/业务校验失败（422701~422704）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 token 无效（40100 系列沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 无权限（RBAC 菜单权限 key 校验失败，40300）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: 资源不存在（404701~404703）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 冲突（409701~409703）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误（50000 沿用 identity）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    StoreBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        消费端 store JWT（与 identity-api 同基建）。marketing 域仅券校验端点需要登录态（结算前提）。
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        后台 admin JWT（与 identity-api 同基建）。security 列表中的字符串数组表示所需菜单权限 key
        （本域新增权限点：/promotions、/banners、/content/blog、/content/weddings、/content/lookbook，BE-DIM-6），由 RBAC 守卫校验。


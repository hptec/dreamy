entities:
- id: Category
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: name
    t: str
    req: true
    source: prototype/portal-admin/src/views/Categories.vue > 品类名称 * / newRootName
      / confirmAddChild
    maxlen: 64
  - n: parent_id
    t: Long
    source: prototype/portal-admin/src/views/Categories.vue > cat.children 子类目树
  - n: level
    t: int
    min: 1
    max: 3
    source: '需求描述: 分类为三层树模型 [INFERRED]'
  - n: attribute_set_id
    t: Long
    source: prototype/portal-admin/src/views/Categories.vue > cat.attributeSetId /
      attrSetInfo
  - n: attr_overrides
    t: json
    source: prototype/portal-admin/src/views/Categories.vue > child.attrOverrides
      仅存与父级属性集不同的 delta (saveDrawer)
  - n: sort
    t: int
    source: prototype/portal-admin/src/views/Categories.vue > Bars3Icon 拖拽手柄 [INFERRED]
  - n: product_count
    t: int
    min: 0
    js_guard: product_count === 0 时才允许删除 (canDelete)
    source: prototype/portal-admin/src/views/Categories.vue > cat.count / canDelete(cat)
      + ProductEdit.vue > standardTaxonomy root.children 两级级联（经 parent_id 派生）
  relations:
  - to: Category
    type: n1
  - to: AttributeSet
    type: n1
  desc: 商品标准品类，三层树模型（根品类绑定属性集，子品类按 delta 覆盖父级属性配置），每个商品只属于一个品类
- id: AttributeDef
  desc: 商品属性字典项，维护全局属性定义与可选值列表（廓形/领口/袖型/面料等）
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: key
    t: str
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > attr.key (attributeDict)
  - n: label
    t: str
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > attr.label
  - n: type
    t: enum
    vals:
    - select
    - multiselect
    - text
    - toggle
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > attr.type 徽章分支 select/multiselect
      + 过滤条件 type!=='text'&&type!=='toggle'
  - n: options
    t: json
    js_guard: type === 'select' || type === 'multiselect' 时才有选项 (attr.optionsKey)
    source: prototype/portal-admin/src/views/AttributeSets.vue > attr.options 增删改
      (confirmAddOption/removeOption/confirmEdit)
  relations: []
- id: AttributeSet
  desc: 属性集，多个品类可共享同一属性集；定义该集合内各属性的可见性配置
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: label
    t: str
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > set.label (attrSetColumns)
  relations: []
- id: AttributeSetItem
  desc: 属性集明细行，记录属性集内单个属性的可见性状态（必填/可选/隐藏）
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: attribute_set_id
    t: Long
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > matrix[setId]
  - n: attribute_id
    t: Long
    req: true
    source: prototype/portal-admin/src/views/AttributeSets.vue > matrix[setId][attrKey]
  - n: visibility
    t: enum
    vals:
    - visible
    - optional
    - hidden
    req: true
    source: field-inventory > FLD-ATTRIBUTESETS-001/002/003 + prototype/portal-admin/src/views/AttributeSets.vue
      > STATES/cycleState 必填→可选→隐藏
  relations:
  - to: AttributeSet
    type: n1
  - to: AttributeDef
    type: n1
- id: TagDimension
  desc: 自定义标签维度（如风格/用途），仅用于前台营销聚合与导航，不影响商品属性表单
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: name
    t: str
    req: true
    source: prototype/portal-admin/src/views/Categories.vue > 维度名称 * / confirmAddDim
  - n: description
    t: str
    source: prototype/portal-admin/src/views/Categories.vue > tagDimensions d.desc
  relations: []
- id: Tag
  desc: 自定义营销标签，归属某标签维度，商品可多选；带封面图用于前台导航卡片
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: dimension_id
    t: Long
    req: true
    source: prototype/portal-admin/src/views/Categories.vue > t.dimensionId / tagsByActiveDim
  - n: name
    t: str
    req: true
    source: prototype/portal-admin/src/views/Categories.vue > 标签名称 * / confirmAddTag
      :disabled=!newTagName.trim()
  - n: cover
    t: str
    source: prototype/portal-admin/src/views/Categories.vue > t.cover 封面上传 handleCoverUpload，可为空则纯文字展示
  - n: status
    t: enum
    vals:
    - enabled
    - disabled
    req: true
    source: prototype/portal-admin/src/views/Categories.vue > Toggle v-model=t.enabled，UI
      开关映射后端枚举 [INFERRED]
  - n: product_count
    t: int
    min: 0
    source: prototype/portal-admin/src/views/Categories.vue > t.count 件数
  relations:
  - to: TagDimension
    type: n1
  - to: Product
    type: nm
- id: Banner
  desc: 站点广告位图文配置（首页 Hero/推荐位/顶部条），支持排序、定时投放与上下线
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: name
    t: str
    req: true
    source: prototype/portal-admin/src/views/Banners.vue > b.name
  - n: image_url
    t: str
    req: true
    source: prototype/portal-admin/src/views/Banners.vue > b.img
  - n: position
    t: enum
    vals:
    - hero
    - featured
    - topbar
    req: true
    source: prototype/portal-admin/src/views/Banners.vue > b.position + 页面副标题 首页Hero/推荐位/顶部条
      [INFERRED]
  - n: start_time
    t: datetime
    source: prototype/portal-admin/src/views/Banners.vue > 投放时间 b.start
  - n: end_time

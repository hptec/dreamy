  - n: sort
    t: int
    req: true
    source: prototype/portal-admin/src/views/Banners.vue > 排序列 input :value=b.sort
  - n: clicks
    t: int
    min: 0
    source: prototype/portal-admin/src/views/Banners.vue > b.clicks 点击统计只读
  relations: []
- id: BlogPost
  desc: Blog 婚礼策划文章，发布后生成静态文章页
  fields:
  - n: id
    t: Long
    pk: true
    source: project_tech_stack.backend=java spring-boot+mybatis-plus [INFERRED]
  - n: title
    t: str
    req: true
    source: prototype/portal-admin/src/views/ContentBlog.vue > p.title
  - n: cover
    t: str
    source: prototype/portal-admin/src/views/ContentBlog.vue > p.cover
  - n: category
    t: str
    source: prototype/portal-admin/src/views/ContentBlog.vue > p.category 文章栏目
  - n: author
    t: str
    source: prototype/portal-admin/src/views/ContentBlog.vue > p.author
  - n: content
    t: text
    source: prototype/portal-admin/src/views/ContentBlog.vue > 写文章/编辑入口 [INFERRED]
  - n: slug
    t: str
    source: prototype/portal-admin/src/views/ContentBlog.vue > 发布后生成静态文章页 [INFERRED]
  - n: status
    t: enum
    vals:
    - draft
    - published

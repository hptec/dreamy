- id: AnalyticsDashboard
  desc: 数据看板聚合只读视图（不落库不可写），交易指标由 Order/Refund/Product 聚合派生，流量指标由 GA4 Data API 拉取（决策19）
  fields:
  - n: gmv_month
    t: decimal
    source: prototype/portal-admin/src/views/Analytics.vue > 本月 GMV，聚合自 Order [INFERRED]
  - n: order_count
    t: int
    min: 0
    source: prototype/portal-admin/src/views/Analytics.vue > 订单数，聚合自 Order [INFERRED]
  - n: avg_order_value
    t: decimal
    source: prototype/portal-admin/src/views/Analytics.vue > 客单价，聚合自 Order [INFERRED]
  - n: refund_rate
    t: decimal
    min: 0
    max: 100
    source: prototype/portal-admin/src/views/Analytics.vue > 退款率，聚合自 Refund/Order
      [INFERRED]
  - n: gmv_trend
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > gmvTrend/gmvLabels SparkArea
  - n: category_sales
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > categorySales 品类销售占比，聚合自
      Category/Order [INFERRED]
  - n: traffic_sources
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > trafficSources 访客来源；数据源
      GA4 Data API + JetCache 5min（决策19）
  - n: device_share
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > 设备占比 移动端/桌面端/平板；数据源 GA4
      Data API（决策19）
  - n: funnel
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > funnel 转化漏斗 stage/value；数据源
      GA4 标准电商事件经 Data API 拉取（决策19）
  - n: top_products
    t: json
    source: prototype/portal-admin/src/views/Analytics.vue > topProducts 按 sales 排序取前6，聚合自
      Product [INFERRED]
  relations: []
- id: Product
  desc: 商品主档（现货+定制双模式婚纱礼服，含版型属性与SEO）
  fields:
  - n: id
    t: Long
    pk: true
    source: MEMORY project_dreamy_backend_refactor > MyBatis-Plus Long 自增主键
  - n: name
    t: str
    req: true
    maxlen: 128
    source: ProductEdit.vue > form.name 商品名称*
  - n: slug
    t: str
    req: true
    maxlen: 128
    pattern: ^[a-z0-9-]+$
    source: ProductEdit.vue > form.slug URL Slug
  - n: subtitle
    t: str
    maxlen: 255
    source: ProductEdit.vue > form.subtitle 副标题/卖点
  - n: categoryId
    t: Long
    req: true
    source: ProductEdit.vue > form.categoryId 标准品类级联*
  - n: productType
    t: str
    maxlen: 64
    source: ProductEdit.vue > form.productType 自由填写
  - n: description
    t: text
    source: ProductEdit.vue > form.description 富文本介绍
  - n: designerNote
    t: text
    source: ProductEdit.vue > form.designerNote 品牌故事
  - n: price
    t: number
    req: true
    min: 0
    source: ProductEdit.vue > form.price 现价USD*
  - n: compareAt
    t: number
    min: 0
    js_guard: compareAt == null || compareAt >= price
    source: ProductEdit.vue > form.compareAt 划线价
  - n: installment
    t: bool
    source: ProductEdit.vue > form.installment Klarna/Afterpay 分期
  - n: multiCurrencyPrices
    t: json
    source: ProductEdit.vue > 多币种价格 USD/CAD/AUD/GBP 可覆盖
  - n: status
    t: enum
    vals:
    - draft
    - published
    req: true
    source: mock.js > products.status; Products.vue > Toggle published/draft
  - n: isNew
    t: bool
    source: mock.js > products.isNew; Products.vue > Toggle
  - n: isBest
    t: bool
    source: mock.js > products.isBest
  - n: recommend
    t: bool

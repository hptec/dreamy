  - n: sort
    t: int
    min: 0
    source: mock.js > products.sort
  - n: leadTimeDays
    t: int
    min: 1
    req: true
    source: ProductEdit.vue > form.leadTimeDays 标准发货周期(天)
  - n: rushAvailable
    t: bool
    source: ProductEdit.vue > form.rushAvailable 支持加急
  - n: customSizeAvailable
    t: bool
    source: ProductEdit.vue > form.customSizeAvailable 定制尺寸(伴娘服核心)
  - n: silhouette
    t: str
    source: ProductEdit.vue > form.silhouette 廓形(属性集控制显隐/必填)
  - n: neckline
    t: str
    source: ProductEdit.vue > form.neckline 领口
  - n: sleeve
    t: str
    source: ProductEdit.vue > form.sleeve 袖型
  - n: backStyle
    t: str
    source: ProductEdit.vue > form.backStyle 背部设计
  - n: waistline
    t: str
    source: ProductEdit.vue > form.waistline 腰线
  - n: train
    t: str
    source: ProductEdit.vue > form.train 拖尾(父品类切换时重置)
  - n: length
    t: str
    source: ProductEdit.vue > form.length 裙长
  - n: fabric
    t: str
    source: ProductEdit.vue > form.fabric 主面料
  - n: fabricComposition
    t: str
    maxlen: 128
    source: ProductEdit.vue > form.fabricComposition 面料成分
  - n: support
    t: str
    source: ProductEdit.vue > form.support 内置支撑
  - n: season
    t: str
    source: ProductEdit.vue > form.season 季节
  - n: embellishments
    t: json
    source: ProductEdit.vue > form.embellishments 装饰细节多选
  - n: occasions
    t: json
    source: ProductEdit.vue > form.occasions 适合场合多选
  - n: styleTags
    t: json
    source: ProductEdit.vue > form.styleTags 风格标签多选
  - n: modelHeight
    t: str
    maxlen: 32
    source: ProductEdit.vue > form.modelHeight 模特身高
  - n: modelSize
    t: str
    maxlen: 16
    source: ProductEdit.vue > form.modelSize 模特所穿尺码
  - n: modelBodyType
    t: str
    maxlen: 32
    source: ProductEdit.vue > form.modelBodyType 体型描述
  - n: careInstructions

machines:
- id: banner_lifecycle
  entity: Banner
  states:
  - draft
  - published
  - archived
  - deleted
  initial: draft
  source: prototype/portal-admin/src/views/Banners.vue > 保存并发布/Toggle b.online/TrashIcon
    + 投放时间 start/end
  transitions:
  - from: draft
    event: publish
    to: published
    guard: name != null && image_url != null
  - from: published
    event: take_offline
    to: archived
  - from: published
    event: schedule_expire
    to: archived
    guard: now > end_time
  - from: archived
    event: republish
    to: published
  - from: draft
    event: delete
    to: deleted
  - from: published
    event: delete
    to: deleted
  - from: archived
    event: delete
    to: deleted
- id: blog_post_lifecycle
  entity: BlogPost
  states:
  - draft
  - published
  - archived
  - deleted
  initial: draft
  source: prototype/portal-admin/src/views/ContentBlog.vue > 发布按钮 v-if p.status==='draft'
    / filter tabs / TrashIcon
  transitions:
  - from: draft
    event: publish
    to: published
    guard: title != null
  - from: published
    event: unpublish
    to: archived
  - from: archived
    event: republish
    to: published
  - from: draft
    event: delete
    to: deleted
  - from: published
    event: delete
    to: deleted
  - from: archived
    event: delete
    to: deleted
- id: category_lifecycle
  entity: Category
  states:
  - active
  - deleted
  initial: active
  source: prototype/portal-admin/src/views/Categories.vue > confirmAddRoot/confirmAddChild/canDelete/TrashIcon
    :disabled=!canDelete(cat)
  transitions:
  - from: active
    event: delete
    to: deleted
    guard: product_count === 0
- id: tag_lifecycle
  entity: Tag
  states:
  - enabled
  - disabled
  - deleted
  initial: enabled
  source: prototype/portal-admin/src/views/Categories.vue > confirmAddTag enabled:true
    / Toggle v-model=t.enabled / removeTag
  transitions:
  - from: enabled
    event: toggle_off
    to: disabled
  - from: disabled
    event: toggle_on
    to: enabled
  - from: enabled
    event: delete
    to: deleted
  - from: disabled
    event: delete
    to: deleted
- id: tag_dimension_lifecycle
  entity: TagDimension
  states:
  - active
  - deleted
  initial: active
  source: prototype/portal-admin/src/views/Categories.vue > confirmAddDim / removeDim
    级联删除维度下标签
  transitions:
  - from: active
    event: delete
    to: deleted
- id: attribute_visibility_cycle
  entity: AttributeSetItem
  states:
  - visible
  - optional
  - hidden
  initial: hidden
  source: prototype/portal-admin/src/views/AttributeSets.vue > cycleState STATES=['visible','optional','hidden']
    点击循环切换
  transitions:
  - from: hidden
    event: cycle_click
    to: visible
  - from: visible
    event: cycle_click
    to: optional
  - from: optional
    event: cycle_click
    to: hidden
- id: order_lifecycle
  entity: Order
  states:
  - pending
  - paid
  - shipped
  - completed
  - cancelled
  - refunding
  - refunded
  initial: pending
  transitions:
  - from: pending
    event: payment_webhook_succeeded
    to: paid
    source: 业务上下文确认 Stripe PaymentIntent+webhook [INFERRED]
  - from: pending
    event: payment_timeout_30min
    to: cancelled
    guard: now > expiresAt; 自动取消并回补现货库存
    source: 业务上下文确认30分钟超时 [INFERRED]
  - from: pending
    event: customer_cancel
    to: cancelled
    guard: 取消时回补现货库存
    source: 业务上下文确认支持取消分支 [INFERRED]
  - from: paid
    event: mark_shipped
    to: shipped
    guard: carrier 与 trackingNo 已填写
    source: OrderDetail.vue > 标记发货/填写物流信息/确认发货 (OP-009)
  - from: shipped
    event: confirm_receipt
    to: completed
    source: Orders.vue > tabs 已完成; OrderDetail.vue > 状态时间线
  - from: paid
    event: refund_requested
    to: refunding
    source: OrderDetail.vue > 发起退款按钮; Orders.vue > tabs 退款中
    guard: 决策24：含定制行（OrderLine.customSizeData 非空）且 now > paidAt+24h（已投产）时拒绝申请；现货行不受限
  - from: shipped
    event: refund_requested
    to: refunding
    source: OrderDetail.vue > 发起退款按钮
    guard: 决策24：含定制行（OrderLine.customSizeData 非空）且 now > paidAt+24h（已投产）时拒绝申请；现货行不受限
  - from: refunding
    event: refund_approved
    to: refunded
    source: field-inventory FLD-REFUNDS-008 approved; 业务上下文确认退款分支 [INFERRED]
  - from: refunding
    event: refund_rejected
    to: paid
    guard: 回退到退款前状态(paid/shipped)
    source: field-inventory FLD-REFUNDS-009 rejected [INFERRED]
- id: payment_lifecycle
  entity: Payment
  states:
  - created
  - processing
  - succeeded
  - failed
  - refunded
  initial: created
  transitions:
  - from: created
    event: stripe_confirm
    to: processing
    source: 业务上下文确认 Stripe PaymentIntent 沙箱 [INFERRED]
  - from: processing
    event: webhook_payment_succeeded
    to: succeeded
    source: 业务上下文确认 webhook [INFERRED]
  - from: processing
    event: webhook_payment_failed
    to: failed
    source: 业务上下文确认 webhook [INFERRED]
  - from: failed
    event: retry_payment
    to: processing
    guard: 订单仍处 pending 且未超时
    source: 业务上下文确认 [INFERRED]
  - from: succeeded
    event: refund_executed
    to: refunded
    guard: 关联 Refund 已 approved
    source: field-inventory FLD-REFUNDS-008 approved [INFERRED]
- id: product_lifecycle
  entity: Product
  states:
  - draft
  - published
  - deleted
  initial: draft
  transitions:
  - from: draft
    event: publish
    to: published
    source: Products.vue > Toggle p.status published; ProductEdit.vue > 保存并生成静态页 (OP-011)
  - from: published
    event: unpublish
    to: draft
    source: Products.vue > Toggle p.status = draft
  - from: draft
    event: delete
    to: deleted
    source: Products.vue > 商品列表删除操作 [INFERRED]
  - from: published
    event: delete
    to: deleted
    guard: 建议先下架再删除
    source: Products.vue > 商品列表删除操作 [INFERRED]
- id: refund_lifecycle
  entity: Refund
  states:
  - pending
  - approved
  - rejected
  - refunded
  initial: pending
  transitions:
  - from: pending
    event: admin_approve
    to: approved
    guard: 触发 Payment refund_executed
    source: field-inventory FLD-REFUNDS-008 approved
  - from: pending
    event: admin_reject
    to: rejected
    source: field-inventory FLD-REFUNDS-009 rejected
  - from: pending
    event: approve
    to: approved
    guard: 原子回补现货库存且订单状态变更成功
    source: OP-013 关联页 Refunds.vue 同意按钮 + 业务上下文
  - from: pending
    event: reject
    to: rejected
    source: Refunds.vue 拒绝按钮 r.status === 'pending'
  - from: approved
    event: stripe_refund_succeeded
    to: refunded
    guard: Stripe 沙箱退款回执成功
    source: 业务上下文 退款完成 [INFERRED]
- id: coupon_lifecycle
  entity: Coupon
  states:
  - draft
  - scheduled
  - active
  - expiring
  - expired
  - deleted
  initial: draft
  transitions:
  - from: draft
    event: schedule
    to: scheduled
    guard: startAt > now
    source: Promotions.vue > label scheduled 已排期
  - from: draft
    event: activate
    to: active
    guard: startAt <= now < endAt
    source: Promotions.vue > label active 进行中
  - from: scheduled
    event: auto_start
    to: active
    guard: now >= startAt
    source: mock.js > coupons.start [INFERRED]
  - from: active
    event: near_expiry
    to: expiring
    guard: endAt - now <= 阈值
    source: Promotions.vue > label expiring 即将到期
  - from: expiring
    event: auto_expire
    to: expired
    guard: now > endAt
    source: mock.js > coupons.end [INFERRED]
  - from: active
    event: auto_expire
    to: expired
    guard: now > endAt
    source: mock.js > coupons.end [INFERRED]
  - from: draft
    event: delete
    to: deleted
    source: Promotions.vue > 优惠券卡片 TrashIcon 删除按钮
  - from: expired
    event: delete
    to: deleted
    source: Promotions.vue > 优惠券卡片 TrashIcon 删除按钮
- id: flash_sale_lifecycle
  entity: FlashSale
  states:
  - draft
  - scheduled
  - active
  - ended
  initial: draft
  transitions:
  - from: draft
    event: schedule
    to: scheduled
    guard: startAt > now
    source: Promotions.vue > flashSales status scheduled
  - from: scheduled
    event: auto_start
    to: active
    guard: now >= startAt
    source: mock.js > flashSales.start [INFERRED]
  - from: active
    event: auto_offline
    to: ended
    guard: now > endAt; 定时任务自动下线
    source: 业务上下文确认闪购到期自动下线 [INFERRED]
- id: lookbook_publish
  entity: Lookbook
  states:
  - draft
  - published
  initial: draft
  transitions:
  - from: draft
    event: publish
    to: published
    source: ContentLookbook.vue > StatusBadge published/draft
  - from: published
    event: unpublish
    to: draft
    source: ContentLookbook.vue > StatusBadge published/draft [INFERRED]
- id: guide_publish
  entity: Guide
  states:
  - draft
  - published
  initial: draft
  transitions:
  - from: draft
    event: publish
    to: published
    source: ContentLookbook.vue > guides StatusBadge published/draft
  - from: published
    event: unpublish
    to: draft
    source: ContentLookbook.vue > guides StatusBadge [INFERRED]
- id: real_wedding_publish
  entity: RealWedding
  states:
  - draft
  - published
  initial: draft
  transitions:
  - from: draft
    event: publish
    to: published
    source: ContentWeddings.vue > StatusBadge published/draft
  - from: published
    event: unpublish
    to: draft
    source: ContentWeddings.vue > StatusBadge [INFERRED]
- id: review_moderation
  entity: Review
  states:
  - pending
  - approved
  - rejected
  initial: pending
  transitions:
  - from: pending
    event: approve
    to: approved
    source: Reviews.vue approveReview
  - from: pending
    event: reject
    to: rejected
    guard: featured 强制置 false
    source: Reviews.vue rejectReview
  - from: rejected
    event: batch_approve
    to: approved
    source: Reviews.vue batchSet('approved') 不限当前状态
  - from: approved
    event: batch_reject
    to: rejected
    guard: featured 强制置 false
    source: Reviews.vue batchSet('rejected')
  - from: approved
    event: set_featured
    to: approved
    guard: featured=true 仅 approved 可设
    source: Reviews.vue setFeatured(r,true)
  - from: approved
    event: unset_featured
    to: approved
    guard: featured=false
    source: Reviews.vue setFeatured(r,false)
- id: review_image_visibility
  entity: ReviewImage
  states:
  - shown
  - rejected
  initial: shown
  transitions:
  - from: shown
    event: reject_image
    to: rejected
    source: Reviews.vue rejectImage
  - from: rejected
    event: restore_image
    to: shown
    source: Reviews.vue restoreImage
- id: question_answer_flow
  entity: ProductQuestion
  states:
  - unanswered
  - answered
  initial: unanswered
  transitions:
  - from: unanswered
    event: save_answer
    to: answered
    guard: answerDraft.trim() 非空
    source: Reviews.vue saveAnswer
  - from: answered
    event: edit_answer
    to: answered
    guard: answerDraft.trim() 非空
    source: Reviews.vue saveAnswer answerEditing
- id: carrier_status
  entity: Carrier
  states:
  - enabled
  - disabled
  initial: enabled
  transitions:
  - from: enabled
    event: disable
    to: disabled
    source: Shipping.vue Toggle v-model c.enabled
  - from: disabled
    event: enable
    to: enabled
    source: Shipping.vue Toggle v-model c.enabled
- entity: MailRecord
  id: mail_delivery
  initial: pending
  source: decision.md 决策16 交易性邮件（2026-06-10 细化轮）
  states:
  - pending
  - sent
  - failed
  - dead
  transitions:
  - event: send_success
    from: pending
    to: sent
  - event: send_error
    from: pending
    to: failed
  - event: retry
    from: failed
    to: pending
    guard: retryCount < 3
  - event: exhaust_retry
    from: failed
    to: dead
    guard: retryCount >= 3
- entity: ShowroomMember
  id: showroom_member_assignment
  initial: unassigned
  source: decision.md 决策20 + prototype/app/showroom/page.tsx 指派状态（F-070/F-071）
  states:
  - unassigned
  - assigned
  - reminded
  - ordered
  transitions:
  - event: assign
    from: unassigned
    to: assigned
    guard: 仅 Showroom owner 可指派；assignedItemId 必须属于本 showroom
  - event: reassign
    from: assigned
    to: assigned
    guard: 仅 owner；未下单前可改派
  - event: reassign
    from: reminded
    to: assigned
    guard: 仅 owner；改派后提醒状态重置
  - event: send_reminder
    from: assigned
    to: reminded
    guard: member.email 非空；经 MQ 投递 MailRecord（决策20.5 复用决策16 基建）
  - event: place_order
    from: assigned
    to: ordered
    guard: 访客下单需登录（linkedCustomerId 回填）；订单行含被指派款式
  - event: place_order
    from: reminded
    to: ordered
    guard: 同上

flows:
- id: checkout_order
  name: 消费端购物下单与支付
  trigger: 消费者浏览商品加购并结算支付
  actors:
  - consumer
  - system
  - stripe
  cross_domain: true
  external_systems:
  - Stripe
  - CDN
  - ObjectStorage-CDN
  source: pd-explore.local.md > BE-DIM-4 事务/幂等 + BE-DIM-5 外部集成
  nodes:
  - id: n1
    type: start
    label: 消费者进入商城
    source: state-machine.yml > order_lifecycle initial pending
  - id: n2
    type: action
    actor: consumer
    label: 浏览商品列表/详情（CDN/ISR+JetCache 两级缓存读，开启穿透保护）
    entity: Product
    meta:
      cache: cdn_isr+jetcache
      penetration_protect: true
    source: pd-explore.local.md > BE-DIM-8 三层缓存
  - id: n3
    type: decision
    label: 是否已登录
    source: er-diagram.yml > CartItem.anonToken js_guard
  - id: n4
    type: action
    actor: consumer
    label: 加入购物车（DB 持久化，按 user_id 隔离）
    entity: CartItem
    source: pd-explore.local.md > BE-DIM-6 权限 user_id 强隔离
  - id: n5
    type: action
    actor: consumer
    label: 匿名加购（anonToken/localStorage），登录时按 anonToken 合并入账户购物车
    entity: CartItem
    source: er-diagram.yml > CartItem.anonToken 登录后合并
  - id: n6
    type: action
    actor: consumer
    label: 结算：选择收货地址，按 ShippingRate 分区计算运费，可选礼品包装（固定费计入总额，决策28），优惠券抵扣
    entity: ShippingRate
    source: er-diagram.yml > ShippingRate.zone/threshold + Order.totalAmount js_guard
  - id: n7
    type: decision
    label: 鉴权校验：登录态有效且购物车条目归属当前 user_id
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n8
    type: decision
    label: 防重校验：订单号预生成，重复提交返回已有订单
    source: pd-explore.local.md > BE-DIM-4 幂等 下单接口订单号预生成防重提交
  - id: n9
    type: action
    actor: system
    label: 创建订单（原子事务：订单+订单行快照+现货 SKU 乐观锁扣库存+清购物车；定制款不扣库存仅记 customSizeData）
    entity: Order
    meta:
      tx_boundary: true
      idempotent: true
      rate_limit: cloudflare_waf
    source: pd-explore.local.md > BE-DIM-4 事务 + BE-DIM-8 限流降级
  - id: n10
    type: decision
    label: 扣库存是否成功（乐观锁版本冲突/库存不足）
    source: er-diagram.yml > Sku.stock js_guard 乐观锁防超卖
  - id: n11
    type: error
    label: 下单失败：事务整体回滚，提示库存不足或冲突重试
    source: pd-explore.local.md > BE-DIM-4 事务 防超卖
  - id: n12
    type: integration
    label: 创建 Stripe PaymentIntent（Payment Element 承载卡/Apple Pay/Google Pay/Klarna/Afterpay，决策25；金额/币种一致性校验）
    entity: Payment
    source: pd-explore.local.md > BE-DIM-5 外部集成 Stripe 沙箱
  - id: n13
    type: error
    label: Stripe 创建超时/失败：订单保持 pending，可重试发起支付
    source: pd-explore.local.md > BE-DIM-5 外部集成
  - id: n14
    type: state_change
    entity: Payment
    from: created
    to: processing
    label: 消费者确认支付 stripe_confirm
    source: state-machine.yml > payment_lifecycle stripe_confirm
  - id: n15
    type: integration
    label: Stripe webhook 回调：签名验证 + 按 event_id 幂等消费（重复事件直接 ACK）
    meta:
      idempotent: true
    source: pd-explore.local.md > BE-DIM-4 幂等 Stripe webhook event_id
  - id: n16
    type: decision
    label: webhook 支付结果
    source: state-machine.yml > payment_lifecycle webhook_payment_succeeded/failed
  - id: n17
    type: state_change
    entity: Payment
    from: processing
    to: succeeded
    label: 支付成功
    source: state-machine.yml > payment_lifecycle webhook_payment_succeeded
  - id: n18
    type: state_change
    entity: Order
    from: pending
    to: paid
    label: 订单已支付（状态前置校验+乐观锁防与超时关单并发竞争）
    meta:
      concurrency_control: optimistic_lock
    source: state-machine.yml > order_lifecycle payment_webhook_succeeded + backend-flow-inference.md
      > 状态机并发
  - id: n19
    type: notification
    label: 发布支付成功事件到 RabbitMQ（→ 订单事件分发流）
    source: pd-explore.local.md > BE-DIM-4 消息队列
  - id: n20
    type: state_change
    entity: Payment
    from: processing
    to: failed
    label: 支付失败
    source: state-machine.yml > payment_lifecycle webhook_payment_failed
  - id: n21
    type: error
    label: 支付失败：订单仍 pending 且未超时可重试支付（failed→processing retry_payment）
    source: state-machine.yml > payment_lifecycle retry_payment guard
  - id: n22
    type: end
    label: 下单支付完成
    source: state-machine.yml > order_lifecycle paid
  - id: n23
    type: end
    label: 流程终止
    source: state-machine.yml > order_lifecycle pending
  edges:
  - from: n1
    to: n2
  - from: n2
    to: n3
  - from: n3
    to: n4
    cond: 'yes'
  - from: n3
    to: n5
    cond: 'no'
  - from: n4
    to: n6
  - from: n5
    to: n6
  - from: n6
    to: n7
  - from: n7
    to: n8
    cond: 'yes'
  - from: n7
    to: n23
    cond: 'no'
  - from: n8
    to: n9
    cond: 首次提交
  - from: n8
    to: n12
    cond: 重复提交返回已有订单
  - from: n9
    to: n10
  - from: n10
    to: n12
    cond: 'yes'
  - from: n10
    to: n11
    cond: 'no'
  - from: n11
    to: n23
  - from: n12
    to: n14
    cond: 成功
  - from: n12
    to: n13
    cond: 超时/失败
  - from: n13
    to: n12
    cond: 重试
  - from: n14
    to: n15
  - from: n15
    to: n16
  - from: n16
    to: n17
    cond: succeeded
  - from: n16
    to: n20
    cond: failed
  - from: n17
    to: n18
  - from: n18
    to: n19
  - from: n19
    to: n22
  - from: n20
    to: n21
  - from: n21
    to: n14
    cond: 重试支付
  - from: n21
    to: n23
    cond: 放弃
- id: order_timeout_cancel
  name: 待支付订单超时自动取消
  trigger: 'scheduled: Spring @Scheduled 周期扫描（30 分钟超时）'
  actors:
  - system
  cross_domain: false
  external_systems: []
  source: pd-explore.local.md > BE-DIM-4 定时任务
  nodes:
  - id: n1
    type: start
    label: 定时任务触发
    source: pd-explore.local.md > BE-DIM-4 定时任务 Spring @Scheduled
  - id: n2
    type: action
    actor: system
    label: 扫描 now > expiresAt 的 pending 订单
    entity: Order
    source: er-diagram.yml > Order.expiresAt js_guard createdAt+30min
  - id: n3
    type: decision
    label: 状态前置校验：订单仍为 pending（防与支付 webhook 并发竞争）
    source: backend-flow-inference.md > 状态机并发 状态前置校验+CAS
  - id: n4
    type: state_change
    entity: Order
    from: pending
    to: cancelled
    label: 超时自动取消（与库存回补同事务）
    meta:
      tx_boundary: true
      concurrency_control: optimistic_lock
    source: state-machine.yml > order_lifecycle payment_timeout_30min
  - id: n5
    type: action
    actor: system
    label: 回补现货 SKU 库存（定制款无库存跳过）
    entity: Sku
    meta:
      tx_boundary: true
    source: pd-explore.local.md > BE-DIM-4 定时任务 回补现货库存
  - id: n6
    type: notification
    label: 发布订单取消事件到 RabbitMQ
    source: pd-explore.local.md > BE-DIM-4 消息队列 订单事件含取消
  - id: n7
    type: error
    label: 并发冲突：订单已被 webhook 置为 paid，跳过该单不取消
    source: backend-flow-inference.md > 状态机并发
  - id: n8
    type: end
    label: 本轮扫描结束
    source: pd-explore.local.md > BE-DIM-4 定时任务
  edges:
  - from: n1
    to: n2
  - from: n2
    to: n3
  - from: n3
    to: n4
    cond: 'yes'
  - from: n3
    to: n7
    cond: 'no'
  - from: n4
    to: n5
  - from: n5
    to: n6
  - from: n6
    to: n8
  - from: n7
    to: n8
- id: admin_ship_complete
  name: 管理端发货与订单完成
  trigger: 管理员对 paid 订单执行发货
  actors:
  - admin
  - system
  - consumer
  cross_domain: false
  external_systems: []
  source: state-machine.yml > order_lifecycle mark_shipped/confirm_receipt
  nodes:
  - id: n1
    type: start
    label: 管理员打开已支付订单详情
    source: state-machine.yml > order_lifecycle paid
  - id: n2
    type: decision
    label: 权限校验：RBAC @RequirePermission 订单发货权限点
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n3
    type: action
    actor: admin
    label: 选择承运商（来自 Shipping 配置启用的 Carrier）并填写运单号
    entity: Order
    source: er-diagram.yml > Order.carrier/trackingNo + Carrier.status enabled
  - id: n4
    type: decision
    label: guard：carrier 与 trackingNo 已填写且订单仍为 paid
    source: state-machine.yml > order_lifecycle mark_shipped guard
  - id: n5
    type: state_change
    entity: Order
    from: paid
    to: shipped
    label: 标记发货
    meta:
      concurrency_control: optimistic_lock
    source: state-machine.yml > order_lifecycle mark_shipped
  - id: n6
    type: action
    actor: system
    label: 记录审计日志（OperationLog 发货操作）
    meta:
      audit: true
    source: pd-explore.local.md > BE-DIM-7 审计日志
  - id: n7
    type: notification
    label: 发布发货事件到 RabbitMQ（缓存失效+通知消费者）
    source: pd-explore.local.md > BE-DIM-4 消息队列 订单事件含发货
  - id: n8
    type: state_change
    entity: Order
    from: shipped
    to: completed
    label: 消费者确认收货
    source: state-machine.yml > order_lifecycle confirm_receipt
  - id: n9
    type: error
    label: 权限不足或订单状态已变更（如已转 refunding），操作拒绝
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n10
    type: end
    label: 订单完成
    source: state-machine.yml > order_lifecycle completed
  - id: n11
    type: end
    label: 发货中止
    source: state-machine.yml > order_lifecycle paid
  edges:
  - from: n1
    to: n2
  - from: n2
    to: n3
    cond: 'yes'
  - from: n2
    to: n9
    cond: 'no'
  - from: n3
    to: n4
  - from: n4
    to: n5
    cond: 'yes'
  - from: n4
    to: n9
    cond: 'no'
  - from: n5
    to: n6
  - from: n6
    to: n7
  - from: n7
    to: n8
  - from: n8
    to: n10
  - from: n9
    to: n11
- id: refund_flow
  name: 退款申请与审核
  trigger: 消费者对 paid/shipped 订单发起退款申请
  actors:
  - consumer
  - admin
  - system
  - stripe
  cross_domain: true
  external_systems:
  - Stripe
  source: pd-explore.local.md > BE-DIM-4 事务 退款审核原子 + BE-DIM-5 外部集成
  nodes:
  - id: n1
    type: start
    label: 消费者发起退款申请
    source: state-machine.yml > order_lifecycle refund_requested
  - id: n2
    type: decision
    label: 鉴权校验：订单归属当前 user_id 且状态为 paid/shipped，金额不超过订单总额
    source: pd-explore.local.md > BE-DIM-6 权限 + er-diagram.yml > Refund.amount js_guard
  - id: n3
    type: action
    actor: consumer
    label: 创建退款工单（初始 pending）
    entity: Refund
    source: state-machine.yml > refund_lifecycle initial pending
  - id: n4
    type: state_change
    entity: Order
    from: paid
    to: refunding
    label: 订单转入退款中
    source: state-machine.yml > order_lifecycle refund_requested
  - id: n5
    type: decision
    label: 权限校验：RBAC @RequirePermission 退款审核权限点
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n6
    type: decision
    label: 管理员在退款工单列表行内审批：仅 pending 行显示同意/拒绝按钮，行内同意无弹窗二次确认（D7 回对原型）
    source: pd-explore.local.md > D7 + prototype/portal-admin/src/views/Refunds.vue
      > 行内同意/拒绝按钮 v-if r.status===pending
  - id: n7
    type: state_change
    entity: Refund
    from: pending
    to: approved
    label: 审核通过
    source: state-machine.yml > refund_lifecycle admin_approve
  - id: n8
    type: integration
    label: 调用 Stripe Refund API（沙箱）
    source: pd-explore.local.md > BE-DIM-5 外部集成 Stripe
  - id: n9
    type: decision
    label: Stripe 退款是否成功
    source: state-machine.yml > refund_lifecycle stripe_refund_succeeded guard
  - id: n10
    type: action
    actor: system
    label: 原子事务：退款记录落账+订单状态变更+现货库存回补
    entity: Refund
    meta:
      tx_boundary: true
    source: pd-explore.local.md > BE-DIM-4 事务 退款审核原子
  - id: n11
    type: state_change
    entity: Payment
    from: succeeded
    to: refunded
    label: 支付单转退款
    source: state-machine.yml > payment_lifecycle refund_executed
  - id: n12
    type: state_change
    entity: Refund
    from: approved
    to: refunded
    label: 退款工单完成
    source: state-machine.yml > refund_lifecycle stripe_refund_succeeded
  - id: n13
    type: state_change
    entity: Order
    from: refunding
    to: refunded
    label: 订单退款完成
    source: state-machine.yml > order_lifecycle refund_approved
  - id: n14
    type: action
    actor: system
    label: 记录审计日志（OperationLog 退款审核）
    meta:
      audit: true
    source: pd-explore.local.md > BE-DIM-7 审计日志
  - id: n15
    type: notification
    label: 发布退款事件到 RabbitMQ（缓存失效+通知消费者）
    source: pd-explore.local.md > BE-DIM-4 消息队列
  - id: n16
    type: state_change
    entity: Refund
    from: pending
    to: rejected
    label: 审核驳回
    source: state-machine.yml > refund_lifecycle admin_reject
  - id: n17
    type: state_change
    entity: Order
    from: refunding
    to: paid
    label: 订单回退到退款前状态
    source: state-machine.yml > order_lifecycle refund_rejected
  - id: n18
    type: error
    label: Stripe 退款失败/超时：工单保持 approved，事务不提交，待人工重试
    source: pd-explore.local.md > BE-DIM-5 外部集成
  - id: n19
    type: error
    label: 鉴权/状态校验失败：拒绝申请
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n20
    type: end
    label: 退款完成
    source: state-machine.yml > refund_lifecycle refunded
  - id: n21
    type: end
    label: 退款驳回
    source: state-machine.yml > refund_lifecycle rejected
  - id: n22
    type: end
    label: 申请终止
    source: state-machine.yml > refund_lifecycle pending
  - id: n23
    type: decision
    label: 订单含定制行（customSizeData 非空）且已超 24h 投产宽限期？
    source: decision.md 决策24 定制款投产后不可退
  - id: n24
    type: error
    label: 422 定制款已投产不可退（消费端入口置灰+三语说明文案）
    source: decision.md 决策24
  - id: n25
    type: action
    actor: admin
    label: 行内拒绝：按钮位置展开拒绝原因输入框，rejectReason.trim() 非空才可提交（D7，后端拒绝原因必填约束不变）
    entity: Refund
    source: pd-explore.local.md > D7 + state-machine.yml > page_refunds_view click_reject/confirm_reject
      + er-diagram.yml > Refund.rejectReason js_guard
  edges:
  - from: n1
    to: n2
  - from: n2
    to: n23
    cond: 'yes'
  - from: n2
    to: n19
    cond: 'no'
  - from: n3
    to: n4
  - from: n4
    to: n5
  - from: n5
    to: n6
    cond: 'yes'
  - from: n5
    to: n19
    cond: 'no'
  - from: n6
    to: n7
    cond: 通过
  - from: n6
    to: n25
    cond: 驳回
  - from: n7
    to: n8
  - from: n8
    to: n9
  - from: n9
    to: n10
    cond: 'yes'
  - from: n9
    to: n18
    cond: 'no'
  - from: n10
    to: n11
  - from: n11
    to: n12
  - from: n12
    to: n13
  - from: n13
    to: n14
  - from: n14
    to: n15
  - from: n15
    to: n20
  - from: n16
    to: n17
  - from: n17
    to: n14
  - from: n18
    to: n8
    cond: 重试
  - from: n18
    to: n22
    cond: 终止
  - from: n19
    to: n22
  - from: n14
    to: n21
    cond: 驳回路径
  - from: n23
    to: n24
    cond: 'yes'
  - from: n23
    to: n3
    cond: 'no'
  - from: n24
    to: n22
  - from: n25
    to: n16
    cond: 提交（原因非空）
  - from: n25
    to: n6
    cond: 取消（工单保持 pending）
- id: review_moderation_flow
  name: 评价提交与审核
  trigger: 消费者对已完成订单提交评价
  actors:
  - consumer
  - admin
  - system
  cross_domain: false
  external_systems: []
  source: state-machine.yml > review_moderation
  nodes:
  - id: n1
    type: start
    label: 消费者进入已完成订单提交评价
    source: er-diagram.yml > Review
  - id: n2
    type: decision
    label: 鉴权校验：订单归属当前 user_id 且状态为 completed
    source: pd-explore.local.md > BE-DIM-6 权限 评价按 user_id 强隔离
  - id: n3
    type: action
    actor: consumer
    label: 提交评分/内容/买家秀图片（评价初始 pending 不前台展示）
    entity: Review
    source: state-machine.yml > review_moderation initial pending
  - id: n4
    type: decision
    label: 权限校验：RBAC @RequirePermission 评价审核权限点
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n5
    type: decision
    label: 管理员审核结论
    source: er-diagram.yml > Review.status js_guard pending 时才显示通过/拒绝
  - id: n6
    type: state_change
    entity: Review
    from: pending
    to: approved
    label: 审核通过，前台展示
    source: state-machine.yml > review_moderation approve
  - id: n7
    type: state_change
    entity: Review
    from: pending
    to: rejected
    label: 审核拒绝（featured 强制置 false）
    source: state-machine.yml > review_moderation reject guard
  - id: n8
    type: action
    actor: system
    label: 记录审计日志（OperationLog 评价审核）
    meta:
      audit: true
    source: pd-explore.local.md > BE-DIM-7 审计日志
  - id: n9
    type: error
    label: 非 completed 订单或越权提交：拒绝并提示
    source: pd-explore.local.md > BE-DIM-6 权限
  - id: n10
    type: end
    label: 审核完成
    source: state-machine.yml > review_moderation
  - id: n11
    type: end
    label: 提交终止
    source: state-machine.yml > review_moderation initial pending

- id: product_batch_ops
  name: 商品批量操作（上架/下架/推荐/删除）
  trigger: 管理员在商品列表勾选多行后点击批量操作栏动作
  actors:
  - admin
  - system
  cross_domain: false
  external_systems: []
  source: pd-explore.local.md > D4/D10 BE-DIM-4 事务
  nodes:
  - id: n1
    type: start
    label: 管理员勾选商品行（勾选框列/allChecked 全选），批量操作栏出现
    source: state-machine.yml > page_products_view select_rows
  - id: n2
    type: decision
    label: 权限校验：RBAC @RequirePermission 商品管理权限点
    source: hhspec/specs/architecture/business-flow.yml > content_publish_invalidate
      n2 同模式权限校验
  - id: n3
    type: decision
    label: guard：selected.length > 0 且确认批量动作（批量删除需二次确认）
    source: state-machine.yml > product_lifecycle batch_publish guard
  - id: n4
    type: action
    actor: system
    label: 调用批量端点：一次请求 N 个 id，逐条独立事务执行互不阻塞（D10）
    entity: Product
    meta:
      tx_boundary: true
    source: pd-explore.local.md > D10 BE-DIM-4 事务
  - id: n5
    type: state_change
    entity: Product
    from: draft
    to: published
    label: 批量上架
    source: state-machine.yml > product_lifecycle batch_publish
  - id: n6
    type: state_change
    entity: Product
    from: published
    to: draft
    label: 批量下架
    source: state-machine.yml > product_lifecycle batch_unpublish
  - id: n7
    type: action
    actor: system
    label: 批量设为推荐 recommend=true（不改变上下架状态，draft/published 均可）
    entity: Product
    source: state-machine.yml > product_lifecycle batch_recommend guard
  - id: n8
    type: state_change
    entity: Product
    from: published
    to: deleted
    label: 批量删除（draft 同走 batch_delete；逐条复用 409509 删除校验）
    source: state-machine.yml > product_lifecycle batch_delete
  - id: n9
    type: action
    actor: system
    label: 汇总逐条结果返回成功/失败清单（失败项不回滚成功项，失败原因含 409509 等校验码）
    meta:
      compensation: true
    source: pd-explore.local.md > D10 逐条容错返回成功/失败清单
  - id: n10
    type: action
    actor: system
    label: 记录操作日志 OperationLog（action/targetIds/result/adminId）
    entity: OperationLog
    meta:
      audit: true
    source: pd-explore.local.md > D10 记录操作日志 + er-diagram.yml > OperationLog.result
  - id: n11
    type: error
    label: 批量请求整体失败/超时：列表保持原状，提示重试
    source: 'state-machine.yml > page_products_view batch_action [INFERRED: 网络失败分支]'
  - id: n12
    type: error
    label: 权限不足或未选中行：操作拒绝
    source: hhspec/specs/architecture/business-flow.yml > admin_ship_complete n9 同模式
  - id: n13
    type: end
    label: 列表刷新并展示成功/失败反馈
    source: state-machine.yml > page_products_view batch_action 后刷新
  - id: n14
    type: end
    label: 操作中止
    source: state-machine.yml > page_products_view clear_selection

# 技术栈 Profile — portal-api-integration（staging 副本，baseline 不动）
# 模式：Brownfield（identity 域已落地，本 change 在既有三工程上新增七域 API 对接）
# 以 baseline（identity-auth-fullstack）为底，integrations 增补本 change 引入的外部集成

meta:
  change_name: portal-api-integration
  domain_code: portal-api-integration
  mode: brownfield
  base_profile: identity-auth-fullstack
  generated_at: "2026-06-10T00:00:00Z"
  detection_evidence: "baseline tech-profile + decision.md（portal-api-integration 决策 4/7/9/16/19/22）+ backend/frontend 代码扫描（api-integration-audit.md）"

# 工程拓扑：三个独立可编译工程（沿用 baseline；portal-store 部署形态按决策 22 调整）
topology:
  type: multi-project
  projects:
    - id: backend
      kind: backend
      language: java
      framework: spring-boot
      build_tool: gradle
      packaging: single-jar-multi-module
      modules: [common, store, admin]
      api_prefix:
        store: /api/store/*
        admin: /api/admin/*
      detection_evidence: "baseline + backend/ 实际工程（identity 域 35 端点已实现）"
    - id: portal-store
      kind: frontend
      language: typescript
      framework: next.js
      framework_version: "15"
      router: app-router
      styling: tailwind
      port: 5173
      i18n: [en, es, fr]
      i18n_routing: path-prefix  # 决策 27：/es /fr 前缀，EN 无前缀，hreflang + 按 locale sitemap
      rendering: [rsc, ssr, isr]  # 决策 22：去 output:'export'，Node standalone（docker + 健康检查 + CDN 前置 + serve-stale）
      detection_evidence: "baseline + decision.md 决策 22/27"
    - id: portal-admin
      kind: frontend
      language: typescript
      framework: vue3
      build_tool: vite
      styling: [tailwind, headless-ui]
      port: 5174
      i18n: [zh]
      detection_evidence: "baseline + frontend/portal-admin 实际工程"

# 后端技术栈细节（identity 域已验证，七域沿用）
backend_stack:
  language:
    primary: java
    build_tool: gradle
    build_specs_path: "backend/build.gradle（已落地，baseline 推断项已被代码证实）"
  framework: spring-boot
  data_access:
    orm: mybatis-plus
    database: mysql
    cache: jetcache  # 决策 4：本地 Caffeine + 远程 Redis 两级；写操作 @CacheInvalidate；穿透保护开启（BE-DIM-8）
    cache_layers:
      session_credential:
        strategy: remote-only
        store: redis
        ttl_seconds: 30
      profile_config:
        strategy: two-level
        local: caffeine
        remote: redis
        ttl:
          authconfig_seconds: 600
          user_profile_seconds: 300
          identities_seconds: 300
      catalog_content_readonly:  # 本 change 新增：消费端商品/分类/标签/内容只读层（key 含 locale 维度，决策 13）
        strategy: two-level
        local: caffeine
        remote: redis
        ttl:
          default_seconds: 300
          search_seconds: 60          # 决策 17 FULLTEXT 搜索短 TTL
          analytics_seconds: 60       # 决策 10 聚合
          ga4_traffic_seconds: 300    # 决策 19 GA4 拉取
      trading_personal_data:        # 决策 4 第 3 层：购物车/订单/支付/个人数据不缓存
        strategy: none
    rate_limit_backend: redis
    response_envelope: "huihao R<T>（成功 {code,message,data}；分页 huihao.page.Paginated：data/total_elements/page_number/page_size/number_of_elements/total_pages）"
  security:
    auth: jwt
    jwt_isolation: dual  # store / admin 独立密钥（沿用）
    jwt_extensions:
      - "showroom guest JWT：受限 scope（showroom_id/member_id/invite 版本号），决策 20.2；StoreJwtFilter 旁路扩展由 L2 设计"
      - "StoreJwtFilter 配置化公开路径白名单：catalog/marketing/review 公开读 + newsletter/contact + exchange-rates + stripe webhook + showroom guest-session"
  integrations:
    email:
      protocol: smtp
      stub_switch: true  # dev 落日志；生产配置化（SES/Resend 等，决策 16）
      mail_record: true  # MailRecord 幂等防重发 + 失败重试 + 按 locale 三语渲染（决策 16/20.5）
    oidc:
      providers: [google, apple]
      stub_switch: true
    payment:  # 本 change 新增（决策 7/25）
      provider: stripe
      mode: sandbox
      features:
        - "PaymentIntent + Payment Element（卡/Apple Pay/Google Pay/Klarna/Afterpay，按订单币种初始化）"
        - "webhook 签名验证（Stripe-Signature）+ event_id 幂等消费（processed_event）"
        - "Refund 沙箱（原币种原金额，退款审核原子事务）"
      timeout_fallback: "Stripe 失败 502601/超时 504601，订单保持 pending 可重试（BE-DIM-5 防腐层）"
    object_storage:  # 本 change 新增（决策 9）
      type: s3-compatible  # Cloudflare R2 类
      upload: presigned-url  # POST /api/admin/uploads/presign + /api/store/uploads/presign（买家秀）
      persistence: "后端只存对象 key/公开 URL，CDN 直出"
      fallback: "预签名服务不可用 502501/502801，表单其余字段可先保存"
    message_queue:  # 本 change 新增（BE-DIM-4，决策 3/16/22）
      type: rabbitmq
      client: spring-amqp
      topology:
        - "订单事件（支付成功/发货/取消/退款结果）→ 缓存失效、ISR revalidate、交易邮件、Showroom 指派推进、销量/评分冗余字段回写"
        - "内容发布/商品写事件 → Next.js revalidatePath + Cloudflare purge（秒级失效链，s-758）"
      reliability: "死信队列 + 重试 + 消费幂等（L1 约束，L2 定拓扑细节）"
    analytics:  # 本 change 新增（决策 19）
      provider: ga4-data-api
      auth: service-account  # 凭证仅后端配置，不暴露前端
      cache_ttl_seconds: 300
      fallback: "拉取失败 200 + source_status=unavailable（前端\"数据暂不可用\"），交易指标不受影响"
      frontend_tagging: "gtag 标准电商事件 + Cookie consent banner（Consent Mode v2），前端直连不经后端"
    cdn:  # 本 change 新增（决策 4/22）
      provider: cloudflare
      features:
        - "页面/匿名 API s-maxage 边缘缓存 + serve-stale 兜底"
        - "purge API：MQ 失效消费者调用（zone token 后端配置），与 revalidatePath 同链路"
        - "WAF 写接口限流（下单/支付/登录/订阅/留言，决策 11）"

# 待 L2/L3 确认项
assumptions:
  - "huihao.page.Paginated 字段以 backend 实际类为准（契约按 data/total_elements/page_number/page_size/number_of_elements/total_pages 对齐，L3 实现前与 huihao-mysql 包核对）"
  - "StoreJwtFilter 公开路径白名单与 guest JWT 旁路的具体实现方式由 L2 详设定稿"
  - "RabbitMQ exchange/queue 命名与死信拓扑由 L2 定稿（L1 仅约束事件类别与消费幂等）"
  - "best_sellers 销量与 rating_avg 评分冗余字段的回写落点（Product 冗余列 vs 独立聚合表）由 L2 定稿"
  - "Stripe/GA4/R2 凭证均走后端配置（环境变量/配置中心），dev 环境 stub/沙箱开关沿用 identity 模式"
